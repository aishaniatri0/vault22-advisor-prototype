}

/* =====================================================================
   Customers (§9)
   ===================================================================== */
/* "Has recurring" and "Active this week" both matched all five customers, so they
   rendered 5 → 5 and were indistinguishable from broken. The predicates were right;
   the seed data gave them nothing to exclude. C4's SIP has failed (see notification
   N6) and C4 last logged in over a week ago, so both now discriminate honestly. */
const CUST_FILTERS = [
  {k:'hnw', t:'High Net Worth', f:c=>c.nw>=1000000},
  {k:'ffs', t:'Fitness ≥ 700', f:c=>c.ffs>=700},
  {k:'pv', t:'Portfolio ≥ R500k', f:c=>c.pv>=500000},
  {k:'sip', t:'Has recurring', f:c=>c.sip>0 && c.sipActive!==false},
  {k:'active', t:'Active this week', f:c=>(NOW-new Date(c.lastLogin))/86400000<=7}
];
function applyCust(){
  const q = state.q.trim().toLowerCase();
  let r = state.customers.filter(c =>
    !q || [c.name,c.email,c.phone].some(v=>String(v).toLowerCase().includes(q)));
  CUST_FILTERS.forEach(f=>{ if(state.filters.has(f.k)) r = r.filter(f.f); });
  const {k,d} = state.sort;
  return r.sort((a,b)=>{
    const x=a[k], y=b[k];
    if(x==null) return 1; if(y==null) return -1;
    return (typeof x==='number' ? x-y : String(x).localeCompare(String(y))) * d;
  });
}
function vCustomers(){
  const C = state.customers, rows = applyCust();
  const aua = C.reduce((s,c)=>s+c.pv,0), inv = C.reduce((s,c)=>s+c.inv,0);
  if(!C.length) return `
    <div class="page-head"><h1>Customers</h1>
      <p class="lede">Registered users who have bought at least one product.</p></div>
    <div class="card"><div class="empty"><div class="em">◍</div><h3>No customers yet</h3>
      <p>Once a registered user makes their first investment they'll appear here.</p>
      <button class="btn" data-go="leads">View leads</button></div></div>`;
  /* Trimmed from eleven columns to seven. Financial fitness, net worth and client-since
     live on the detail view; portfolio value, unrealised gain and investor type are what
     an advisor scans a customer book by. */
  const body = rows.map(c=>`<tr class="row-go" data-cust="${c.id}">
    <td><div class="nm">${esc(c.name)}</div><div class="sub">${esc(c.email)}</div></td>
    <td><span class="pill p-green">KYC ${c.kyc}</span></td>
    <td><span class="pill p-teal">${c.type}</span></td>
    <td class="num"><b>${money(c.pv)}</b></td>
    <td class="num" style="color:${c.pv-c.inv>=0?'var(--v4-success-dark)':'var(--v4-danger-dark)'}">
      ${c.pv-c.inv>=0?'+':''}${money(c.pv-c.inv)}</td>
    <td class="num sub">${rel(c.lastLogin)}</td>
    <td><button class="btn btn-sm" data-cust="${c.id}">Profile ›</button></td>
  </tr>`).join('');
  return `
    <div class="page-head"><h1>Customers</h1>
      <p class="lede">Registered users who have bought at least one product.</p></div>
    <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi"><div class="k">Assets Under Advice</div><div class="v">${short(aua)}</div></div>
      <div class="kpi"><div class="k">Invested Amount</div><div class="v">${short(inv)}</div></div>
      <div class="kpi"><div class="k">Unrealised Gain</div>
        <div class="v" style="color:var(--v4-success-dark)">+${short(aua-inv)}</div></div>
    </div>
    <div class="card mt6">
      <div class="card-head">
        <div class="row"><h2>All customers</h2>
          <span class="pill p-gray">${rows.length} of ${C.length}</span></div>
        <input class="inp inp-sm search-in" id="searchIn" placeholder="Search name, email or phone" value="${esc(state.q)}">
      </div>
      <div class="card-p" style="padding-top:0;padding-bottom:var(--v4-space-4)">
        <div class="chips">
          ${CUST_FILTERS.map(f=>`<button class="fchip ${state.filters.has(f.k)?'on':''}" data-filter="${f.k}">${f.t}</button>`).join('')}
          ${state.filters.size?`<button class="fchip" data-filter="__clear">Clear all ✕</button>`:''}
        </div>
      </div>
      ${rows.length?`<div class="tbl-scroll"><table>
        <!-- §13 lists Last Activity as a filter/sort. lastLogin was on every customer
             but unreachable: there was no column to sort by. -->
        <!-- §13 lists Last Activity as a sort; lastLogin is now a sortable column. -->
        <thead><tr>${th('name','Name')}<th>KYC</th><th>Investor Type</th>
          ${th('pv','Portfolio Value')}<th>Unrealised G/L</th>${th('lastLogin','Last Activity')}
          <th></th></tr></thead>
        <tbody>${body}</tbody></table></div>`
      :`<div class="empty"><div class="em">◍</div><h3>No customers match</h3>
         <p>Nothing matches your search and filters.</p>
         <button class="btn" data-filter="__clear">Clear filters</button></div>`}
    </div>
    ${consent()}`;
}

/* =====================================================================
   §8 Registered User / Customer Management — ONE tabbed surface.
   SPEC-V2 merges the old §8/§9/§10 into this, and it must exist for both
   Registered Users and Customers. Financial, Investment and Risk are gated
   by the consent object; Personal, Documents and Activity are not.
   ===================================================================== */
const TABS8 = [
  {k:'personal',   t:'Personal'},
  {k:'financial',  t:'Financial',  gated:true},
  {k:'investment', t:'Investment', gated:true},
  {k:'risk',       t:'Risk',       gated:true},
  {k:'documents',  t:'Documents'},
  {k:'activity',   t:'Activity'}
];
/* A Detail | Value table. The advisor's §8 tabs used to render this same label/value
   data as a stacked two-column grid while the client side got a real table, so the same
   information wore two different treatments. One helper, one treatment, everywhere. */
const dl = rows => `<div class="ptbl-wrap"><table class="ptbl">
  <thead><tr><th>Detail</th><th>Value</th></tr></thead>
  <tbody>${rows.map(([t,v]) =>
    `<tr><td>${t}</td><td class="num">${v}</td></tr>`).join('')}</tbody></table></div>`;

/* Locked state: name exactly what it would reveal, and offer the request. */
function lockedTab(p, sec){
  const st = consentOf(p.id, sec.k);
  return `
    <div class="locked">
      <div class="locked-h">
        <span class="lock">🔒</span>
        <div>
          <h3>${sec.t} is ${st==='pending'?'awaiting the client’s approval':'not shared with you'}</h3>
          <p class="lede">${esc(p.name.split(' ')[0])} controls this from their Vault22 profile.
            ${st==='pending'
              ? 'They have been asked and have not answered yet.'
              : 'Request access and they will be asked to grant it.'}</p>
        </div>
        ${st==='pending'
          ? `<span class="pill p-amber">Requested</span>`
          : `<button class="btn btn-pri" data-req="${p.id}|${sec.k}">Request access</button>`}
      </div>
      <div class="sec-t" style="margin-top:var(--v4-space-5)">What this would show you</div>
      <div class="locked-fields">${sec.fields.map(f=>`<span class="pill p-gray">${f}</span>`).join('')}</div>
    </div>`;
}

function tab8Personal(p){
  const isCust = !!p.pv;
  return `<div class="card card-p">
    <div class="sec-t">Personal</div>
    ${dl([
      ['First name', esc(p.name.split(' ')[0])],
      ['Last name', esc(p.name.split(' ').slice(1).join(' ')) || dash],
      ['Email', esc(p.email)],
      ['Date of birth', p.dob || dash],
      ['Country', esc(p.country || 'South Africa')],
      ['Nationality', p.nationality || dash],
      ['Dependents', p.dependents != null ? p.dependents : dash],
      ['Phone', p.phone],
      ['Home owner / tenant', p.housing || dash],
      ['Signup date', p.signup || p.since],
      ['Status', isCust ? '<span class="pill p-teal">Customer</span>'
                        : `<span class="pill ${stagePill(p.stage)}">${p.stage}</span>`],
      ['KYC status', p.kyc ? `<span class="pill p-green">${p.kyc}</span>`
                           : (STAGES.indexOf(p.stage)>=4 ? '<span class="pill p-green">Approved</span>'
                                                         : '<span class="pill p-gray">In progress</span>')],
      ['Last login', p.lastLogin ? rel(p.lastLogin) : dash]
    ])}
  </div>`;
}
function tab8Financial(p){
  const sec = CONSENT_SECTIONS[0];
  if(consentOf(p.id,'financial') !== 'granted') return lockedTab(p, sec);
  return `<div class="card card-p">
    <div class="sec-t">Financial</div>
    ${dl([
      ['Net worth', p.nw!=null?money(p.nw):dash],
      ['Total savings', p.totalSav!=null?money(p.totalSav):dash],
      ['Monthly savings', p.sav!=null?money(p.sav)+'/mo':dash],
      ['Financial fitness score', p.ffs!=null?p.ffs+' / 1000':dash],
      /* These two used to be the same expression, so they rendered as two adjacent
         rows reading the same rand figure. Amount invested is what the client put in;
         Total investments is what it is worth now. */
      ['Amount invested', p.inv!=null?money(p.inv)+' <span class="sub">contributed</span>':dash],
      ['Monthly income', p.income!=null?money(p.income):dash],
      ['Emergency fund', p.ef!=null?money(p.ef):dash],
      ['Total investments', p.pv!=null?money(p.pv)+' <span class="sub">current value</span>':dash],
      ['Insurance coverage', p.insurance!=null?money(p.insurance):dash],
      ['Total liabilities', p.liabilities!=null?money(p.liabilities):dash]
    ])}
    <div class="sec-t" style="margin-top:var(--v4-space-6)">Total fees earned</div>
    <div class="row" style="margin-bottom:var(--v4-space-3)">
      ${['Year to date','This quarter','This month','All time'].map(o=>
        `<button class="fchip ${(state.feePeriod||'Year to date')===o?'on':''}" data-fee="${esc(o)}">${o}</button>`).join('')}
    </div>
    <div class="subtile" style="max-width:260px">
      <div class="k" style="font-size:13px;color:var(--live-label)">${esc(state.feePeriod||'Year to date')}</div>
      <div style="font-size:24px;font-weight:600" class="num">${money(feesFor(p, state.feePeriod||'Year to date'))}</div>
    </div>
  </div>`;
}
/* Fees are derived from the customer's own invested amount, not invented. */
const FEE_FRACTION = {'Year to date':0.0075, 'This quarter':0.0019, 'This month':0.000625, 'All time':0.011};
const feesFor = (p, period) => Math.round((p.inv||0) * (FEE_FRACTION[period]||0));

function tab8Investment(p){
  const sec = CONSENT_SECTIONS[1];
  if(consentOf(p.id,'investment') !== 'granted') return lockedTab(p, sec);
  if(!p.holdings) return `<div class="card card-p"><div class="sec-t">Investment</div>
    <p class="lede">No holdings yet. This registered user has not invested.</p></div>`;
  const gl = p.pv - p.inv;
  const poa = (state.poa||{})[p.id];
  return `<div class="card card-p">
    <!-- §15's rule — "no portfolio changes without authorisation, unless power of
         attorney" — was satisfied by absence: there was no portfolio-change control
         anywhere, so the rule was invisible. This is the action it governs. -->
    <div class="between">
      <div class="sec-t" style="margin:0">Investment</div>
      <button class="btn btn-sm ${poa?'':'btn-lock'}" data-switch="${p.id}"
        ${poa?'':'aria-disabled="true"'}>${poa?'Switch model portfolio':'🔒 Switch model portfolio'}</button>
    </div>
    <div class="sub" style="margin:-2px 0 var(--v4-space-4)">${poa
      ? `${esc(p.name.split(' ')[0])} has granted you power of attorney. Changes are logged.`
      : `${esc(p.name.split(' ')[0])} has not granted power of attorney, so you can advise but not act.`}</div>
    ${dl([
      ['Current portfolio value', money(p.pv)],
      ['Invested amount', money(p.inv)],
      ['Unrealised gain/loss', `<span style="color:${gl>=0?'var(--v4-success-dark)':'var(--v4-danger-dark)'}">${gl>=0?'+':''}${money(gl)}</span>`],
      ['Recurring investment', money(p.sip)+'/mo'],
      ['One-time investments', money(p.onetime)],
      ['Fees earned', money(feesFor(p,'Year to date'))]
    ])}
    <div class="sec-t" style="margin-top:var(--v4-space-6)">Asset allocation</div>
    ${Object.entries(p.alloc).map(([k,v])=>`<div class="arow"><span class="lb">${k}</span>
      <span class="bar"><i style="width:${v}%"></i></span><span class="pc num">${v}%</span></div>`).join('')}
    <div class="sec-t" style="margin-top:var(--v4-space-6)">Products owned</div>
    ${p.holdings.map(x=>`<div class="list-row"><span>${esc(x.p)}</span>
      <span class="sub num">${money(x.mv)}</span></div>`).join('')}
    <div class="list-row"><span>Financial profile report</span>
      <button class="btn btn-sm" data-stub="Financial profile report|In the real build this opens the client's full financial profile report as a PDF, the same document they can download from their own Vault22 profile.|Prototype: no document service.">Open</button></div>
  </div>`;
}
function tab8Risk(p){
  const sec = CONSENT_SECTIONS[2];
  if(consentOf(p.id,'risk') !== 'granted') return lockedTab(p, sec);
  const type = p.type || (p.port && p.port!=='n/a' ? p.port : null);
  return `<div class="card card-p">
    <div class="sec-t">Risk</div>
    ${dl([
      ['Risk assessment', p.risk || (p.stage==='Risk Assessment Completed'||STAGES.indexOf(p.stage)>=7 ? 'Completed' : 'Not completed')],
      ['Risk score', p.score!=null ? p.score+' / 100' : dash]
    ])}
    <div class="sec-t" style="margin-top:var(--v4-space-5)">Investor type</div>
    <div class="svc">${TYPES.map(t=>`<span class="pill ${t===type?'p-teal':'p-gray'}">${t}</span>`).join('')}</div>
  </div>`;
}
function tab8Documents(p){
  return `<div class="card card-p">
    <div class="sec-t">Documents library</div>
    <div class="list-row"><span>Identity number<div class="sub num">${p.idNum?maskId(p.idNum):'n/a'}</div></span>
      <span class="pill p-gray">Masked</span></div>
    <div class="list-row"><span>KYC documents</span>
      <button class="btn btn-sm" data-stub="KYC documents|In the real build this opens the client's KYC pack read-only, and the view is written to the audit log.|§15: advisors cannot modify KYC information, and identity numbers stay masked.">View</button></div>
    <div class="list-row"><span>Signed agreements</span>
      <button class="btn btn-sm" data-stub="Signed agreements|In the real build this lists every agreement the client has signed, with dates.|Prototype: no document service.">View</button></div>
  </div>`;
}
function tab8Activity(p){
  /* Every row used to read `p.since`, so a customer's timeline showed one identical
     date five times over — and claimed they invested the day they registered. Each
     milestone now has its own seeded date; `since` stays the first-investment date. */
  const items = [
    ['Signed up', p.signup || p.since],
    ['Completed KYC', p.kycDate || (p.kyc==='Approved'||STAGES.indexOf(p.stage)>=4 ? p.signup : null)],
    ['Risk assessment', p.riskDate || (p.risk==='Completed'||STAGES.indexOf(p.stage)>=6 ? p.signup : null)],
    ['First investment', p.onetime ? p.since : null],
    ['SIP started', p.sip ? (p.sipStart || null) : null],
    ['Portfolio review', p.review || null]
  ];
  return `<div class="card card-p">
    <div class="sec-t">Activity timeline</div>
    <div class="tl">${items.map(([t,dt])=>`<div class="tl-i ${dt?'':'tl-off'}">
      <div class="tl-t">${t}</div><div class="tl-d">${dt || 'Not yet'}</div></div>`).join('')}</div>
    <div class="sec-t" style="margin-top:var(--v4-space-6)">Audit log for this client</div>
    <p class="lede" style="margin-bottom:var(--v4-space-3)">Only this client's events. The
      advisor-level log is under Compliance.</p>
    ${custAudit(p.id).map(a=>`<div class="list-row"><span>${esc(a.act)}</span>
      <span class="sub num">${rel(a.ts)}</span></div>`).join('') ||
      '<p class="lede">Nothing logged yet.</p>'}
  </div>`;
}
/* §15: two audit logs — advisor level, and per customer (advisor view). */
const custAudit = id => state.audit.filter(a => a.who === id);
/* Audit rows name the person; the id lives in `who`, never in the readable text. */
const crmWho = id => {
  const p = state.customers.concat(state.leads).find(x => x.id === id);
  return p ? p.name : id;
};

function tabs8(p){
  const cur = state.tab8 || 'personal';
  const body = {personal:tab8Personal, financial:tab8Financial, investment:tab8Investment,
                risk:tab8Risk, documents:tab8Documents, activity:tab8Activity}[cur](p);
  return `
    <div class="tabs">${TABS8.map(t=>{
      const st = t.gated ? consentOf(p.id, t.k) : null;
      const dot = st==='granted' ? '' : st==='pending' ? ' <span class="tdot amber"></span>'
                : st==='none' ? ' <span class="tdot"></span>' : '';
      return `<button class="tab ${cur===t.k?'on':''}" data-tab8="${t.k}">${t.t}${dot}</button>`;
    }).join('')}</div>
    ${body}`;
}

/* =====================================================================
   Customer profile (§10) + CRM (§12)

    <div class="row mt"><input class="inp inp-sm" id="crmIn" placeholder="Add a task…">
      <button class="btn btn-pri" data-crm="tasks" data-id="${id}">Add</button></div>`;
  if(t==='follow') panel = `
    ${c.follow.map(f=>`<div class="list-row"><span>${esc(f.t)}</span>

    <div class="row mt"><input class="inp inp-sm" type="date" id="crmDate" value="2026-07-20" style="max-width:170px">
      <input class="inp inp-sm" id="crmIn" placeholder="Reminder…">
      <button class="btn btn-pri" data-crm="follow" data-id="${id}">Add</button></div>`;
  if(t==='meets') panel = `
    ${c.meets.map(m=>`<div class="list-row"><span>${esc(m.t)}</span>

    <div class="row mt"><input class="inp inp-sm" type="date" id="crmDate" value="2026-07-17" style="max-width:170px">

/* =====================================================================
   Monthly series, derived from the book (§14).

   Walks the last six months and, at each month end, counts who had registered,
   who had become a customer, and what the book was worth. NOW is a fixed clock
   (the 17 Jul demo date) so the prototype reads identically on any machine.
   ===================================================================== */
/* NOW is the file's existing fixed demo clock (line ~922), reused here so the
   prototype reads identically on any machine and on any day. */
const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_NAME = ['January','February','March','April','May','June','July',
  'August','September','October','November','December'];
const MONTH_LABEL = MONTH_NAME[NOW.getMonth()] + ' ' + NOW.getFullYear();
function monthlySeries(L, C, n = 6){
  const ends = [];
  for(let i = n-1; i >= 0; i--){
    const d = new Date(NOW.getFullYear(), NOW.getMonth() - i + 1, 0);  // last day of that month
    ends.push(d);
  }
  const on = (dateStr, end) => dateStr && new Date(dateStr) <= end;

  const months = ends.map(d => MONTH_ABBR[d.getMonth()]);
  /* Registered users = everyone who has registered, customers included: a customer
     is a registered user who invested, not a separate population. */
  const users = ends.map(e =>
    L.filter(l => on(l.signup, e)).length + C.filter(c => on(c.signup || c.since, e)).length);
  const custs = ends.map(e => C.filter(c => on(c.since, e)).length);
  /* Book value at each month end: a customer's portfolio counts once they invested.
     The final point is today's book, so the chart ends exactly on the AUA KPI. */
  const aum = ends.map(e =>
    C.filter(c => on(c.since, e)).reduce((s,c) => s + c.pv, 0));
  /* Money invested in each month, from the holdings' own purchase dates. */
  const inv = ends.map(e => C.reduce((s,c) => s + (c.holdings||[])
    .filter(h => h.d && new Date(h.d).getMonth() === e.getMonth()
              && new Date(h.d).getFullYear() === e.getFullYear())
    .reduce((t,h) => t + h.mv, 0), 0));
  return {months, users, custs, aum, inv};
}

function spark(vals,w=280,h=54){
  const mx=Math.max(...vals), mn=Math.min(...vals), rg=(mx-mn)||1;
  const pts=vals.map((v,i)=>[i*(w/(vals.length-1)), h-((v-mn)/rg)*(h-8)-4]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L ${w} ${h} L 0 ${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;display:block">
    <path d="${area}" fill="var(--v4-teal-50)"/>
    <path d="${d}" fill="none" stroke="var(--v4-teal-400)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}
function vAnalytics(){
  const L=state.leads, C=state.customers, a=state.advisor;
  if(!L.length && !C.length) return `

    <div class="card"><div class="empty"><div class="em">◪</div><h3>Nothing to chart yet</h3>
      <p>Analytics appear once you have registered users coming through your link.</p>
      <button class="btn" data-share="1">Share my link</button></div></div>`;

  /* §14 User Registration > Customer Funnel — cumulative across the 10 stages. */
  const reached = STAGES.map((s,i)=> L.filter(l=>STAGES.indexOf(l.stage)>=i).length + C.length);
  const top = reached[0] || 1;
  const funnel = STAGES.map((s,i)=>`
    <div class="funnel-row"><span class="lb">${s}</span>
      <span class="tr"><span class="fl" style="width:${Math.max(4,reached[i]/top*100)}%">${reached[i]}</span></span>

    <div class="funnel-row"><span class="lb"><b>Customer</b></span>
      <span class="tr"><span class="fl" style="width:${Math.max(4,C.length/top*100)}%;background:var(--v4-navy-700);color:#fff">${C.length}</span></span>
    </div>`;

  const inv=C.reduce((s,c)=>s+c.inv,0), aua=C.reduce((s,c)=>s+c.pv,0);
  const avg=C.length?inv/C.length:0;
  const conv=(C.length/(L.length+C.length)*100).toFixed(1);
  const prod={}; C.forEach(c=>c.holdings.forEach(x=>prod[x.p]=(prod[x.p]||0)+x.mv));
  const prodTop=Object.entries(prod).sort((a,b)=>b[1]-a[1]); const prodMax=prodTop[0]?prodTop[0][1]:1;

  /* §14 Customer Retention = (Total customers − lost customers) / Total customers.
     Implemented exactly as the spec states it, with the working shown. */
  const lost = LOST_CUSTOMERS.length;
  const totalEver = C.length + lost;
  const retention = ((totalEver - lost) / totalEver * 100).toFixed(1);

  /* §14 Customer Trends. The spec names four; each is period-over-period across the
     book, computed from PREV_PERIOD. Nothing here is invented — a metric the mock
     data cannot compute is not shown. */
  const sum = (f) => C.reduce((s,c)=>s+f(c),0);
  const prevSum = (k) => C.reduce((s,c)=>s+((PREV_PERIOD[c.id]||{})[k]||0),0);
  const pct = (now,was) => was ? ((now-was)/was*100) : 0;
  const TRENDS = [
    {t:'Change in portfolios', now:sum(c=>c.pv),         was:prevSum('pv'),   note:'Total portfolio value across the book'},
    {t:'Change in savings',    now:sum(c=>c.sav),        was:prevSum('sav'),  note:'Monthly savings across the book'},
    {t:'Change in liabilities',now:sum(c=>c.liabilities),was:prevSum('liab'), note:'Total liabilities across the book', invert:true},
    {t:'Change in net worth',  now:sum(c=>c.nw),         was:prevSum('nw'),   note:'Total net worth across the book'}
  ];
  /* Two more the data genuinely supports. */
  const EXTRA = [
    {t:'Change in assets under advice', now:aua, was:prevSum('pv'), note:'AUA is the same base as portfolios, tracked as your book value'},
    {t:'Change in average portfolio',   now:C.length?aua/C.length:0, was:C.length?prevSum('pv')/C.length:0, note:'Per customer'}
  ];
  const trendRow = r => {
    const d = pct(r.now, r.was);
    const good = r.invert ? d<=0 : d>=0;
    return `<div class="list-row">
      <span><b>${r.t}</b><div class="sub">${r.note}</div></span>
      <span style="text-align:right">
        <span class="pill ${good?'p-green':'p-red'}">${d>=0?'+':''}${d.toFixed(1)}%</span>
        <div class="sub num" style="margin-top:2px">${short(r.was)} → ${short(r.now)}</div>
      </span></div>`;
  };

  /* Every one of these four series used to be a hardcoded literal: tripling the whole
     book left all four SVG paths byte-identical, and the AUM chart ended at R1.24m
     while the AUA KPI beside it read R2.19m. spark() was always a correct data-driven
     renderer — it was simply never fed. Derive from the seeded lifecycle dates. */
  const SERIES = monthlySeries(L, C);
  const MONTHS = SERIES.months;
  const usersSeries = SERIES.users, custSeries = SERIES.custs;
  const aumSeries = SERIES.aum, invSeries = SERIES.inv;

  return `
    <div class="page-head"><h1>Analytics</h1>
      <p class="lede">How your funnel is converting and where the book is growing.</p></div>

    <div class="kpis">
      <div class="kpi"><div class="k">Conversion Rate</div><div class="v">${conv}%</div>
        <div class="d">${C.length} of ${L.length+C.length} signups</div></div>
      <div class="kpi"><div class="k">Average Investment</div><div class="v">${short(avg)}</div>
        <div class="d">Per customer</div></div>
      <!-- The 180000 baseline was a magic literal. It is the book's value at the start
           of the window, which the series already knows. -->
      <div class="kpi"><div class="k">AUM Growth</div><div class="v">+${short(aua-aumSeries[0])}</div>
        <div class="d">Since ${MONTHS[0]} ${NOW.getFullYear()}</div></div>
      <div class="kpi"><div class="k">Customer Retention</div><div class="v">${retention}%</div>
        <div class="d">${totalEver - lost} of ${totalEver} kept</div></div>
    </div>

    <!-- §5's relationship map: Advisor → User → Customer. The client redrew this
         deliberately in the 17 Jul doc (it was Advisor → Lead → Customer), and it
         appeared on no route. Each step counts the real population. -->
    <div class="card card-p mt6">
      <div class="sec-t">How your book is related</div>
      <div class="relmap">
        <div class="rel-n"><span class="rel-t">Advisor</span>
          <b>${esc(a.name)}</b><div class="sub">${esc(advisorUrl(a))}</div></div>
        <div class="rel-a">→</div>
        <div class="rel-n"><span class="rel-t">User</span>
          <b>${L.length + C.length}</b>
          <div class="sub">Signed up through your link</div></div>
        <div class="rel-a">→</div>
        <div class="rel-n"><span class="rel-t">Customer</span>
          <b>${C.length}</b>
          <div class="sub">Made a first investment</div></div>
      </div>
    </div>

    <div class="card card-p mt6">
      <div class="sec-t">User registration &gt; customer funnel</div>
      <p class="lede" style="margin-bottom:var(--v4-space-5)">Everyone who has reached at least
        each stage. Customers have passed every stage.</p>
      ${funnel}
    </div>

    <div class="grid2 mt6">
      <div class="card card-p">
        <div class="sec-t">Customer retention</div>
        <div class="num" style="font-size:32px;font-weight:600;color:var(--live-head);line-height:1">${retention}%</div>
        <p class="sub" style="margin-top:6px">${totalEver} customers ever, ${lost} lost,
          so ${totalEver - lost} retained. (Total minus lost, over total.)</p>
        <div class="sec-t" style="margin-top:var(--v4-space-6)">Customers lost this period</div>
        ${LOST_CUSTOMERS.map(x=>`<div class="list-row"><span>${esc(x.name)}
          <div class="sub">${esc(x.reason)}</div></span><span class="sub num">${x.left}</span></div>`).join('')}
      </div>
      <div class="card card-p">
        <div class="sec-t">Top products sold</div>
        ${prodTop.map(([p2,v])=>`<div class="arow"><span class="lb" style="width:180px">${esc(p2)}</span>
          <span class="bar"><i style="width:${v/prodMax*100}%"></i></span>
          <span class="pc num" style="width:56px">${short(v)}</span></div>`).join('')}
        <div class="sec-t" style="margin-top:var(--v4-space-6)">Monthly growth in registered users / customers</div>
        ${spark(usersSeries)}
        <div class="row" style="gap:var(--v4-space-4);margin:6px 0">
          <span class="sub"><b style="color:var(--v4-teal-600)">━</b> Registered users</span>
          <span class="sub"><b style="color:var(--v4-navy-400)">━</b> Customers</span>
        </div>
        ${spark(custSeries)}
        <div class="between sub">${MONTHS.map(m=>`<span>${m}</span>`).join('')}</div>
      </div>
    </div>

    <div class="card card-p mt6">
      <div class="between" style="margin-bottom:var(--v4-space-3)">
        <div class="sec-t" style="margin:0">Customer trends</div>
        <span class="sub">Period over period</span>
      </div>
      <p class="lede" style="margin-bottom:var(--v4-space-4)">Change across your book since last
        period: the four the spec names, plus two more the data supports. Every figure is computed
        from the book.</p>
      ${TRENDS.map(trendRow).join('')}

      ${EXTRA.map(trendRow).join('')}

    <div class="card card-p mt6">
      <!-- The end point is today's book, so this chart and the AUA KPI above agree by

function clientPreview(sec, c, st){
  const gl = c.pv - c.inv;

      ['Net Worth', money(c.nw)], ['Total Savings', money(c.totalSav)],
      ['Monthly Savings', money(c.sav)+'/mo'], ['Financial Fitness Score', c.ffs+' / 1000'],

      ['Insurance Coverage', money(c.insurance)], ['Total Liabilities', money(c.liabilities)],
      ['Total fees earned', money(feesFor(c,'Year to date'))]
    ],
    investment: [
      ['Financial profile report', 'Your full report'],
      ['Current Portfolio Value', money(c.pv)],
      ['Asset Allocation', Object.entries(c.alloc).map(([k,v])=>k+' '+v+'%').join(' · ')],
      ['Products Owned', plural((c.holdings||[]).length,'product')],
      ['Invested Amount', money(c.inv)],
      ['Unrealized Gain/Loss', (gl>=0?'+':'')+money(gl)],
      ['Recurring Investment', money(c.sip)+'/mo'],
      ['One-time Investments', money(c.onetime)],
      ['Fees earned', money(feesFor(c,'Year to date'))]
    ],
    risk: [

      ['Risk Score', c.score + ' / 100'],
      ['Investor Type', c.type]
    ]
  }[sec.k] || sec.fields.map(f=>[f,'']);
  /* A table, not a list: eleven label/value pairs are tabular data and scan far better
     in two aligned columns than as a run of stacked rows. */
  return `

      <table class="ptbl ${st==='granted'?'':'ptbl-off'}">

/* =====================================================================
   §"Also add" — Calendar: a real RFC 5545 invite.

   Built client-side as a Blob, so the advisor genuinely gets a .ics their calendar
   opens, with the client as an ATTENDEE. No calendar service is involved: what the
   real build adds is delivery (sending it to the client and writing to the linked
   calendar), not the invite itself.
   ===================================================================== */
const icsStamp = (day, hhmm) => {
  const [h, m] = (hhmm || '09:00').replace(/[^\d:]/g,'').split(':');
  return day.replace(/-/g,'') + 'T' + String(h).padStart(2,'0') + (m||'00').padStart(2,'0') + '00';
};
const icsPlus = (day, hhmm, mins) => {
  const [h, m] = (hhmm || '09:00').replace(/[^\d:]/g,'').split(':');
  const d = new Date(+day.slice(0,4), +day.slice(5,7)-1, +day.slice(8,10), +h, +(m||0) + mins);
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(d.getHours())}${p(d.getMinutes())}00`;
};
function buildICS(who, day, slot){
  const a = state.advisor;
  /* CRLF line endings and an escaped SUMMARY: both are required by RFC 5545. */
  return [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Vault22//Advisor//EN','CALSCALE:GREGORIAN',
    'METHOD:REQUEST','BEGIN:VEVENT',
    'UID:' + day.replace(/-/g,'') + '-' + (who?who.id:'x') + '@vault22.com',
    'DTSTAMP:' + icsStamp(day, slot) + 'Z',
    'DTSTART:' + icsStamp(day, slot),
    'DTEND:'   + icsPlus(day, slot, 30),
    'SUMMARY:Vault22 review with ' + (a.name || 'your advisor'),
    'DESCRIPTION:A 30-minute portfolio review booked through Vault22 Advisor.',
    'ORGANIZER;CN=' + (a.name||'Advisor') + ':mailto:' + (a.email||'advisor@vault22.com'),
    who ? 'ATTENDEE;CN=' + who.name + ';RSVP=TRUE:mailto:' + who.email : '',
    'LOCATION:' + (a.calendar || 'Online'),
    'END:VEVENT','END:VCALENDAR'
  ].filter(Boolean).join('\r\n');
}
function downloadICS(who, day, slot){
  const blob = new Blob([buildICS(who, day, slot)], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const el = document.createElement('a');
  el.href = url;
  el.download = 'vault22-' + (who ? who.name.toLowerCase().replace(/\s+/g,'-') : 'meeting') + '-' + day + '.ics';
  document.body.appendChild(el); el.click(); el.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function icsModal(who, day, slot){

    <div class="between" style="margin-bottom:var(--v4-space-2)">

  if(state.backTo){

document.addEventListener('click', e => {
  const t = e.target.closest('[data-go],[data-lead],[data-cust],[data-share],[data-copy],[data-toast],'+
    '[data-close],[data-scen],[data-protoclose],[data-onb],[data-region],[data-back],[data-stub],[data-backto],[data-tab8],[data-req],[data-poa],[data-cbell],[data-fee],[data-book],[data-bday],[data-bslot],[data-bconfirm],[data-invite],[data-nprefs],[data-nsave],[data-cnav],[data-perm],[data-link-adv],[data-filter],[data-sort],[data-tab],[data-crm],[data-untag],'+
    '[data-notif],[data-readall],[data-audit],[data-dl],[data-save],[data-status],[data-slug],[data-ics],[data-unfile],[data-vemail],[data-votp],[data-switch],[data-sconfirm],[data-prefilter]');
  const panel = document.getElementById('panel');
  if(!t){
    if(!e.target.closest('#panel') && !e.target.closest('#bell')) panel.classList.remove('open');
    return;
  }
  if(t.dataset.audit) audit(t.dataset.audit, state.arg || advisorUrl(state.advisor));
  /* §8 tabs */
  if(t.dataset.tab8){ state.tab8 = t.dataset.tab8; return render(); }
  /* Consent: the advisor asks; the client decides. Writes to the audit log. */
  if(t.dataset.req){
    const [id, sec] = t.dataset.req.split('|');
    state.consent[id] = state.consent[id] || {};
    state.consent[id][sec] = 'pending';
    const who = (state.customers.concat(state.leads)).find(x=>x.id===id);
    auditShared('Requested ' + sec + ' access', who ? who.name : id, id);
    toast('Access requested. ' + (who?who.name.split(' ')[0]:'They') + ' will be asked to approve it.');
    return render();
  }
  if(t.dataset.fee){ state.feePeriod = t.dataset.fee; return render(); }
  if(t.dataset.nprefs) return openModal(nprefsDrawer());
  if(t.dataset.nsave){
    const pct = +(document.getElementById('npPct')||{}).value;
    const amt = +(document.getElementById('npAmt')||{}).value;
    if(!(pct>0) || !(amt>=0)) return toast('Enter a percentage and an amount');
    state.nprefs = {pct, withdrawal:amt};
    audit('Updated notification thresholds', pct + '% / R' + amt.toLocaleString('en-US'));
    closeModal();
    renderBell();
    /* The thresholds now genuinely filter, so say what changed: this is the moment
       the setting proves it does something. */
    const n = notifShown().length;
    toast('Thresholds saved. ' + plural(n,'notification') + ' now meet them.');
    return;
  }
  if(t.dataset.book){ state.bookFor=t.dataset.book; state.bookDay=null; state.bookSlot=null;
    return openModal(bookDrawer(t.dataset.book)); }
  if(t.dataset.bday){ state.bookDay = t.dataset.bday; return openModal(bookDrawer(state.bookFor||state.arg)); }
  if(t.dataset.bslot){ state.bookSlot = t.dataset.bslot; return openModal(bookDrawer(state.bookFor||state.arg)); }
  if(t.dataset.bconfirm){
    const id = t.dataset.bconfirm;
    const who = state.customers.concat(state.leads).find(x=>x.id===id);
    const day = state.bookDay || nextDays(1)[0].v;
    const when = day + ' at ' + state.bookSlot;
    state.crm[id] = state.crm[id] || {notes:[],tags:[],tasks:[],follow:[],meets:[],files:[]};
    state.crm[id].meets.unshift({d: day, t:'Meeting ' + state.bookSlot});
    audit('Booked a meeting', (who ? who.name : id) + ' · ' + when, id);
    closeModal();
    /* This used to end in a stub asserting the invite "has gone to" the client, with
       no .ics anywhere in the build. A real VEVENT costs nothing and needs no service:
       the advisor gets a file their calendar actually opens. */
    return icsModal(who, day, state.bookSlot);
  }
  if(t.dataset.ics){
    const [id, day, slot] = t.dataset.ics.split('|');
    const who = state.customers.concat(state.leads).find(x=>x.id===id);
    downloadICS(who, day, slot);
    audit('Downloaded calendar invite', (who ? who.name : id) + ' · ' + day + ' at ' + slot, id);
    return toast('Invite downloaded. Open it to add it to your calendar.');
  }
  if(t.dataset.invite){
    const f = document.getElementById('invEmail');
    const v = (f && f.value || '').trim();
    if(!EMAIL_RE.test(v)) return toast(v ? 'That does not look like an email address' : 'Enter an email address');
    state.invites = state.invites || [];
    state.invites.unshift({email:v, sent: localISO(new Date()).slice(0,10), status:'Sent'});
    audit('Invited an advisor', v);
    if(f) f.value='';
    toast('Invite sent to ' + v);
    return render();
  }
  /* THE ROUND TRIP. The client's toggle and the advisor's locked tab are two
     views of state.consent. Flip it here, and the advisor's tab opens. */
  if(t.dataset.perm){
    const k = t.dataset.perm;
    const now = consentOf(CLIENT_ID, k);
    state.consent[CLIENT_ID][k] = now === 'granted' ? 'none' : 'granted';
    const sec = CONSENT_SECTIONS.find(s=>s.k===k);
    auditShared(now==='granted' ? 'Client revoked ' + k + ' access' : 'Client granted ' + k + ' access',
          'Lerato Khumalo (' + CLIENT_ID + ')');
    toast(now === 'granted'
      ? sec.t + ' is no longer shared with your advisor'
      : sec.t + ' is now shared with your advisor');
    return render();
  }
  if(t.dataset.cbell) return openModal(clientNotifDrawer());
  if(t.dataset.poa){
    state.poa = state.poa || {};
    const now = !!state.poa[CLIENT_ID];
    state.poa[CLIENT_ID] = !now;
    auditShared(now ? 'Client revoked power of attorney' : 'Client granted power of attorney',
                'Lerato Khumalo (' + CLIENT_ID + ')');
    toast(now ? 'Power of attorney revoked' : 'Power of attorney granted');
    return render();
  }
  if(t.dataset.linkAdv){
    const v = t.dataset.linkAdv;
    if(v === '__unlink'){
      /* Remember who it was so the client can re-link in one click. Unlinking also
         withdraws every grant — an unlinked advisor must not keep access — and that
         is exactly why re-linking cannot silently restore it. */
      state.prevAdvisor = state.linkedAdvisor;
      state.linkedAdvisor = null;
      state.consent[CLIENT_ID] = {};
      state.poa[CLIENT_ID] = false;
      auditShared('Unlinked advisor', state.prevAdvisor ? state.prevAdvisor.name : '', CLIENT_ID);
      toast('Advisor unlinked. Everything you shared has been withdrawn.');
    }
    else {
      state.linkedAdvisor = ADVISOR_DIR.find(a=>a.id===v); state.advQ='';
      if(state.prevAdvisor && state.prevAdvisor.id === v) state.prevAdvisor = null;
      auditShared('Linked advisor', state.linkedAdvisor.name, CLIENT_ID);
      toast('Linked to ' + state.linkedAdvisor.name + '. Choose what to share below.');
    }
    return render();
  }
  if(t.dataset.cnav){
    if(t.dataset.cnav !== 'Profile')
      return stubModal(t.dataset.cnav, 'This is the client\'s own Vault22 app. ' + t.dataset.cnav +
        ' is a real section of it; the prototype only builds Profile, where the Financial Advisor section lives.',
        'Out of scope: this prototype is the advisor portal. The client app is shown to demonstrate consent.');
    return render();
  }
  if(t.dataset.back) return goBack();
  /* Land on the work, not merely the page: an action row carries the filter that
     isolates the clients it is about. */
  if(t.dataset.prefilter){
    state.filters.clear();
    if(t.dataset.prefilter !== 'all') state.filters.add(t.dataset.prefilter);
    state.q = '';
  }
  if(t.dataset.go)   return go(t.dataset.go, null, t.dataset.backto ? state.route : null);
  if(t.dataset.cust){
    const c = state.customers.find(x=>x.id===t.dataset.cust);
    audit('Viewed customer profile', c ? c.name : t.dataset.cust, t.dataset.cust);
    return go('customer', t.dataset.cust, state.route); }
  if(t.dataset.lead){ state.arg=t.dataset.lead; state.tab='notes';
    /* SPEC-V2 renames Lead -> Registered User, and every other audit row names a
       person rather than an id. Resolve the name so this row reads like the rest. */
    const who = state.leads.find(x=>x.id===t.dataset.lead);
    audit('Viewed registered user', who ? who.name : t.dataset.lead, t.dataset.lead);
    return openModal(leadModal()); }
  if(t.dataset.share) return openModal(shareModal());
  if(t.dataset.close) return closeModal();
  if(t.dataset.dl){
    const cv = document.getElementById('lpQr');
    const a2 = document.createElement('a');
    a2.download = state.advisor.slug + '-vault22-qr.png';
    a2.href = cv.toDataURL('image/png'); a2.click();
    audit('Downloaded QR code', advisorUrl(state.advisor));
    return toast('QR downloaded, it is a real code, try scanning it');
  }
  if(t.dataset.copy){ navigator.clipboard?.writeText(t.dataset.copy);
    audit('Copied landing page link', advisorUrl(state.advisor)); return toast('Link copied'); }
  if(t.dataset.protoclose) return closeProto();
  if(t.dataset.scen){ loadScenario(t.dataset.scen); closeProto(); return render(); }
  /* Selecting a region updates in place, no re-render, so the screen doesn't
     flash and the advisor just carries on. */
  if(t.dataset.region){
    state.advisor.country = t.dataset.region;
    document.querySelectorAll('[data-region]').forEach(el =>
      el.classList.toggle('sel', el.dataset.region === t.dataset.region));
    const next = document.querySelector('[data-onb="verify"]');
    if(next) next.disabled = false;
    return;
  }
  if(t.dataset.onb) return goOnb(t.dataset.onb);
  if(t.dataset.filter){
    if(t.dataset.filter==='__clear'){ state.filters.clear(); state.q=''; }
    else state.filters.has(t.dataset.filter) ? state.filters.delete(t.dataset.filter)
                                             : state.filters.add(t.dataset.filter);
    return render();
  }
  if(t.dataset.sort){
    const k = t.dataset.sort;
    state.sort = state.sort.k===k ? {k, d:-state.sort.d} : {k, d:1};
    return render();
  }
  if(t.dataset.tab){ state.tab=t.dataset.tab;
    return state.route==='customer' ? render() : openModal(leadModal()); }
  if(t.dataset.unfile){
    const [id, i] = t.dataset.unfile.split('|');
    const f = state.crm[id].files.splice(+i, 1)[0];
    if(f && f.url) URL.revokeObjectURL(f.url);
    audit('Removed file', (f && f.name) || id, id);
    return state.route==='customer' ? render() : openModal(leadModal());
  }
  if(t.dataset.crm){
    const kind=t.dataset.crm, id=t.dataset.id, c=state.crm[id];
    const inp=document.getElementById('crmIn'), dt=document.getElementById('crmDate');
    if(kind==='files'){ return; }   /* handled by the real file input, see [data-cfile] */
    else {
      const v=(inp?.value||'').trim(); if(!v) return toast('Type something first');
      if(kind==='notes'){ c.notes.unshift({t:v,by:state.advisor.name.split(' ')[0],ts:localISO(new Date())}); audit('Added note', crmWho(id), id); }
      if(kind==='tags'){ if(!c.tags.includes(v)) c.tags.push(v); audit('Added tag', crmWho(id), id); }
      if(kind==='tasks'){ c.tasks.push({t:v,done:false}); audit('Added task', crmWho(id), id); }
      if(kind==='follow'){ c.follow.push({d:dt?.value||'2026-07-20',t:v}); audit('Set follow-up reminder', crmWho(id), id); }
      if(kind==='meets'){ c.meets.push({d:dt?.value||'2026-07-17',t:v}); audit('Logged meeting', crmWho(id), id); }
    }
    return state.route==='customer' ? render() : openModal(leadModal());
  }
  if(t.dataset.untag){
    const c=state.crm[t.dataset.id];
    c.tags = c.tags.filter(g=>g!==t.dataset.untag);
    return state.route==='customer' ? render() : openModal(leadModal());
  }
  if(t.dataset.notif){
    const n = state.notifs.find(x=>x.id===t.dataset.notif);
    n.unread=false; panel.classList.remove('open');
    const [kind,id]=n.go;
    if(kind==='customer'){ go('customer', id, state.route); }
    else { state.arg=id; state.tab='notes'; render(); openModal(leadModal()); }
    return renderBell();
  }
  if(t.dataset.readall){ state.notifs.forEach(n=>n.unread=false); renderBell(); return togglePanel(), togglePanel(); }
  /* §2 Save. The inputs already wrote to state via data-bind; Save re-derives what
     depends on them, records it and repaints. Initials and referral code are derived
     from the name, never stored independently, so a rename must re-derive both. */
  if(t.dataset.save){
    const a = state.advisor;
    if(!a.name.trim()) return toast('Your name cannot be empty');
    if(!EMAIL_RE.test(a.email)) return toast('That doesn’t look like an email address');
    a.initials = initialsOf(a.name);
    a.code     = refCodeOf(a.name);
    a.phone    = (a.phoneFmt||'').replace(/[^\d+]/g,'');
    audit('Updated profile', a.email);
    render();
    return toast('Profile saved. Your landing page is republished.');
  }
  /* §15 the one action power of attorney governs. The negative case is the point:
     without POA the advisor is stopped here, and the attempt is still logged. */
  if(t.dataset.switch){
    const id = t.dataset.switch;
    const p = state.customers.find(x=>x.id===id);
    if(!(state.poa||{})[id]){
      audit('Blocked: portfolio change without power of attorney', p ? p.name : id, id);
      return stubModal('You cannot change this portfolio',
        esc(p.name.split(' ')[0]) + ' has not granted you power of attorney, so Vault22 will not let you '
        + 'change their model portfolio. Ask them to grant it from their Vault22 profile, under Power of attorney.',
        '§15: advisors cannot change customer portfolios without authorisation. The attempt has been written to the audit log.');
    }
    return openModal(switchDrawer(p));
  }
  if(t.dataset.sconfirm){
    const [id, type] = t.dataset.sconfirm.split('|');
    const p = state.customers.find(x=>x.id===id);
    if(!(state.poa||{})[id]) return toast('Power of attorney is not in place');
    if(type === p.type) return toast(p.name.split(' ')[0] + ' is already on ' + type);
    const was = p.type;
    p.type = type;
    p.score = {Conservative:30,Balanced:55,Growth:75,Aggressive:90}[type] ?? p.score;
    audit('Changed model portfolio under power of attorney', p.name + ': ' + was + ' → ' + type, id);
    closeModal(); render();
    return toast(p.name.split(' ')[0] + ' moved from ' + was + ' to ' + type);
  }
  /* §1 verification handlers. */
  /* Email verification opens a code modal. Any 6-digit code the user types verifies —
     there is no mail service, so the prototype never blocks on a value it cannot send. */
  if(t.dataset.vemail) return openEmailCodeModal();
  /* Mobile is optional and verifies in one tap. */
  if(t.dataset.votp === 'verify'){
    state.verify.otp = 'verified';
    audit('Verified mobile number', state.advisor.phoneFmt);
    render();
    return toast('Mobile verified');
  }
  /* §3 rename. Reuses onboarding's slugCheck verbatim — same rules, same messages —
     and everything downstream (QR, referral URL, share targets) derives from slug. */
  if(t.dataset.slug){
    const i = document.getElementById('lp_slug');
    if(!i) return;
    const c = slugCheck(i.value);
    const msg = document.getElementById('err_slug');
    if(msg){ msg.textContent = (c.ok?'✓ ':'') + c.msg; msg.className = 'onb-check ' + c.tone; }
    if(!c.ok){ i.focus(); return; }
    const next = i.value.trim().toLowerCase();
    if(next === state.advisor.slug) return toast('That is already your website name');
    const was = state.advisor.slug;
    state.advisor.slug = next;
    audit('Renamed landing page', was + ' → ' + advisorUrl(state.advisor));
    render();
    return toast('Your page is now ' + advisorUrl(state.advisor));
  }
  /* §1 status. Suspended had no code path that assigned it. */
  if(t.dataset.status){
    state.advisor.status = t.dataset.status;
    audit('Account status changed', t.dataset.status);
    render();
    /* The switcher lives in the demo drawer now; re-open it so the change is visible
       and you can flip between states without reopening the gear each time. */
    if(t.closest('#protoDrawer')) openProto();
    return toast('Account status is now ' + t.dataset.status);
  }
  if(t.dataset.stub){
    const [title, body, note] = t.dataset.stub.split('|');
    return stubModal(title, body, note);
  }
  if(t.dataset.toast) return toast(t.dataset.toast);
});

document.getElementById('bell').addEventListener('click', e => { e.stopPropagation(); togglePanel(); });

/* Prototype settings drawer, available on every screen, onboarding included. */
function openProto(){
  document.getElementById('protoDrawer').innerHTML = protoDrawer();
  document.getElementById('protoDrawer').classList.add('open');
  document.getElementById('protoScrim').classList.add('open');
}
function closeProto(){
  document.getElementById('protoDrawer').classList.remove('open');
  document.getElementById('protoScrim').classList.remove('open');
}
const closeNav = () => document.body.classList.remove('nav-open');
document.getElementById('hamb').addEventListener('click', e => {
  e.stopPropagation();
  const open = document.body.classList.toggle('nav-open');
  e.currentTarget.setAttribute('aria-expanded', String(open));
});
document.getElementById('navScrim').addEventListener('click', closeNav);

document.getElementById('protoFab').addEventListener('click', e => { e.stopPropagation(); openProto(); });

/* Password reveal, the live app's eye toggle, nothing more. */
document.addEventListener('click', e => {
  const b = e.target.closest('[data-eye]');
  if(!b) return;
  const f = document.getElementById(b.dataset.eye);
  if(!f) return;
  const show = f.type === 'password';
  f.type = show ? 'text' : 'password';
  b.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  b.classList.toggle('on', show);
});
document.getElementById('protoScrim').addEventListener('click', closeProto);

document.addEventListener('input', e => {
  if(e.target.id==='searchIn'){
    state.q = e.target.value;
    const pos = e.target.selectionStart;
    render();
    const n = document.getElementById('searchIn');
    if(n){ n.focus(); n.setSelectionRange(pos,pos); }
  }
  /* The mandatory advisor name: URL assembles live, Continue stays disabled
     until the name is valid and available. */
  if(e.target.id==='advQ'){
    const pos = e.target.selectionStart;
    state.advQ = e.target.value; render();
    const n2 = document.getElementById('advQ');
    if(n2){ n2.focus(); n2.setSelectionRange(pos,pos); }
    return;
  }
  if(e.target.id==='slugIn'){
    /* Normalise case in the field itself rather than rejecting it, a subdomain is
       case-insensitive, so "Aishani" is a valid thing to type; it just resolves to
       "aishani". Keeps the field and the live preview showing the same string. */
    const pos = e.target.selectionStart;
    const low = e.target.value.toLowerCase();
    if(low !== e.target.value){ e.target.value = low; e.target.setSelectionRange(pos,pos); }
    const c   = slugCheck(low);
    const v   = low.trim();
    const prev = document.getElementById('slugPrev');
    const msg  = document.getElementById('slugMsg');
    const next = document.getElementById('slugNext');
    if(prev) prev.innerHTML = `<span class="${v?'s':'r'}">${esc(v || suggestSlug())}</span>` +
      `<span class="r">.advisor.vault22.com</span>`;
    if(msg){ msg.className = 'onb-check ' + c.tone; msg.textContent = (c.ok?'✓ ':'') + c.msg; }
    if(next) next.disabled = !c.ok;
  }
});
document.addEventListener('change', e => {
  if(e.target.dataset && e.target.dataset.vchk){
    state.verify[e.target.dataset.vchk] = e.target.checked;
    /* Toggle Continue directly: the button disables until email is verified and both
       policies are ticked. Done in place, not via render(), so ticking a box does not
       drop focus mid-form. */
    const cont = document.getElementById('verifyNext');
    if(cont) cont.disabled = !verifyReady();
    return;
  }
  if(e.target.id==='maskTog'){ document.body.classList.toggle('mask', e.target.checked);
    audit(e.target.checked?'Hid consent-pending data':'Revealed consent-pending data','View setting'); }
  if(e.target.dataset && e.target.dataset.task !== undefined){
    const c = state.crm[e.target.dataset.id];
    c.tasks[+e.target.dataset.task].done = e.target.checked;
    audit('Updated task', crmWho(e.target.dataset.id), e.target.dataset.id);
    state.route==='customer' ? render() : openModal(leadModal());
  }
});
document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModal(); closeProto();
  document.getElementById('panel').classList.remove('open'); } });

/* Boot into Scenario A. The advisor onboarding journey is the first thing the
   demo walks through, so it must be what you land on, booting into the
   established advisor hid it behind the demo switcher entirely. */
loadScenario('new');
render();
</script>
</body>
</html>
