<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vault22 Advisor Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Vault22 Advisor prototype
   Tokens below are verbatim from the live app's shipped CSS bundle
   (global-website.dev.vault22.com /_next/static/css/2344e4df61c424b4.css,
   extracted 17 Jul 2026 -> DESIGN-TOKENS.css).
   Surfaces are LIGHT: the live app's chrome is Tailwind-light (see
   orchestrator ffl-v4 screenshots). --v4-surface-* in the token file are
   dark-theme values used by .v4-card only, and are deliberately not used here.
   ============================================================ */
:root{
  /* ---------------------------------------------------------------
     LIVE APP CHROME, read off the live DOM at
     global-website.dev.vault22.com (computed styles + Tailwind classes).
     Cross-checked against Vault22-Insights-Todo-Prototype/styles.css,
     which was built the same way on 14 Jul 2026. These govern the shell:
     header, sidebar, page background, headings, buttons.
     --------------------------------------------------------------- */
  --page:        #F7F8FA;   /* app background */
  --green:       #01C38D;   /* bg-[#01C38D], primary action */
  --green-hover: #00A878;   /* hover:bg-[#00A878] */
  --green-05:    rgba(1,195,141,.05);
  --green-10:    rgba(1,195,141,.10);
  --heading:     #1E3A5F;   /* text-[#1E3A5F], every page heading */
  --hero:        #12283F;   /* navy hero card */
  --blue:        #3B82F6;
  --nav-idle:    #4E5159;   /* text-[#4E5159] */
  --nav-active:  #22252B;

  --g-900:#111827; --g-700:#374151; --g-600:#4B5563; --g-500:#6B7280;
  --g-400:#9CA3AF; --g-300:#D1D5DB; --g-200:#E5E7EB; --g-100:#F3F4F6; --g-50:#F9FAFB;
  --red:#EF4444; --red-400:#F87171; --amber-100:#FEF3C7; --amber-700:#B45309;

  --v4-navy-950:#050d16; --v4-navy-900:#0a1929; --v4-navy-800:#0f2236;
  --v4-navy-700:#132d46; --v4-navy-600:#1a3a5c; --v4-navy-500:#214872;
  --v4-navy-400:#4a6b92; --v4-navy-300:#7a95b8; --v4-navy-200:#a8bfd9;
  --v4-navy-100:#d4e0f0; --v4-navy-50:#f0f4f9;

  --v4-teal-950:#003329; --v4-teal-900:#004d3d; --v4-teal-800:#006b52;
  --v4-teal-700:#008968; --v4-teal-600:#00a67d; --v4-teal-500:#00d4aa;
  --v4-teal-400:#01c38d; --v4-teal-300:#33ddb3; --v4-teal-200:#66e7c6;
  --v4-teal-100:#99f1d9; --v4-teal-50:#ccf8ec;

  --v4-success:#10b981; --v4-success-dark:#059669; --v4-success-light:#34d399;
  --v4-warning:#f59e0b; --v4-warning-dark:#d97706; --v4-warning-light:#fbbf24;
  --v4-danger:#ef4444;  --v4-danger-dark:#dc2626;  --v4-danger-light:#f87171;
  --v4-info:#3b82f6;    --v4-info-dark:#2563eb;    --v4-info-light:#60a5fa;

  --v4-radius-sm:8px; --v4-radius-md:12px; --v4-radius-lg:16px;
  --v4-radius-xl:20px; --v4-radius-2xl:24px; --v4-radius-3xl:32px; --v4-radius-full:9999px;

  --v4-space-1:4px; --v4-space-2:8px; --v4-space-3:12px; --v4-space-4:16px;
  --v4-space-5:20px; --v4-space-6:24px; --v4-space-8:32px; --v4-space-10:40px;
  --v4-space-12:48px; --v4-space-16:64px; --v4-space-20:80px; --v4-space-24:96px;

  --v4-number-hero:clamp(48px,8vw,96px); --v4-number-xlarge:64px;
  --v4-number-large:48px; --v4-number-medium:32px; --v4-number-small:24px;

  --v4-shadow-sm:0 2px 8px rgba(0,0,0,0.08);
  --v4-shadow-md:0 4px 16px rgba(0,0,0,0.12);
  --v4-shadow-lg:0 8px 32px rgba(0,0,0,0.16);
  --v4-shadow-xl:0 16px 64px rgba(0,0,0,0.24);

  --v4-duration-instant:100ms; --v4-duration-fast:200ms; --v4-duration-normal:300ms;
  --v4-easing-standard:cubic-bezier(0.4,0,0.2,1);
  --v4-glow-accent:0 0 24px rgba(1,195,141,0.4);
  --v4-font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

  /* Shell aliases → LIVE APP values (not the v4-* ramps, which the bundle
     defines but the live chrome does not use, the chrome is Tailwind). */
  --surface:#ffffff;
  --canvas:var(--page);      /* #F7F8FA, live app background */
  --live-header:#F5F5F5;     /* header: h-20 bg-[#F5F5F5] — NOT white */
  --live-tile:#F1F2F4;       /* sub-tile fill, same grey as the live input */
  --live-tile-hover:#E8E9EB; /* hover:bg-[#E8E9EB] */
  --live-head:#22252B;       /* section head: text-xl font-medium text-[#22252B] */
  --live-label:#6C6F7C;      /* card label: text-base font-medium text-[#6C6F7C] */
  --live-radius:12px;        /* rounded-xl */
  --line:var(--g-200);       /* #E5E7EB, live border on pills/cards */
  --text:var(--g-900);       /* #111827, live body text */
  --muted:var(--g-500);      /* #6B7280, live secondary text */
  --sidebar-w:264px;
  --dw:460px;          /* right-hand detail drawer */

  /* Live app, read off the shipped register/login markup
     (global-website.dev.vault22.com/register). These are the real values. */
  --live-field:#F1F2F4;        /* input fill  bg-[#F1F2F4] */
  --live-field-text:#22252B;   /* text-[#22252B] */
  --live-placeholder:#D3D4D8;  /* placeholder-[#D3D4D8] */
  --live-cta:#01C38D;          /* bg-[#01C38D] */
  --live-cta-hover:#00B07D;    /* hover:bg-[#00B07D] */
  --live-cta-text:#162B45;     /* text-[#162B45], dark on green, confirmed live */
  --live-border:#E5E7EB;       /* border-[#E5E7EB] */
  --live-ghost-hover:#F9FAFB;  /* hover:bg-[#F9FAFB] */
  --live-sub:#6B7280;          /* text-[#6B7280] */
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--v4-font-family);background:var(--canvas);color:var(--text);
  -webkit-font-smoothing:antialiased;font-feature-settings:"cv02","cv03","cv04","cv11";line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:var(--v4-info-dark)}
.num{font-variant-numeric:tabular-nums}
.hidden{display:none!important}

/* ---------- Topbar ---------- */
/* Live app: h-20 (80px) header on #F5F5F5, 28px side padding. */
.topbar{position:fixed;top:0;left:0;right:0;height:80px;background:var(--live-header);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;z-index:20;gap:var(--v4-space-4)}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:34px;display:block}
.logo .tag{font-size:11px;font-weight:600;color:var(--green-hover);background:var(--green-10);
  padding:3px 8px;border-radius:9999px;letter-spacing:.02em}
.tb-right{display:flex;align-items:center;gap:12px}
/* Live app pill: 46px tall, white, 1px g-200, fully round, 14px/600 g-700. */
.chip{display:inline-flex;align-items:center;gap:8px;height:46px;padding:0 16px;
  border:1px solid var(--g-200);border-radius:9999px;background:var(--surface);
  font-size:14px;font-weight:600;color:var(--g-700);transition:box-shadow .2s}
.chip:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.icon-btn svg{width:19px;height:19px}
.icon-btn{width:46px;height:46px;border-radius:9999px;border:1px solid var(--g-200);color:var(--text);
  background:var(--surface);display:grid;place-items:center;position:relative;font-size:15px;
  transition:box-shadow .2s}
.icon-btn:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.dot{position:absolute;top:-3px;right:-3px;min-width:20px;height:20px;border-radius:9999px;
  background:var(--red);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;
  padding:0 5px;border:2px solid #fff}
.who{display:inline-flex;align-items:center;gap:8px;height:46px;padding:0 16px 0 5px;
  border:1px solid var(--g-200);border-radius:9999px;background:var(--surface);
  font-size:14px;font-weight:600;color:var(--g-700)}
.ava{width:32px;height:32px;border-radius:var(--v4-radius-full);background:var(--v4-teal-400);
  color:var(--v4-teal-950);display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}

/* demo scenario switcher */
.seg{display:inline-flex;align-items:center;background:var(--v4-navy-50);border:1px solid var(--line);
  border-radius:var(--v4-radius-full);padding:3px;gap:2px}
.seg b{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:0 8px}
.seg button{border:0;background:none;padding:6px 12px;border-radius:var(--v4-radius-full);
  font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--v4-navy-700);color:#fff}

/* ---------- Sidebar ---------- */
/* Live app sidebar: plain white column in the shell, "Menu" heading,
   idle items #4E5159, active #22252B on a light green wash. */
.sidebar{position:fixed;top:80px;left:0;width:var(--sidebar-w);
  bottom:0;background:var(--surface);padding:24px 16px;overflow-y:auto;z-index:10}
.sb-h{font-size:17px;font-weight:700;letter-spacing:-.2px;color:var(--g-900);
  margin-bottom:var(--v4-space-4);padding-left:var(--v4-space-2)}
.nav{display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;
  border-radius:10px;border:0;background:none;width:100%;text-align:left;
  font-size:14.5px;font-weight:500;color:var(--nav-idle);position:relative;
  transition:background .2s var(--v4-easing-standard)}
.nav-item:hover{background:var(--g-50)}
.nav-item.on{background:var(--green-10);color:var(--nav-active);font-weight:600}
.nav-item .ic{width:20px;height:20px;flex:none;display:grid;place-items:center;color:var(--v4-navy-400)}
.nav-item .ic svg{width:20px;height:20px;display:block}
.nav-item.on .ic{color:var(--v4-teal-700)}
.nav-item.on .ic{opacity:1}
.nav-sep{font-size:10.5px;font-weight:700;color:var(--g-400);letter-spacing:.08em;
  text-transform:uppercase;padding:var(--v4-space-5) var(--v4-space-3) var(--v4-space-2)}
.sb-note{margin-top:var(--v4-space-4);padding:var(--v4-space-3);background:var(--v4-navy-50);
  border-radius:var(--v4-radius-md);font-size:11.5px;color:var(--muted);line-height:1.45}

/* ---------- Layout ---------- */
.main{margin-left:calc(var(--sidebar-w) + var(--v4-space-10));padding:calc(72px + var(--v4-space-6)) var(--v4-space-8) var(--v4-space-20);
  max-width:1320px}
h1{font-size:32px;font-weight:600;line-height:40px;letter-spacing:0;color:var(--text)}
h2{font-size:18px;font-weight:600;letter-spacing:-.3px}
.lede{color:var(--muted);font-size:14px;line-height:1.6;max-width:76ch;margin-top:var(--v4-space-1)}
.page-head{margin-bottom:var(--v4-space-6)}
.row{display:flex;align-items:center;gap:var(--v4-space-3)}
.between{display:flex;align-items:center;justify-content:space-between;gap:var(--v4-space-4);flex-wrap:wrap}
.mt{margin-top:var(--v4-space-4)} .mt6{margin-top:var(--v4-space-6)} .mt8{margin-top:var(--v4-space-8)}
.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:var(--v4-space-4)}
@media(max-width:1100px){.grid2{grid-template-columns:1fr}}

/* ---------- Cards ---------- */
.card{background:var(--surface);border-radius:var(--live-radius)}
.card-p{padding:var(--v4-space-6)}
.sec-t{font-size:20px;font-weight:500;color:var(--live-head);
  margin-bottom:var(--v4-space-4);letter-spacing:0}

/* Live sub-tile: bg-[#F1F2F4] rounded-xl p-3, h-[72px]. The live app's tile
   language for a figure inside a card. */
.subtile{background:var(--live-tile);border-radius:var(--live-radius);padding:var(--v4-space-3);
  transition:background var(--v4-duration-fast) var(--v4-easing-standard)}
.subtile:hover{background:var(--live-tile-hover)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--v4-space-4)}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}}

.kpi{background:var(--surface);border-radius:var(--live-radius);padding:var(--v4-space-5)}
.kpi .k{font-size:16px;color:var(--live-label);font-weight:500;margin-bottom:var(--v4-space-2)}
.kpi .v{font-size:32px;font-weight:600;letter-spacing:0;line-height:1.25;font-variant-numeric:tabular-nums}
.kpi .d{font-size:12px;color:var(--v4-navy-300);margin-top:var(--v4-space-2)}
.kpi.hero{background:var(--v4-navy-700)}
.kpi.hero .k{color:var(--v4-navy-200)} .kpi.hero .v{color:#fff} .kpi.hero .d{color:var(--v4-navy-300)}
.kpi.hero .v small{color:var(--v4-teal-400);font-size:16px;font-weight:600;letter-spacing:0}

/* ---------- Bits ---------- */
.btn{border:1px solid var(--line);background:var(--surface);color:var(--text);
  padding:10px var(--v4-space-4);border-radius:var(--v4-radius-md);font-size:14px;font-weight:600;
  display:inline-flex;align-items:center;gap:var(--v4-space-2);white-space:nowrap;
  transition:all var(--v4-duration-fast) var(--v4-easing-standard)}
.btn:hover{border-color:var(--v4-navy-200);background:var(--v4-navy-50)}
.btn-pri{background:var(--v4-navy-700);border-color:var(--v4-navy-700);color:#fff}
.btn-pri:hover{background:var(--v4-navy-600);border-color:var(--v4-navy-600)}
.btn-teal{background:var(--v4-teal-400);border-color:var(--v4-teal-400);color:var(--v4-teal-950)}
.btn-teal:hover{background:var(--v4-teal-500);border-color:var(--v4-teal-500);box-shadow:var(--v4-glow-accent)}
.btn-sm{padding:6px 10px;font-size:12.5px;border-radius:var(--v4-radius-sm);font-weight:500}
.btn:disabled{opacity:.45;cursor:not-allowed}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--v4-radius-full);
  font-size:11.5px;font-weight:600;white-space:nowrap}
.p-gray{background:var(--v4-navy-50);color:var(--v4-navy-500)}
.p-teal{background:var(--v4-teal-50);color:var(--v4-teal-800)}
.p-green{background:var(--green-10);color:var(--green-hover)}
.p-blue{background:#eff6ff;color:var(--v4-info-dark)}
.p-amber{background:#fffbeb;color:var(--v4-warning-dark)}
.p-red{background:#fef2f2;color:var(--v4-danger-dark)}

label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
/* The live app's field: 56px, grey fill, NO border, 8px radius, green focus ring.
   Applied prototype-wide, profile and landing used an invented white style. */
.inp{width:100%;height:56px;padding:0 var(--v4-space-4);border:0;
  border-radius:var(--v4-radius-sm);font-size:15px;color:var(--live-field-text);
  background:var(--live-field);outline:none}
.inp::placeholder{color:var(--live-placeholder)}
.inp:focus{box-shadow:0 0 0 2px var(--live-cta)}
textarea.inp{height:auto;padding:var(--v4-space-4);line-height:1.5}
select.inp{appearance:none}
/* Compact control: live's h-10. For search and anything sitting in a header or
   table row. 56px stays for auth/profile form fields, where it is the live pattern.
   One token doing two jobs was the bug. */
.inp-sm{height:40px;font-size:14px}
/* The search field stretches to fill its header row rather than sitting at a
   fixed 280px, which read as a short fat block. */
.search-in{flex:1;min-width:160px;max-width:420px}
/* Header row: title + count + control on one comfortable line. .card-p's 24px
   made the row tall; Patrick's spacing notes are about breathing room between
   elements, not tall chrome. */
.card-head{display:flex;align-items:center;justify-content:space-between;
  gap:var(--v4-space-4);flex-wrap:wrap;
  padding:var(--v4-space-4) var(--v4-space-6)}
.card-head h2{margin:0}
.field{margin-bottom:var(--v4-space-4)}
.opt{color:var(--v4-navy-300);font-weight:500}

/* ---------- Tables ---------- */
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:820px}
th{text-align:left;font-size:11.5px;color:var(--muted);font-weight:600;padding:12px var(--v4-space-4);
  border-bottom:1px solid var(--line);white-space:nowrap;background:var(--v4-navy-50)}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--text)}
th .ar{opacity:.4;font-size:9px;margin-left:3px}
th.act .ar{opacity:1;color:var(--v4-teal-700)}
td{padding:12px var(--v4-space-4);border-bottom:1px solid var(--v4-navy-50);white-space:nowrap}
tbody tr:last-child td{border-bottom:0}
tbody tr:hover{background:var(--v4-navy-50)}
td .nm{font-weight:600}
.sub{font-size:11.5px;color:var(--v4-navy-300)}
.empty{padding:var(--v4-space-16) var(--v4-space-6);text-align:center}
.empty .em{font-size:30px;margin-bottom:var(--v4-space-3);opacity:.5}
.empty h3{font-size:16px;font-weight:600;margin-bottom:6px}
.empty p{font-size:13.5px;color:var(--muted);max-width:40ch;margin:0 auto var(--v4-space-5)}

/* filter chips */
.chips{display:flex;gap:var(--v4-space-2);flex-wrap:wrap}
.fchip{border:1px solid var(--line);background:var(--surface);padding:6px 12px;border-radius:var(--v4-radius-full);
  font-size:12.5px;font-weight:500;color:var(--v4-navy-600)}
.fchip:hover{border-color:var(--v4-navy-200)}
.fchip.on{background:var(--v4-navy-700);border-color:var(--v4-navy-700);color:#fff}

/* ---------- consent / PII ---------- */
.pii{border-bottom:1.5px dotted var(--v4-warning);cursor:help}
body.mask .pii{color:transparent!important;background:repeating-linear-gradient(-45deg,
  var(--v4-navy-50),var(--v4-navy-50) 4px,var(--v4-navy-100) 4px,var(--v4-navy-100) 8px);
  border-radius:5px;border-bottom:0;user-select:none}
.consent{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--v4-radius-lg);
  padding:var(--v4-space-3) var(--v4-space-4);display:flex;align-items:center;justify-content:space-between;
  gap:var(--v4-space-4);font-size:12.5px;color:var(--v4-warning-dark);flex-wrap:wrap;line-height:1.5}
.switch{display:inline-flex;align-items:center;gap:var(--v4-space-2);font-weight:600;cursor:pointer;white-space:nowrap}
.switch input{accent-color:var(--v4-warning);width:15px;height:15px;cursor:pointer}

/* ---------- Modal / panel ---------- */
/* Stephen, twice: "this should open in layer from right hand side (not pop up)"
   and "the main dashboard should not be cut off by the layer that opens on the
   right it should adjust so you can see data in both windows". So: a right-hand
   drawer, no dark scrim, and the shell shrinks to sit beside it. */
.rdrawer{position:fixed;top:0;right:0;bottom:0;width:var(--dw);background:var(--surface);
  box-shadow:var(--v4-shadow-xl);z-index:60;overflow-y:auto;padding:var(--v4-space-6);display:none}
.rdrawer.open{display:block}
body.dw-open .main{margin-right:var(--dw)}
body.dw-open .foot{margin-right:var(--dw)}
body.dw-open .topbar{right:var(--dw)}
.main,.foot,.topbar{transition:margin-right var(--v4-duration-normal) var(--v4-easing-standard),
  right var(--v4-duration-normal) var(--v4-easing-standard)}
.x{border:0;background:none;font-size:22px;color:var(--muted);line-height:1;padding:4px}
.panel{position:fixed;top:78px;right:var(--v4-space-6);width:380px;max-height:74vh;overflow-y:auto;
  background:var(--surface);border-radius:var(--v4-radius-xl);box-shadow:var(--v4-shadow-lg);z-index:50;display:none}
.panel.open{display:block}
.nt{display:flex;gap:var(--v4-space-3);padding:var(--v4-space-3) var(--v4-space-4);
  border-bottom:1px solid var(--v4-navy-50);cursor:pointer;text-align:left;border:0;background:none;width:100%}
.nt:hover{background:var(--v4-navy-50)}
.nt .em{font-size:15px;margin-top:1px}
.nt .t{font-size:13px;font-weight:600;color:var(--text)}
.nt .m{font-size:12px;color:var(--muted);margin-top:1px;white-space:normal;line-height:1.45}
.nt .a{font-size:11px;color:var(--v4-navy-300);margin-top:3px}
.nt.unread{background:var(--v4-teal-50)}
.nt.unread:hover{background:var(--v4-teal-100)}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:var(--v4-space-1);border-bottom:1px solid var(--line);
  margin-bottom:var(--v4-space-5);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{border:0;background:none;padding:10px var(--v4-space-4);font-size:13.5px;font-weight:600;
  color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;
  white-space:nowrap;flex:none}
.tab:hover{color:var(--text)}
.tab.on{color:var(--v4-navy-900);border-bottom-color:var(--v4-teal-400)}

/* ---------- misc ---------- */
.bar{height:8px;border-radius:var(--v4-radius-full);background:var(--v4-navy-50);overflow:hidden}
.bar i{display:block;height:100%;background:var(--v4-teal-400);border-radius:var(--v4-radius-full)}
.arow{display:flex;align-items:center;gap:var(--v4-space-3);margin-bottom:var(--v4-space-2);font-size:13px}
.arow .lb{width:120px;color:var(--muted);flex:none}
.arow .bar{flex:1} .arow .pc{width:42px;text-align:right;font-weight:600}
.dl{display:grid;grid-template-columns:1fr 1fr;gap:var(--v4-space-4)}
.dl .t{font-size:12px;color:var(--muted);margin-bottom:2px}
.dl .v{font-size:15px;font-weight:600}
.tl{position:relative;padding-left:var(--v4-space-6)}
.tl::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-i{position:relative;padding-bottom:var(--v4-space-5)}
.tl-i:last-child{padding-bottom:0}
.tl-i::before{content:'';position:absolute;left:-23px;top:4px;width:12px;height:12px;border-radius:50%;
  background:var(--v4-teal-400);border:2px solid var(--surface);box-shadow:0 0 0 2px var(--v4-teal-100)}
.tl-t{font-size:13.5px;font-weight:600} .tl-d{font-size:11.5px;color:var(--v4-navy-300);margin-top:1px}
.qr{background:#fff;border:1px solid var(--line);border-radius:var(--v4-radius-md);padding:var(--v4-space-2)}
.qr canvas{display:block;width:100%;height:auto;image-rendering:pixelated}
.list-row{display:flex;align-items:center;justify-content:space-between;gap:var(--v4-space-3);
  padding:11px 0;border-bottom:1px solid var(--v4-navy-50);font-size:13.5px}
.list-row:last-child{border-bottom:0}
.note{background:var(--v4-navy-50);border-radius:var(--v4-radius-md);padding:var(--v4-space-3);
  font-size:13px;line-height:1.55;margin-bottom:var(--v4-space-2)}
.note .meta{font-size:11px;color:var(--v4-navy-300);margin-top:var(--v4-space-2)}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--v4-radius-full);
  font-size:11.5px;font-weight:600;background:var(--v4-teal-50);color:var(--v4-teal-800)}
.tag button{border:0;background:none;color:inherit;opacity:.6;font-size:13px;line-height:1;padding:0}
.tag button:hover{opacity:1}
.stepper{display:flex;align-items:center;gap:var(--v4-space-2);margin-bottom:var(--v4-space-6);flex-wrap:wrap}
.step{display:flex;align-items:center;gap:var(--v4-space-2);font-size:12.5px;font-weight:600;color:var(--v4-navy-300)}
.step .n{width:24px;height:24px;border-radius:var(--v4-radius-full);background:var(--v4-navy-50);
  display:grid;place-items:center;font-size:11px}
.step.on{color:var(--v4-navy-900)} .step.on .n{background:var(--v4-teal-400);color:var(--v4-teal-950)}
.step.done .n{background:var(--v4-teal-50);color:var(--v4-teal-700)}
.step-sep{width:16px;height:1px;background:var(--line)}
.lp{border:1px solid var(--line);border-radius:var(--v4-radius-lg);overflow:hidden}
.lp-ban{height:96px;background:linear-gradient(120deg,var(--v4-navy-700),var(--v4-navy-500))}
.lp-b{padding:0 var(--v4-space-5) var(--v4-space-5)}
.lp-av{width:64px;height:64px;border-radius:var(--v4-radius-full);border:3px solid var(--surface);
  background:var(--v4-teal-400);color:var(--v4-teal-950);margin-top:-32px;display:grid;place-items:center;
  font-weight:700;font-size:20px}
.svc{display:flex;gap:var(--v4-space-2);flex-wrap:wrap}
.funnel-row{display:flex;align-items:center;gap:var(--v4-space-3);margin-bottom:6px;font-size:12.5px}
.funnel-row .lb{width:172px;color:var(--muted);flex:none}
.funnel-row .tr{flex:1;height:26px;background:var(--v4-navy-50);border-radius:var(--v4-radius-sm);overflow:hidden}
.funnel-row .fl{height:100%;background:var(--v4-teal-400);border-radius:var(--v4-radius-sm);
  display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;
  font-weight:700;color:var(--v4-teal-950);min-width:22px}
.foot{margin-left:calc(var(--sidebar-w) + var(--v4-space-10));padding:var(--v4-space-5) var(--v4-space-8);
  font-size:12px;color:var(--v4-navy-300)}
.toast{position:fixed;bottom:var(--v4-space-6);left:50%;transform:translateX(-50%);
  background:var(--v4-navy-800);color:#fff;padding:12px var(--v4-space-5);border-radius:var(--v4-radius-md);
  font-size:13px;z-index:60;box-shadow:var(--v4-shadow-lg);max-width:540px;text-align:center;line-height:1.5}

/* ============================================================
   Onboarding, happens BEFORE the dashboard exists.
   Split-screen shell mirroring the live onboarding prototype
   (~/Downloads/Vault22-Onboarding-Prototype): form left ~52%,
   green brand panel right ~48%. While onboarding runs there is no
   app shell at all, no topbar, no sidebar, no nav, no avatar.
   ============================================================ */
body.onboarding .topbar, body.onboarding .sidebar,
body.onboarding .main, body.onboarding .foot{display:none}
body:not(.onboarding) #onbRoot{display:none}

.onb{display:flex;min-height:100vh;background:var(--surface)}
.onb__form{flex:1 1 41%;display:flex;flex-direction:column;
  padding:var(--v4-space-8) var(--v4-space-10) var(--v4-space-10);overflow-y:auto;max-height:100vh}
.onb__formwrap{width:100%;max-width:428px;margin:0 auto;flex:1;
  display:flex;flex-direction:column;justify-content:center}
.onb__top{display:flex;align-items:center;gap:var(--v4-space-3);min-height:34px}
/* Live serves the entire green panel (mark, wordmark, shareholder logos) as one
   image, so we use the same image rather than rebuilding it from parts. */
.onb__brand{flex:1 1 59%;margin:var(--v4-space-4) var(--v4-space-4) var(--v4-space-4) 0;
  border-radius:var(--v4-radius-2xl);overflow:hidden;display:flex;
  align-items:center;justify-content:center;background:var(--v4-teal-700)}
.onb__brand img{width:100%;height:100%;object-fit:cover;display:block}
.onb__brand .bmark{width:60px;height:60px}
.onb__brand .bword{font-size:34px;font-weight:800;letter-spacing:-.5px;margin-top:-8px}
.brand-tagline{text-align:center;font-size:15px;line-height:1.55;
  color:rgba(255,255,255,.92);max-width:340px;font-weight:500}
.shareholders{position:absolute;bottom:var(--v4-space-12);left:0;right:0;text-align:center}
.sh-label{opacity:.72;margin-bottom:var(--v4-space-2);letter-spacing:.07em;
  text-transform:uppercase;font-size:10px;font-weight:700}
.sh-row{display:flex;gap:var(--v4-space-8);justify-content:center;flex-wrap:wrap;
  opacity:.92;font-weight:700;letter-spacing:.3px;font-size:12px}

.urlbar{display:flex;align-items:center;gap:var(--v4-space-2);background:var(--v4-navy-50);
  border:1px solid var(--line);border-radius:var(--v4-radius-full);
  padding:7px var(--v4-space-4);font-size:12.5px;color:var(--muted)}
.urlbar b{color:var(--text);font-weight:600}

.progress{display:flex;align-items:center;gap:var(--v4-space-2);margin:var(--v4-space-5) 0 var(--v4-space-2)}
.progress .seg{height:5px;flex:1;background:var(--v4-navy-50);border-radius:var(--v4-radius-full)}
.progress .seg.done{background:linear-gradient(90deg,var(--v4-teal-400),var(--v4-teal-500))}
.progress .label{font-size:11.5px;color:var(--muted);font-weight:600;
  white-space:nowrap;margin-left:var(--v4-space-2)}
/* Breadcrumbs, name the current step; completed ones are clickable back-nav. */
.crumbs{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:var(--v4-space-2)}
.crumb-i{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.crumb{font-size:11.5px;font-weight:600;color:var(--v4-navy-200);
  border:0;background:none;padding:0;white-space:nowrap}
.crumb.done{color:var(--v4-teal-700);cursor:pointer}
.crumb.done:hover{color:var(--v4-teal-800);text-decoration:underline}
.crumb.on{color:var(--text)}
.crumb-sep{font-size:11px;color:var(--v4-navy-200)}

/* Live register head: app icon, centred title, centred subtitle, mb-10. */
.onb-head{display:flex;flex-direction:column;align-items:center;text-align:center;
  margin-bottom:var(--v4-space-10)}
.app-icon{width:64px;height:64px;border-radius:18px;margin-bottom:var(--v4-space-4);display:block}
.onb-h1{font-size:30px;font-weight:700;letter-spacing:-.7px;color:var(--live-field-text)}
.onb-hsub{font-size:14px;color:var(--live-sub);line-height:1.5;margin-top:var(--v4-space-2);
  max-width:42ch;padding:0 var(--v4-space-4)}
.onb-form-h{font-size:20px;font-weight:700;text-align:center;margin-bottom:var(--v4-space-5);
  letter-spacing:-.3px}
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--v4-space-3)}
.pw-wrap{position:relative}
.pw-wrap .inp{padding-right:64px}          /* live: pr-16 */
.pw-eye{position:absolute;right:var(--v4-space-4);top:50%;transform:translateY(-50%);
  border:0;background:none;color:var(--live-sub);padding:4px;display:grid;place-items:center}
.pw-eye svg{width:20px;height:20px}
.pw-eye:hover,.pw-eye.on{color:var(--live-field-text)}
.or{display:flex;align-items:center;gap:var(--v4-space-3);margin:var(--v4-space-5) 0;
  color:var(--live-sub);font-size:13px}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--live-border)}
.legalnote.center{text-align:center}
.onb-title{font-size:26px;font-weight:700;letter-spacing:-.6px;margin-top:var(--v4-space-5)}
.onb-sub{color:var(--muted);font-size:14px;line-height:1.6;margin-top:6px}
.obtn{width:100%;height:56px;border:1px solid transparent;border-radius:var(--v4-radius-sm);
  padding:0 18px;font-size:15px;font-weight:600;display:flex;align-items:center;
  justify-content:center;gap:var(--v4-space-3);
  transition:background var(--v4-duration-fast) var(--v4-easing-standard)}
.obtn-pri{background:var(--live-cta);color:var(--live-cta-text)}
.obtn-pri:hover:not(:disabled){background:var(--live-cta-hover)}
.obtn-ghost{background:var(--surface);border-color:var(--live-border);color:var(--live-field-text)}
.obtn-ghost:hover{background:var(--live-ghost-hover)}
.obtn:disabled{opacity:.4;cursor:not-allowed}
.actions{margin-top:var(--v4-space-5);display:flex;flex-direction:column;gap:var(--v4-space-3)}
.legalnote{font-size:11.5px;color:var(--muted);line-height:1.55;margin-top:var(--v4-space-3)}
.center-link{text-align:center;font-size:13px;color:var(--muted);margin-top:var(--v4-space-4)}
/* Back sits inline, immediately left of the heading. */
.h1-back{display:flex;align-items:center;gap:var(--v4-space-3)}
.back-i{width:32px;height:32px;flex:none;border-radius:var(--v4-radius-full);
  border:1px solid var(--line);background:var(--surface);color:var(--muted);
  display:grid;place-items:center;font-size:19px;line-height:1;padding:0 2px 3px 0;
  transition:all var(--v4-duration-fast) var(--v4-easing-standard)}
.back-i:hover{background:var(--v4-navy-50);color:var(--text);border-color:var(--v4-navy-200)}
/* live: `self-start mb-4 p-1 hover:bg-vault-gray-100 rounded-lg` */
.back-btn{width:32px;height:32px;border-radius:var(--v4-radius-sm);border:0;background:none;
  display:grid;place-items:center;font-size:20px;color:var(--live-field-text);line-height:1}
.back-btn:hover{background:var(--v4-navy-50)}
.urlpreview{font-size:17px;font-weight:700;letter-spacing:-.3px;word-break:break-all;
  padding:var(--v4-space-3) 0}
.urlpreview .s{color:var(--v4-teal-700)}
.urlpreview .r{color:var(--v4-navy-300);font-weight:600}
.onb-check{font-size:12.5px;font-weight:600;margin-top:var(--v4-space-2);min-height:18px}
.onb-check.ok{color:var(--v4-success-dark)}
.onb-check.bad{color:var(--v4-danger-dark)}
.onb-check.idle{color:var(--v4-navy-300)}

/* Entry screen, carries the value prop, so it gets the wide column. */
.onb__formwrap--wide{max-width:540px}
.entry-mark{display:flex;align-items:center;gap:var(--v4-space-2);font-size:14px;
  color:var(--muted);font-weight:500;margin-bottom:var(--v4-space-5)}
.entry-mark svg{width:30px;height:30px}
.entry-mark b{color:var(--text);font-weight:700}
/* The live form column is 41% wide, which cannot hold a 38-character headline on
   one line at any readable size. Live centres a short headline ("Welcome to
   Vault22"); ours is long, so it wraps, centred, rather than being shrunk to fit. */
.entry-title{font-size:clamp(22px,2.1vw,30px);font-weight:700;letter-spacing:-.8px;
  line-height:1.2;text-align:center;max-width:22ch}
.entry-list{margin:0 0 var(--v4-space-2);display:flex;
  flex-direction:column;gap:var(--v4-space-3)}
.entry-li{display:flex;align-items:flex-start;gap:var(--v4-space-3);font-size:14px}
.entry-li .tick{width:22px;height:22px;border-radius:var(--v4-radius-full);flex:none;
  background:var(--v4-teal-50);color:var(--v4-teal-700);display:grid;place-items:center;
  font-size:11px;font-weight:700;margin-top:1px}
.entry-li b{font-weight:600;display:block}
.entry-li .d{color:var(--muted);font-size:13px}

/* Region cards, mirrors the investor onboarding prototype's .opt pattern. */
.opt-list{display:flex;flex-direction:column;gap:var(--v4-space-3)}
.opt{display:flex;align-items:center;gap:var(--v4-space-3);text-align:left;width:100%;
  background:var(--surface);border:1.6px solid var(--line);border-radius:var(--v4-radius-md);
  padding:15px 16px;color:var(--text);   /* buttons don't inherit body colour */
  transition:all var(--v4-duration-fast) var(--v4-easing-standard)}
.opt:hover{border-color:var(--v4-navy-200)}
.opt.sel{border-color:var(--v4-teal-400);background:var(--v4-teal-50)}
.opt-ic{width:40px;height:40px;border-radius:11px;background:var(--v4-navy-50);flex:none;
  display:grid;place-items:center;font-size:20px}
.opt.sel .opt-ic{background:var(--surface)}
.opt-body{flex:1;min-width:0}
.opt-t{font-size:15px;font-weight:700;display:block}
.opt-d{font-size:12.5px;color:var(--muted);margin-top:2px;display:block}
.opt-check{width:22px;height:22px;border-radius:var(--v4-radius-full);border:2px solid var(--v4-navy-100);
  flex:none;display:grid;place-items:center;color:transparent;font-size:11px;font-weight:700}
.opt.sel .opt-check{background:var(--v4-teal-400);border-color:var(--v4-teal-400);color:var(--v4-teal-950)}

/* Share screen, QR centred, targets on one line, no link underlines. */
.qr-center{display:flex;justify-content:center;margin:var(--v4-space-5) 0}
.share-row{display:flex;gap:var(--v4-space-2)}
.share-row .btn{flex:1;justify-content:center;padding-left:0;padding-right:0}
a.btn{text-decoration:none}
.onb a{text-decoration:none}
.link-a{color:var(--v4-info-dark);cursor:pointer;font-weight:600}

/* Prototype settings, internal QA/review control. A gear, bottom-right, on
   every screen; the scenario switcher lives inside it rather than eating a
   bar's worth of space or posing as product chrome. */
.proto-fab{position:fixed;right:var(--v4-space-5);bottom:var(--v4-space-5);z-index:80;
  width:46px;height:46px;border-radius:var(--v4-radius-full);border:0;
  background:var(--v4-navy-800);color:#fff;display:grid;place-items:center;
  box-shadow:var(--v4-shadow-lg);opacity:.62;
  transition:opacity var(--v4-duration-fast) var(--v4-easing-standard),
             transform var(--v4-duration-fast) var(--v4-easing-standard)}
.proto-fab:hover{opacity:1;transform:translateY(-1px)}
.proto-fab svg{width:21px;height:21px}
.proto-scrim{position:fixed;inset:0;background:rgba(10,25,41,.42);z-index:90;display:none}
.proto-scrim.open{display:block}
.proto-drawer{position:fixed;top:0;right:0;height:100vh;width:min(360px,94vw);z-index:91;
  background:var(--surface);box-shadow:var(--v4-shadow-xl);display:none;flex-direction:column}
.proto-drawer.open{display:flex}
.pd-head{display:flex;align-items:center;gap:var(--v4-space-3);
  padding:var(--v4-space-5);border-bottom:1px solid var(--line)}
.pd-badge{width:34px;height:34px;border-radius:var(--v4-radius-sm);flex:none;
  background:var(--v4-navy-800);color:#fff;display:grid;place-items:center;font-size:15px}
.pd-title{font-size:15px;font-weight:700;letter-spacing:-.2px}
.pd-sub{font-size:11.5px;color:var(--muted);font-weight:500}
.pd-close{margin-left:auto;width:32px;height:32px;border-radius:var(--v4-radius-sm);
  background:var(--v4-navy-50);border:0;color:var(--muted);font-size:13px}
.pd-close:hover{background:var(--v4-navy-100);color:var(--text)}
.pd-body{padding:var(--v4-space-5);overflow-y:auto}
.pd-sec{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--v4-navy-300);margin-bottom:var(--v4-space-3)}
.pd-opt{display:flex;align-items:center;gap:var(--v4-space-3);text-align:left;width:100%;
  background:var(--surface);border:1.6px solid var(--line);border-radius:var(--v4-radius-md);
  padding:13px 14px;color:var(--text);
  transition:all var(--v4-duration-fast) var(--v4-easing-standard)}
.pd-opt:hover{border-color:var(--v4-navy-200)}
.pd-opt.sel{border-color:var(--v4-teal-400);background:var(--v4-teal-50)}
.pd-opt .opt-check{width:22px;height:22px;border-radius:var(--v4-radius-full);
  border:2px solid var(--v4-navy-100);flex:none;display:grid;place-items:center;
  color:transparent;font-size:11px;font-weight:700}
.pd-opt.sel .opt-check{background:var(--v4-teal-400);border-color:var(--v4-teal-400);
  color:var(--v4-teal-950)}
.pd-note{font-size:11.5px;color:var(--muted);line-height:1.55;margin-top:var(--v4-space-4)}
  display:flex;align-items:center;gap:var(--v4-space-3);background:var(--v4-navy-800);color:#fff;
  border-radius:var(--v4-radius-full);padding:8px var(--v4-space-4);
  box-shadow:var(--v4-shadow-lg);font-size:12px}
.protobar b{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v4-navy-300)}
.protobar button{border:0;background:rgba(255,255,255,.1);color:#fff;padding:5px 11px;
  border-radius:var(--v4-radius-full);font-size:12px;font-weight:600}
.protobar button.on{background:var(--v4-teal-400);color:var(--v4-teal-950)}
.protobar .pb-note{color:var(--v4-navy-300)}

/* live: brand panel is `hidden lg:flex`, gone below 1024px */
@media(max-width:1023px){.onb__brand{display:none}.onb__form{flex:1 1 100%}}

/* ============================================================
   Mobile. Patrick: "the dashboard keeps its desktop sidebar and gets cut
   off. It needs to collapse the sidebar and stack the cards."
   Stephen: "also remove the green section on the right for all mobile."
   Target: scrollWidth === clientWidth at 390px on every route.
   ============================================================ */
.hamb{display:none;width:40px;height:40px;border:0;background:none;color:var(--text);
  place-items:center;border-radius:var(--v4-radius-sm)}
.hamb:hover{background:var(--v4-navy-50)}
.hamb svg{width:22px;height:22px}
.nav-scrim{display:none;position:fixed;inset:0;background:rgba(10,25,41,.42);z-index:94}
body.nav-open .nav-scrim{display:block}
/* anything that can exceed its column scrolls inside itself */
.tbl-scroll{max-width:100%}
.card,.kpi,.main,.page-head,.grid2>*{min-width:0}

@media(max-width:1023px){
  .hamb{display:grid}
  .topbar{padding:0 var(--v4-space-4);gap:var(--v4-space-2)}
  .topbar .chip{display:none}

const SLUG_TAKEN = ['admin','www','test','advisor','api','support','help','app','vault22'];
function slugCheck(v){
  const s = (v||'').trim().toLowerCase();
  if(!s)                      return {ok:false, tone:'idle', msg:'Choose a name to continue, this is how clients find you'};
  if(!/^[a-z0-9-]+$/.test(s)) return {ok:false, tone:'bad',  msg:'Lowercase letters, numbers and hyphens only'};
  if(s.startsWith('-') || s.endsWith('-')) return {ok:false, tone:'bad', msg:'Cannot start or end with a hyphen'};
  if(s.length < 3)            return {ok:false, tone:'bad',  msg:'At least 3 characters'};
  if(s.length > 30)           return {ok:false, tone:'bad',  msg:'At most 30 characters'};
  if(SLUG_TAKEN.includes(s))  return {ok:false, tone:'bad',  msg:s + '.advisor.vault22.com is already taken'};
  return {ok:true, tone:'ok', msg:s + '.advisor.vault22.com is available'};
}

/* Split-screen shell: form left ~52%, brand panel right ~48%. */
function onbShell({body, segs, back, urlbar, wide}){
  const done = segs ? ONB_ORDER.indexOf(segs) : -1;
  const steps = ONB_ORDER.slice(1);
  /* Segmented progress + breadcrumbs: the segments show how far along, the
     crumbs name where you are. Completed crumbs are buttons, they double as
     back navigation to any earlier step. */
  const progress = segs ? `<div class="progress">
      ${steps.map(s => `<div class="seg ${ONB_ORDER.indexOf(s) <= done ? 'done':''}"></div>`).join('')}
      <span class="label">Step ${done} of ${steps.length}</span>
    </div>
    <nav class="crumbs" aria-label="Progress">
      ${steps.map((s,i) => {
        const at = ONB_ORDER.indexOf(s), sep = i ? '<span class="crumb-sep">›</span>' : '';
        const item = at < done  ? `<button class="crumb done" data-onb="${s}">${ONB_LABEL[s]}</button>`
                   : at === done ? `<span class="crumb on" aria-current="step">${ONB_LABEL[s]}</span>`
                   : `<span class="crumb">${ONB_LABEL[s]}</span>`;
        /* sep travels with its label so a "›" never dangles at a line break */
        return `<span class="crumb-i">${sep}${item}</span>`;
      }).join('')}
    </nav>` : '';
  return `<div class="onb">
    <div class="onb__form">
      <div class="onb__top">
        ${back ? `<button class="back-btn" data-onb="${back}" aria-label="Go back">←</button>` : ''}
        <div class="urlbar">🔒 <b>${urlbar || DASH_URL}</b></div>
      </div>
      <div class="onb__formwrap ${wide?'onb__formwrap--wide':''}">${progress}${body}</div>
    </div>
    <div class="onb__brand">
      <img src="assets/img/auth-branding.png"
           alt="Vault22 - Our Shareholders: SC Ventures by Standard Chartered, Old Mutual, Franklin Templeton">
    </div>
  </div>`;
}

function goOnb(id){
  /* Sign in, mock: any credentials return the established advisor. */
  if(id === '__signin'){ loadScenario('est'); return render(); }

  /* Leaving register: capture what was typed and derive everything downstream
     from it. Empty fields block progress, never invent a value. */
  if(id === 'region'){
    const fn = document.getElementById('r_first'), ln = document.getElementById('r_last');
    const em = document.getElementById('r_email');
    if(fn && em){
      const nv = [fn.value.trim(), (ln ? ln.value.trim() : '')].filter(Boolean).join(' ');
      const ev = em.value.trim();
      state.advisor.name = nv; state.advisor.email = ev;   // keep what they typed
      /* Inline validation updates only the error node, re-rendering the whole
         screen here flashed and dropped the user's focus mid-form. */
      const setErr = (which, msg) => {
        const el = document.getElementById('err_' + which);
        if(el) el.textContent = msg || '';
      };
      setErr('name',''); setErr('email','');
      if(!nv){ state.regErr='name'; setErr('name','Enter your first name'); fn.focus(); return; }
      if(!EMAIL_RE.test(ev)){
        state.regErr='email';
        setErr('email', ev ? 'That doesn’t look like an email address' : 'Enter your email address');
        em.focus(); return;
      }
      state.regErr = null;
      state.advisor.initials = initialsOf(nv);
      state.advisor.code     = refCodeOf(nv);
      audit('Created advisor account', ev);
    }
  }
  if(id === 'verify' && !state.advisor.country){
    return toast('Choose a region to continue');     // never a silent no-op
  }

  if(id === '__done'){
    state.onboarded = true;
    state.advisor.status = 'Active';
    audit('Completed advisor onboarding', advisorUrl(state.advisor));
    return go('dashboard');
  }
  if(id === 'link'){
    const i = document.getElementById('slugIn');
    if(i){
      const c = slugCheck(i.value);
      if(!c.ok) return;                       // mandatory: cannot advance without a valid name
      state.advisor.slug = i.value.trim().toLowerCase();
      audit('Chose advisor name', advisorUrl(state.advisor));
    }
    if(!state.advisor.slug) return;
  }
  state.onb = id;
  window.scrollTo(0,0);
  render();
}
/* copy=false omits the Copy link button, for layouts that place it beside the

const LEAD_FILTERS = [
  {k:'qual', t:'Qualified', f:l=>isQual(l)},
  {k:'unqual', t:'Unqualified', f:l=>!isQual(l)},
  {k:'kyc', t:'KYC Pending', f:l=>STAGES.indexOf(l.stage)<4},
  {k:'risk', t:'Risk Pending', f:l=>l.stage==='Risk Assessment Pending'},
  {k:'hnw', t:'High Net Worth', f:l=>(l.nw||0)>=1000000},
  {k:'ffs', t:'Fitness ≥ 600', f:l=>(l.ffs||0)>=600},
  {k:'ready', t:'Ready to Invest', f:l=>l.stage==='Ready to Invest'},
  {k:'active', t:'Active this week', f:l=>(NOW-new Date(l.act))/86400000<=7}
];
function applyLeads(){
  const q = state.q.trim().toLowerCase();
  let r = state.leads.filter(l =>
    !q || [l.name,l.email,l.phone].some(v=>String(v).toLowerCase().includes(q)));
  LEAD_FILTERS.forEach(f => { if(state.filters.has(f.k)) r = r.filter(f.f); });
  const {k,d} = state.sort;
  return r.sort((a,b) => {
    const x=a[k], y=b[k];
    if(x==null) return 1; if(y==null) return -1;
    return (typeof x==='number' ? x-y : String(x).localeCompare(String(y))) * d;
  });
}

}

function spark(vals,w=280,h=54){
  const mx=Math.max(...vals), mn=Math.min(...vals), rg=(mx-mn)||1;
  const pts=vals.map((v,i)=>[i*(w/(vals.length-1)), h-((v-mn)/rg)*(h-8)-4]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L ${w} ${h} L 0 ${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;display:block">
    <path d="${area}" fill="var(--v4-teal-50)"/>
    <path d="${d}" fill="none" stroke="var(--v4-teal-400)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}
function vAnalytics(){
  const L=state.leads, C=state.customers;
  if(!L.length && !C.length) return `
    <div class="page-head"><h1>Analytics</h1><p class="lede">Your funnel and growth.</p></div>
    <div class="card"><div class="empty"><div class="em">◪</div><h3>Nothing to chart yet</h3>
      <p>Analytics appear once you have registered users coming through your link.</p>
      <button class="btn" data-share="1">Share my link</button></div></div>`;

  /* funnel: how many reached at least each stage (customers reached all) */
  const reached = STAGES.map((s,i)=> L.filter(l=>STAGES.indexOf(l.stage)>=i).length + C.length);
  const top = reached[0] || 1;
  const funnel = STAGES.map((s,i)=>`
    <div class="funnel-row"><span class="lb">${s}</span>
      <span class="tr"><span class="fl" style="width:${Math.max(4,reached[i]/top*100)}%">${reached[i]}</span></span>
    </div>`).join('') + `
    <div class="funnel-row"><span class="lb"><b>Customer</b></span>
      <span class="tr"><span class="fl" style="width:${Math.max(4,C.length/top*100)}%;background:var(--v4-navy-700);color:#fff">${C.length}</span></span>
    </div>`;

  const inv = C.reduce((s,c)=>s+c.inv,0), aua = C.reduce((s,c)=>s+c.pv,0);
  const avg = C.length ? inv/C.length : 0;
  const conv = (C.length/(L.length+C.length)*100).toFixed(1);
  const prod = {};
  C.forEach(c=>c.holdings.forEach(h=>prod[h.p]=(prod[h.p]||0)+h.mv));
  const prodTop = Object.entries(prod).sort((a,b)=>b[1]-a[1]);
  const prodMax = prodTop[0] ? prodTop[0][1] : 1;
  const MONTHS = ['Feb','Mar','Apr','May','Jun','Jul'];
  const growth = [1,2,2,3,4,5], aumSeries=[180,420,610,760,980,1240], invSeries=[90,140,120,180,240,214];

  return `
    <div class="page-head"><h1>Analytics</h1>
      <p class="lede">How your funnel is converting and where the book is growing.</p></div>

    <div class="kpis">
      <div class="kpi"><div class="k">Conversion Rate</div><div class="v">${conv}%</div>
        <div class="d">${C.length} of ${L.length+C.length} signups</div></div>
      <div class="kpi"><div class="k">Average Investment</div><div class="v">${short(avg)}</div>
        <div class="d">Per customer</div></div>
      <div class="kpi"><div class="k">AUM Growth</div><div class="v">+${short(aua-180000)}</div>
        <div class="d">Since Feb 2026</div></div>
      <div class="kpi"><div class="k">Customer Retention</div><div class="v">100%</div>
        <div class="d">No redemptions to date</div></div>
    </div>

    <div class="card card-p mt6">
      <div class="sec-t">User registration &gt; customer funnel</div>
      <p class="lede" style="margin-bottom:var(--v4-space-5)">Everyone who has reached at least each stage.
        Customers have passed every stage.</p>
      ${funnel}
    </div>

    <div class="grid2 mt6">
      <div class="card card-p">
        <div class="sec-t">Top products sold</div>
        ${prodTop.map(([p,v])=>`<div class="arow"><span class="lb" style="width:180px">${esc(p)}</span>
          <span class="bar"><i style="width:${v/prodMax*100}%"></i></span>
          <span class="pc num" style="width:56px">${short(v)}</span></div>`).join('')}
        <div class="sec-t" style="margin-top:var(--v4-space-6)">Monthly growth, new customers</div>
        ${spark(growth)}
        <div class="between sub" style="margin-top:6px">${MONTHS.map(m=>`<span>${m}</span>`).join('')}</div>
      </div>
      <div class="card card-p">
        <div class="sec-t">AUM growth (R000s)</div>
        ${spark(aumSeries)}
        <div class="between sub" style="margin-top:6px">${MONTHS.map(m=>`<span>${m}</span>`).join('')}</div>
        <div class="sec-t" style="margin-top:var(--v4-space-6)">Investment trends (R000s / month)</div>
        ${spark(invSeries)}
        <div class="between sub" style="margin-top:6px">${MONTHS.map(m=>`<span>${m}</span>`).join('')}</div>
      </div>
    </div>`;
}

/* =====================================================================
   Render + events
   ===================================================================== */
const VIEWS = {dashboard:vDashboard, leads:vLeads, customers:vCustomers, customer:vCustomer,
  risk:vRisk, portfolios:vPortfolios, analytics:vAnalytics, landing:vLanding,
  profile:vProfile, clientadvisor:vClientAdvisor, audit:vAudit};

function render(){
  /* Onboarding runs before the dashboard exists: no topbar, sidebar or nav. */
  if(!state.onboarded){
    document.body.classList.add('onboarding');
    const r = document.getElementById('onbRoot');
    r.innerHTML = (ONB[state.onb] || ONB.entry)();
    if(ONB_AFTER[state.onb]) ONB_AFTER[state.onb]();
    return;
  }
  document.body.classList.remove('onboarding');
  document.getElementById('view').innerHTML = (VIEWS[state.route]||vDashboard)();
  renderNav(); renderBell();
  const a = state.advisor;
  document.getElementById('whoName').textContent = a.name;
  document.getElementById('ava').textContent = a.initials;
  drawQR(document.getElementById('lpQr'), 'https://' + advisorUrl(a));
}
function toast(msg){
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

document.addEventListener('click', e => {
  const t = e.target.closest('[data-go],[data-lead],[data-cust],[data-share],[data-copy],[data-toast],'+
    '[data-close],[data-scen],[data-protoclose],[data-onb],[data-region],[data-back],[data-stub],[data-backto],[data-filter],[data-sort],[data-tab],[data-crm],[data-untag],'+
    '[data-notif],[data-readall],[data-audit],[data-dl]');
  const panel = document.getElementById('panel');
  if(!t){
    if(!e.target.closest('#panel') && !e.target.closest('#bell')) panel.classList.remove('open');
    return;
  }
  if(t.dataset.audit) audit(t.dataset.audit, state.arg || advisorUrl(state.advisor));
  if(t.dataset.back) return goBack();
  if(t.dataset.go)   return go(t.dataset.go, null, t.dataset.backto ? state.route : null);
  if(t.dataset.cust){ audit('Viewed customer profile', t.dataset.cust); return go('customer', t.dataset.cust, state.route); }
  if(t.dataset.lead){ state.arg=t.dataset.lead; state.tab='notes';
    audit('Viewed lead', t.dataset.lead); return openModal(leadModal()); }
  if(t.dataset.share) return openModal(shareModal());
  if(t.dataset.close) return closeModal();
  if(t.dataset.dl){
    const cv = document.getElementById('lpQr');
    const a2 = document.createElement('a');
    a2.download = state.advisor.slug + '-vault22-qr.png';
    a2.href = cv.toDataURL('image/png'); a2.click();
    audit('Downloaded QR code', advisorUrl(state.advisor));
    return toast('QR downloaded, it is a real code, try scanning it');
  }
  if(t.dataset.copy){ navigator.clipboard?.writeText(t.dataset.copy);
    audit('Copied landing page link', advisorUrl(state.advisor)); return toast('Link copied'); }
  if(t.dataset.protoclose) return closeProto();
  if(t.dataset.scen){ loadScenario(t.dataset.scen); closeProto(); return render(); }
  /* Selecting a region updates in place, no re-render, so the screen doesn't
     flash and the advisor just carries on. */
  if(t.dataset.region){
    state.advisor.country = t.dataset.region;
    document.querySelectorAll('[data-region]').forEach(el =>
      el.classList.toggle('sel', el.dataset.region === t.dataset.region));
    const next = document.querySelector('[data-onb="verify"]');
    if(next) next.disabled = false;
    return;
  }
  if(t.dataset.onb) return goOnb(t.dataset.onb);
  if(t.dataset.filter){
    if(t.dataset.filter==='__clear'){ state.filters.clear(); state.q=''; }
    else state.filters.has(t.dataset.filter) ? state.filters.delete(t.dataset.filter)
                                             : state.filters.add(t.dataset.filter);
    return render();
  }
  if(t.dataset.sort){
    const k = t.dataset.sort;
    state.sort = state.sort.k===k ? {k, d:-state.sort.d} : {k, d:1};
    return render();
  }
  if(t.dataset.tab){ state.tab=t.dataset.tab;
    return state.route==='customer' ? render() : openModal(leadModal()); }
  if(t.dataset.crm){
    const kind=t.dataset.crm, id=t.dataset.id, c=state.crm[id];
    const inp=document.getElementById('crmIn'), dt=document.getElementById('crmDate');
    if(kind==='files'){ c.files.push('client-document-'+(c.files.length+1)+'.pdf'); audit('Uploaded file', id); }
    else {
      const v=(inp?.value||'').trim(); if(!v) return toast('Type something first');
      if(kind==='notes'){ c.notes.unshift({t:v,by:state.advisor.name.split(' ')[0],ts:localISO(new Date())}); audit('Added note', id); }
      if(kind==='tags'){ if(!c.tags.includes(v)) c.tags.push(v); audit('Added tag', id); }
      if(kind==='tasks'){ c.tasks.push({t:v,done:false}); audit('Added task', id); }
      if(kind==='follow'){ c.follow.push({d:dt?.value||'2026-07-20',t:v}); audit('Set follow-up reminder', id); }
      if(kind==='meets'){ c.meets.push({d:dt?.value||'2026-07-17',t:v}); audit('Logged meeting', id); }
    }
    return state.route==='customer' ? render() : openModal(leadModal());
  }
  if(t.dataset.untag){
    const c=state.crm[t.dataset.id];
    c.tags = c.tags.filter(g=>g!==t.dataset.untag);
    return state.route==='customer' ? render() : openModal(leadModal());
  }
  if(t.dataset.notif){
    const n = state.notifs.find(x=>x.id===t.dataset.notif);
    n.unread=false; panel.classList.remove('open');
    const [kind,id]=n.go;
    if(kind==='customer'){ go('customer', id, state.route); }
    else { state.arg=id; state.tab='notes'; render(); openModal(leadModal()); }
    return renderBell();
  }
  if(t.dataset.readall){ state.notifs.forEach(n=>n.unread=false); renderBell(); return togglePanel(), togglePanel(); }
  if(t.dataset.stub){
    const [title, body, note] = t.dataset.stub.split('|');
    return stubModal(title, body, note);
  }
  if(t.dataset.toast) return toast(t.dataset.toast);
});

document.addEventListener('input', e => {
  if(e.target.id==='searchIn'){
    state.q = e.target.value;
    const pos = e.target.selectionStart;
    render();
    const n = document.getElementById('searchIn');
    if(n){ n.focus(); n.setSelectionRange(pos,pos); }
  }
  /* The mandatory advisor name: URL assembles live, Continue stays disabled
     until the name is valid and available. */
  if(e.target.id==='slugIn'){
    /* Normalise case in the field itself rather than rejecting it, a subdomain is
       case-insensitive, so "Aishani" is a valid thing to type; it just resolves to
       "aishani". Keeps the field and the live preview showing the same string. */
    const pos = e.target.selectionStart;
    const low = e.target.value.toLowerCase();
    if(low !== e.target.value){ e.target.value = low; e.target.setSelectionRange(pos,pos); }
    const c   = slugCheck(low);
    const v   = low.trim();
    const prev = document.getElementById('slugPrev');
    const msg  = document.getElementById('slugMsg');
    const next = document.getElementById('slugNext');
    if(prev) prev.innerHTML = `<span class="${v?'s':'r'}">${esc(v || suggestSlug())}</span>` +
      `<span class="r">.advisor.vault22.com</span>`;
    if(msg){ msg.className = 'onb-check ' + c.tone; msg.textContent = (c.ok?'✓ ':'') + c.msg; }
    if(next) next.disabled = !c.ok;
  }
});
document.addEventListener('change', e => {
  if(e.target.id==='maskTog'){ document.body.classList.toggle('mask', e.target.checked);
    audit(e.target.checked?'Hid consent-pending data':'Revealed consent-pending data','View setting'); }
  if(e.target.dataset && e.target.dataset.task !== undefined){
    const c = state.crm[e.target.dataset.id];
    c.tasks[+e.target.dataset.task].done = e.target.checked;
    audit('Updated task', e.target.dataset.id);
    state.route==='customer' ? render() : openModal(leadModal());
  }
});
document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModal(); closeProto();
  document.getElementById('panel').classList.remove('open'); } });

/* Boot into Scenario A. The advisor onboarding journey is the first thing the
   demo walks through, so it must be what you land on, booting into the
   established advisor hid it behind the demo switcher entirely. */
loadScenario('new');
render();
</script>
</body>
</html>
