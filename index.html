   tabs and this preview read the same customer record, so what the client is told they
   are sharing is exactly what the advisor then sees — the disclosure cannot drift. */
function clientPreview(sec, c, st){
  const gl = c.pv - c.inv;
  const V = {
    financial: [
      ['Net Worth', money(c.nw)], ['Total Savings', money(c.totalSav)],
      ['Monthly Savings', money(c.sav)+'/mo'], ['Financial Fitness Score', c.ffs+' / 1000'],
      ['Amount Invested', money(c.inv)], ['Monthly Income', money(c.income)],
      ['Emergency Fund', money(c.ef)], ['Total Investments', money(c.pv)],
      ['Insurance Coverage', money(c.insurance)], ['Total Liabilities', money(c.liabilities)],
      ['Financial profile report', 'Your full report']
    ],
    investment: [
      ['Current Portfolio Value', money(c.pv)],
      ['Asset Allocation', Object.entries(c.alloc).map(([k,v])=>k+' '+v+'%').join(' · ')],
      ['Products Owned', plural((c.holdings||[]).length,'product')],
      ['Invested Amount', money(c.inv)],
      ['Profit/Loss', (gl>=0?'+':'')+money(gl)],
      ['Recurring Investment', money(c.sip)+'/mo'],
      ['One-time Investments', money(c.onetime)]
    ],
    risk: [
      ['Risk Assessment Completed', fmtDate(lastRiskDate(c)) || 'Completed'],
      ['Risk Score', c.score + ' / 100'],
      ['Risk profile', c.type]
    ]
  }[sec.k] || sec.fields.map(f=>[f,'']);
  /* A table, not a list: eleven label/value pairs are tabular data and scan far better
     in two aligned columns than as a run of stacked rows. */
  return `
    <div class="ptbl-wrap">
      <table class="ptbl ${st==='granted'?'':'ptbl-off'}">
        <thead><tr><th>Detail</th><th>Value</th></tr></thead>
        <tbody>${V.map(([t,v])=>`<tr><td>${t}</td><td class="num">${v || dash}</td></tr>`).join('')}</tbody>
      </table>

    ${sec.k==='risk' ? `<div class="sub" style="margin-top:var(--v4-space-3)">
      Vault22's risk levels, lowest to highest:

        style="margin-right:4px">${t}</span>`).join('')}</div>` : ''}`;
}

/* R5 0.5: actioning a suggestion has to CHANGE something. These three build the plan, show it
 for confirmation, and then apply it to live state so holdings, portfolio value, the advisor's
 book and Analytics all move together. Note state.customers, never the CUSTOMERS_EST seed. */
function liveClient(id){ return (state.customers||[]).find(x=>x.id===id); }
function taraPlan(c, sug){
const total = sug.total || 0;
const buys = (sug.lines||[]).map(l => {
  const a = assetOf(l.ticker) || {};
  const target = Math.round(total * l.weight / 100);
  const current = currentHoldingOf(c, l.ticker);
  return {ticker:l.ticker, name:a.name || l.ticker, cls:a.cls || 'Equity',
          weight:l.weight, target, current, delta:target - current};
});
const sells = taraDisposals(c, sug.lines).map(h => ({name:h.p, mv:h.mv || 0}));
const alloc = {};
buys.forEach(b => { alloc[b.cls] = (alloc[b.cls] || 0) + b.weight; });
return {buys, sells, alloc, total,
        bought: buys.filter(b=>b.delta>0).reduce((s,b)=>s+b.delta,0),
        sold: sells.reduce((s,x)=>s+x.mv,0)};
}
function taraConfirmModal(scope){
const c = liveClient(CLIENT_ID) || {};
const sug = (state.taraSuggestion||{})[CLIENT_ID]; if(!sug) return;
const P = taraPlan(c, sug);
const one = scope && scope !== 'all';
const sellOne = one && scope.indexOf('sell:') === 0;
const buys  = one ? (sellOne ? [] : P.buys.filter(b=>b.ticker===scope)) : P.buys.filter(b=>b.delta!==0);
const sells = one ? (sellOne ? P.sells.filter(x=>x.name===scope.slice(5)) : []) : P.sells;
const row = (l, v, sub) => `<div class="list-row"><span>${esc(l)}${sub?`<div class="sub">${sub}</div>`:''}</span>
  <span class="num" style="font-weight:600">${v}</span></div>`;
return openModal(`

    <div><h2>Confirm ${one ? 'this change' : 'portfolio change'}</h2>

  ${sells.length ? `<div class="sec-t" style="font-size:14px;margin-top:var(--v4-space-4)">Selling</div>

    ${Object.entries(P.alloc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="arow">

  <div class="actions" style="margin-top:var(--v4-space-4)">
    <button class="obtn obtn-pri" data-taraexec="${esc(scope||'all')}">Confirm${one?'':' and place'}</button>
    <button class="obtn obtn-ghost" data-close="1">Cancel</button></div>
  <div class="legalnote">Prototype: no real order is placed, but your holdings, portfolio value and
    your advisor's view all update so you can see the result.</div>`);

/* Rewrites the client's holdings to the suggested portfolio, drops the disposals, and
 recomputes portfolio value and allocation. The advisor reads the same objects. */
function applyTaraSuggestion(){
const c = liveClient(CLIENT_ID); const sug = (state.taraSuggestion||{})[CLIENT_ID];
if(!c || !sug) return;
const P = taraPlan(c, sug);
c.holdings = P.buys.filter(b=>b.target>0).map(b => ({
  p:b.name, tk:b.ticker, mv:b.target, u:0, r:0, d:TODAY_STR
}));
c.pv = P.buys.reduce((s,b)=>s+b.target,0);
const alloc = {}; P.buys.forEach(b => { alloc[b.cls] = (alloc[b.cls]||0) + b.weight; });
c.alloc = alloc;
state.portfolioChanges = state.portfolioChanges || {};
(state.portfolioChanges[CLIENT_ID] = state.portfolioChanges[CLIENT_ID] || []).unshift({
  ts: localISO(new Date()), bought: P.bought, sold: P.sold, total: P.total,
  by: sug.from || 'your advisor'
});
}

const SLOTS = ['09:00','09:30','10:00','11:00','13:30','14:00','15:00','16:30'];

/* ===== Calendly-grade scheduling helpers (prototype dates are fixed off NOW) ===== */
const PROTO_TODAY = new Date(NOW.getFullYear(), NOW.getMonth(), NOW.getDate());
const TODAY_STR   = localISO(PROTO_TODAY).slice(0,10);
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WEEKDAYS_MON = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DOW_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
/* A couple of fully-booked working days, so the calendar shows genuine unavailability. */
const FULLY_BOOKED = new Set(['2026-07-22','2026-07-31','2026-08-06']);
const TZ_OPTS = [['SAST','SAST (GMT+2)'],['GMT','GMT (London)'],['CET','CET (GMT+1)'],['GST','GST Dubai (GMT+4)'],['EST','EST New York (GMT-5)']];
const LOC_OPTS = [['Video call','🎥'],['Phone','📞'],['In person','📍']];
const DUR_OPTS = [15,30,60];
const dstr = d => localISO(d).slice(0,10);
const pad2 = n => String(n).padStart(2,'0');
/* Slots run inside the advisor's own working hours (state.advisor.availability), with the
   configured buffer added between meetings. Lunch 12:00 to 13:00 stays reserved. */
function slotTimes(dur){
  const av = (state.advisor && state.advisor.availability) || {};
  const toMin = t => { const [h,m] = String(t||'').split(':').map(Number); return (h||0)*60 + (m||0); };
  const startM = toMin(av.start || '09:00');
  const endM   = toMin(av.end   || '17:00');
  const step   = dur + (Number(av.buffer) || 0);
  const out = [];
  for(let m = startM; m + dur <= endM; m += step){
    if(m >= 12*60 && m < 13*60) continue;         /* lunch */
    out.push(pad2(Math.floor(m/60)) + ':' + pad2(m%60));
  }
  return out;
}
/* Display a HH:MM in 12h or 24h. Timezone label is display-only. */
function fmtTime(hhmm, is12h){
  if(!is12h) return hhmm;
  let [h,m] = hhmm.split(':').map(Number);
  const ap = h < 12 ? 'AM' : 'PM';
  h = h % 12; if(h === 0) h = 12;
  return h + ':' + pad2(m) + ' ' + ap;
}
const isWeekendStr = s => { const d = new Date(+s.slice(0,4), +s.slice(5,7)-1, +s.slice(8,10)); return d.getDay()===0 || d.getDay()===6; };
/* A day is bookable if it is a weekday, today or later, and not fully booked. */
const dayAvailable = s => s >= TODAY_STR && !isWeekendStr(s) && !FULLY_BOOKED.has(s);
/* Slots already taken for this client on a given day (so we never double-book). */
const bookedSlotsFor = (id, day) => new Set(((state.crm[id]||{}).meets||[])
  .filter(m => m.day === day && m.slot).map(m => m.slot));
/* Open the scheduler fresh: no day/slot chosen, calendar on the current month, sensible
   meeting defaults. confirmMid is set when confirming a client-requested meeting. */
function resetBooking(id, confirmMid){
  state.bookFor = id;
  state.bookDay = null; state.bookSlot = null; state.bookConfirmMid = confirmMid || null;
  state.bookMonth = TODAY_STR.slice(0,7);

}
/* Part A.1: a meeting is one shared object both sides act on. status:
   'invited'   advisor asked the client, awaiting the client's accept/decline
   'requested' client asked the advisor, awaiting the advisor to confirm a time
   'confirmed' both sides agreed  ·  'declined' the client said no
   A seeded meeting with no status is a past logged meeting, treated as confirmed. */

const MEET_LABEL = {invited:'Awaiting client', requested:'Awaiting you', confirmed:'Confirmed', declined:'Declined'};

  Object.keys(state.crm||{}).forEach(id => (state.crm[id].meets||[]).forEach(m => {

/* The month grid: Mon-Sun header, ‹ / › navigation, past + weekend + fully-booked days
   disabled, today marked, selected filled, available days carry an availability dot. */
function bookCalendar(id){
  const monthKey = state.bookMonth || TODAY_STR.slice(0,7);
  const [my, mm] = monthKey.split('-').map(Number);
  const first = new Date(my, mm-1, 1);
  const daysInMonth = new Date(my, mm, 0).getDate();
  const lead = (first.getDay() + 6) % 7;                 /* Monday-first offset */
  const canPrev = monthKey > TODAY_STR.slice(0,7);
  const cells = [];
  for(let i=0;i<lead;i++) cells.push('<span class="cal-cell cal-empty"></span>');
  for(let d=1; d<=daysInMonth; d++){
    const ds = my + '-' + pad2(mm) + '-' + pad2(d);
    const avail = dayAvailable(ds);
    const isToday = ds === TODAY_STR;
    const on = ds === state.bookDay;
    const cls = ['cal-cell','cal-day', avail?'cal-open':'cal-off', isToday?'cal-today':'', on?'on':'']

      ? `<button class="${cls}" data-bcalday="${ds}"><span>${d}</span><i class="cal-dot"></i></button>`

/* The time column for the selected day: grouped Morning / Afternoon / Evening, with

function bookSlotColumn(id, day, dur, is12h, tz){

  const d = new Date(+day.slice(0,4), +day.slice(5,7)-1, +day.slice(8,10));

}

/* =====================================================================
   §"Also add" — Calendar: a real RFC 5545 invite.

   Built client-side as a Blob, so the advisor genuinely gets a .ics their calendar
   opens, with the client as an ATTENDEE. No calendar service is involved: what the
   real build adds is delivery (sending it to the client and writing to the linked
   calendar), not the invite itself.
   ===================================================================== */
const icsStamp = (day, hhmm) => {
  const [h, m] = (hhmm || '09:00').replace(/[^\d:]/g,'').split(':');
  return day.replace(/-/g,'') + 'T' + String(h).padStart(2,'0') + (m||'00').padStart(2,'0') + '00';
};
const icsPlus = (day, hhmm, mins) => {
  const [h, m] = (hhmm || '09:00').replace(/[^\d:]/g,'').split(':');
  const d = new Date(+day.slice(0,4), +day.slice(5,7)-1, +day.slice(8,10), +h, +(m||0) + mins);
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(d.getHours())}${p(d.getMinutes())}00`;
};
function buildICS(who, day, slot, opts){
  const a = state.advisor;
  const dur = (opts && opts.dur) || state.bookDur || 30;
  const loc = (opts && opts.loc) || state.bookLoc || 'Video call';
  /* A video/phone meeting has no physical address; fall back to the advisor's link. */
  const where = loc === 'In person' ? (a.office || a.calendar || 'Advisor office')
              : loc === 'Phone'     ? 'Phone call'
              : (a.calendar || 'Vault22 video call');
  /* CRLF line endings and an escaped SUMMARY: both are required by RFC 5545. */
  return [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Vault22//Advisor//EN','CALSCALE:GREGORIAN',
    'METHOD:REQUEST','BEGIN:VEVENT',
    'UID:' + day.replace(/-/g,'') + '-' + (who?who.id:'x') + '@vault22.com',
    'DTSTAMP:' + icsStamp(day, slot) + 'Z',
    'DTSTART:' + icsStamp(day, slot),
    'DTEND:'   + icsPlus(day, slot, dur),
    'SUMMARY:Vault22 review with ' + (a.name || 'your advisor'),
    'DESCRIPTION:A ' + dur + '-minute portfolio review (' + loc.toLowerCase() + ') booked through Vault22 Advisor.',
    'ORGANIZER;CN=' + (a.name||'Advisor') + ':mailto:' + (a.email||'advisor@vault22.com'),
    who ? 'ATTENDEE;CN=' + who.name + ';RSVP=TRUE:mailto:' + who.email : '',
    'LOCATION:' + where,
    'END:VEVENT','END:VCALENDAR'
  ].filter(Boolean).join('\r\n');
}
function downloadICS(who, day, slot, opts){
  const blob = new Blob([buildICS(who, day, slot, opts)], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const el = document.createElement('a');
  el.href = url;
  el.download = 'vault22-' + (who ? who.name.toLowerCase().replace(/\s+/g,'-') : 'meeting') + '-' + day + '.ics';
  document.body.appendChild(el); el.click(); el.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

/* P3.20: persist the whole demo to sessionStorage so an accidental refresh mid-demo keeps
   uploaded docs, consent grants, notes and Tara drafts. Keyed by BUILD_VERSION so a new
   deploy always starts clean (no cross-version state). state.filters is a Set, handled here. */
const SESSION_KEY = () => 'v22adv:' + (typeof BUILD_VERSION!=='undefined' ? BUILD_VERSION : '0');
function saveSession(){
  try{
    sessionStorage.setItem(SESSION_KEY(), JSON.stringify(state,
      (k,v)=> v instanceof Set ? {__set:[...v]} : v));
  }catch(_){ /* quota or private mode: skip silently */ }
}
function restoreSession(){
  try{
    const raw = sessionStorage.getItem(SESSION_KEY());
    if(!raw) return false;
    const snap = JSON.parse(raw, (k,v)=> v && v.__set ? new Set(v.__set) : v);
    Object.keys(snap).forEach(k => { state[k] = snap[k]; });
    if(!(state.filters instanceof Set)) state.filters = new Set();
    return true;
  }catch(_){ return false; }
}
/* R5 0.2: render() rewrites #view wholesale, so the browser drops scroll position. Genuine
   navigation SHOULD go to the top (go() calls scrollTo(0,0)); an in-place toggle should not.
   Use this for any control that repaints the page you are already reading. */
function renderKeepingScroll(){
  const y = window.scrollY;
  render();
  window.scrollTo(0, y);
}
function render(){
  /* §2.1/§2.2 themes, applied before any early return so every branch honours them.
     Navy accent is advisor-only; the client app always stays green. */
  saveSession();
  /* P3.23: themes simplified to Green (consumer) vs Navy (advisor). A persisted
     'midnavy' from an older session is coerced to navy. */
  if(state.viewTheme === 'midnavy') state.viewTheme = 'navy';
  document.body.classList.toggle('dark', state.mode === 'dark');
  const advTheme = state.scen !== 'client' ? state.viewTheme : 'green';
  document.body.classList.toggle('theme-navy', advTheme === 'navy');
  /* Defect 4: drop a lingering toast only when the SCREEN changes (real navigation), so
     same-screen feedback (add note, save, toggle) still shows but nothing bleeds across. */
  const screenKey = [state.scen, state.onboarded, state.onb, state.route, state.arg,
    state.tara && state.tara.custId, state.scen==='client' && state.ctab].join('|');
  if(screenKey !== _lastScreen){ clearToasts(); _lastScreen = screenKey; }
  /* §2: Tara personalisation is a full-screen takeover (advisor scenario only). Reuse
     the onboarding approach: hide the app shell, render into #onbRoot, return early. */
  if(state.tara && state.scen !== 'client'){
    document.body.classList.remove('client-app');
    document.body.classList.add('onboarding');
    document.getElementById('onbRoot').innerHTML = taraScreen();
    return;
  }
  /* The client scenario is a different product: the main Vault22 app, not the
     advisor portal. It replaces the shell entirely. */
  if(state.scen === 'client'){
    document.body.classList.add('onboarding');      /* hides the advisor shell */
    document.body.classList.add('client-app');
    document.getElementById('onbRoot').innerHTML = vClientProfile();
    return;
  }
  document.body.classList.remove('client-app');
  /* Onboarding runs before the dashboard exists: no topbar, sidebar or nav. */
  if(!state.onboarded){
    document.body.classList.add('onboarding');
    const r = document.getElementById('onbRoot');
    r.innerHTML = (ONB[state.onb] || ONB.entry)();
    if(ONB_AFTER[state.onb]) ONB_AFTER[state.onb]();
    return;
  }
  document.body.classList.remove('onboarding');
  /* R5 0.6: name the surface honestly. The admin scenario is Vault22 staff, not an advisor. */
  const _tag = document.getElementById('shellTag');
  if(_tag) _tag.textContent = state.scen === 'admin' ? 'Admin' : 'Advisor';
  const view = document.getElementById('view');
  view.innerHTML = (VIEWS[state.route]||vDashboard)();
  /* Back button, applied in ONE place rather than pasted into each view.
     Every route already set state.backTo correctly, but only two templates happened
     to call backArrow(), so eight screens reached from the dashboard had no way back.
     Injecting it here means a new view cannot forget it and this cannot drift again. */
  if(state.backTo){
    const h1 = view.querySelector('.page-head h1, h1');
    if(h1 && !h1.querySelector('[data-back]')){
      h1.classList.add('h1-back');
      h1.insertAdjacentHTML('afterbegin', backArrow());
    }
  }
  renderNav(); renderBell();
  const a = state.advisor;
  document.documentElement.style.setProperty('--lp-theme', a.theme || '#01c38d');
  document.getElementById('whoName').textContent = a.name;
  document.getElementById('ava').textContent = a.initials;
  drawQR(document.getElementById('lpQr'), 'https://' + advisorUrl(a));
  drawQR(document.getElementById('invQr'), 'https://vault22.com/advisor?ref=' + (a.code||''));
}
/* Defect 4: a toast belongs to the action that fired it. Only one at a time (a new toast
   replaces the last), and any visible toast is cleared on navigation / re-render (see
   render()), so it never bleeds onto an unrelated screen. */
function toast(msg){
  document.querySelectorAll('.toast').forEach(x=>x.remove());
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ if(t.isConnected) t.remove(); }, 2400);
}
const clearToasts = () => document.querySelectorAll('.toast').forEach(x=>x.remove());

/* Defect 1: live-typed fields must NOT re-render the whole view on each keystroke (that
   destroys the focused input and races the caret restore, corrupting the value, e.g.
   "750000" becoming "5795000"). Instead re-run the current view/screen builder and swap
   only the named results region in place, leaving the focused input untouched. */
function liveRegion(regionId, build){
  const live = document.getElementById(regionId); if(!live) return;
  const tmp = document.createElement('div'); tmp.innerHTML = build();
  const fresh = tmp.querySelector('#'+regionId);
  if(fresh) live.innerHTML = fresh.innerHTML;
}

    a2.download = state.advisor.slug + '-vault22-qr.png';
    a2.href = cv.toDataURL('image/png'); a2.click();
    state.setup = state.setup || {}; state.setup.qr = true;   /* P0.1: ticks the checklist */
    audit('Downloaded QR code', advisorUrl(state.advisor));
    return toast('QR downloaded, it is a real code, try scanning it');
  }
  if(t.dataset.copy){ navigator.clipboard?.writeText(t.dataset.copy);
    audit('Copied landing page link', advisorUrl(state.advisor)); return toast('Link copied'); }
  if(t.dataset.protoclose) return closeProto();
  if(t.dataset.scen){ loadScenario(t.dataset.scen); closeProto(); closeModal(); return render(); }
  /* Selecting a region updates in place, no re-render, so the screen doesn't
     flash and the advisor just carries on. */
  if(t.dataset.region){
    state.advisor.country = t.dataset.region;
    document.querySelectorAll('[data-region]').forEach(el =>
      el.classList.toggle('sel', el.dataset.region === t.dataset.region));
    const next = document.querySelector('[data-onb="verify"]');
    if(next) next.disabled = false;
    return;
  }
  if(t.dataset.onb) return goOnb(t.dataset.onb);
  if(t.dataset.filter){
    if(t.dataset.filter==='__clear'){ state.filters.clear(); state.q=''; }
    else if(t.dataset.filter==='__allqual'){ state.filters.delete('qual'); state.filters.delete('unqual'); }
    else state.filters.has(t.dataset.filter) ? state.filters.delete(t.dataset.filter)
                                             : state.filters.add(t.dataset.filter);
    return render();
  }
  if(t.dataset.sort){
    const k = t.dataset.sort;
    state.sort = state.sort.k===k ? {k, d:-state.sort.d} : {k, d:1};
    return render();
  }
  if(t.dataset.auditf === '__clear'){ state.auditFilter = {who:'',act:'',date:''}; return render(); }
  /* §6 add / cancel a document. */
  if(t.dataset.doccancel){ state.docDraft = null; state.docReqDraft = null; return render(); }
  /* P1.5: open/preview a document. No real file store, so build a placeholder PDF that
     stands in for the uploaded document (name, type, dates). */
  if(t.dataset.docview){
    const [name, type, date, expiry] = t.dataset.docview.split('|');
    downloadPdf([
      'VAULT22 ADVISOR', 'Document preview', '',
      'File: ' + name, 'Type: ' + type,
      'Uploaded: ' + (fmtDate(date) || 'n/a'), 'Expiry: ' + (fmtDate(expiry) || 'No expiry'), '',
      'This is a prototype placeholder. In the live build this opens the real uploaded',
      'document from secure storage.'
    ], (name || 'document').replace(/\.[^.]+$/,'') + '.pdf');
    audit('Opened document', name);
    return toast('Opening ' + name);
  }
  if(t.dataset.docsave){
    const [scope, id] = t.dataset.docsave.split(':');
    const name = (document.getElementById('docName')||{}).value?.trim();
    const type = (document.getElementById('docType')||{}).value;
    const expiry = (document.getElementById('docExpiry')||{}).value || null;
    if(!name) return toast('Give the document a name');
    if(!type) return toast('Choose a document type');   /* P2.12: no silent default */
    const rec = {did:newDid(), name, type, date: localISO(new Date()).slice(0,10), expiry, status:'received'};
    const key = scope === 'client' ? CLIENT_ID : id;
    state.docs = state.docs || {}; (state.docs[key] = state.docs[key] || []).unshift(rec);
    if(scope === 'client') auditShared('Client uploaded document', name + ' (' + type + ')', CLIENT_ID);
    else { const who = state.customers.concat(state.leads).find(x=>x.id===id);
      audit('Uploaded document', (who ? who.name + ' · ' : '') + name + ' (' + type + ')', id); }
    state.docDraft = null;
    toast(name + ' added');
    return render();
  }
  /* Part A.2: advisor requests a document from the client. */
  if(t.dataset.docreq){ state.docReqDraft = {id:t.dataset.docreq, name:'', type:''}; return render(); }
  if(t.dataset.docreqsave){
    const id = t.dataset.docreqsave;
    const name = (document.getElementById('docReqName')||{}).value?.trim();
    const type = (document.getElementById('docReqType')||{}).value;
    if(!name) return toast('Name the document you need');
    if(!type) return toast('Choose a document type');   /* P2.12: no silent default */
    state.docs = state.docs || {}; (state.docs[id] = state.docs[id] || [])
      .push({did:newDid(), name, type, status:'requested'});
    const who = state.customers.concat(state.leads).find(x=>x.id===id);
    audit('Requested document from client', (who ? who.name + ' · ' : '') + name + ' (' + type + ')', id);
    if(id === CLIENT_ID){ state.clientReminders = state.clientReminders || [];
      state.clientReminders.unshift({em:'📄', t:'Your advisor asked you to upload: ' + name,
        m:'Open Documents library to upload it.', unread:true}); }
    state.docReqDraft = null;
    toast('Requested ' + name + ' from ' + (who ? who.name.split(' ')[0] : 'the client'));
    return render();
  }
  if(t.dataset.tab){ state.tab=t.dataset.tab;
    return render(); }
  if(t.dataset.unfile){
    const [id, i] = t.dataset.unfile.split('|');
    const f = state.crm[id].files.splice(+i, 1)[0];
    if(f && f.url) URL.revokeObjectURL(f.url);
    audit('Removed file', (f && f.name) || id, id);
    return render();
  }
  if(t.dataset.crm){
    const kind=t.dataset.crm, id=t.dataset.id, c=state.crm[id];
    const inp=document.getElementById('crmIn'), dt=document.getElementById('crmDate');
    if(kind==='files'){ return; }   /* handled by the real file input, see [data-cfile] */
    else {
      const v=(inp?.value||'').trim(); if(!v) return toast('Type something first');
      if(kind==='notes'){ c.notes.unshift({t:v,by:state.advisor.name.split(' ')[0],ts:localISO(new Date())}); audit('Added note', crmWho(id), id); }
      if(kind==='tags'){ if(!c.tags.includes(v)) c.tags.push(v); audit('Added tag', crmWho(id), id); }
      if(kind==='tasks'){ c.tasks.push({t:v,done:false}); audit('Added task', crmWho(id), id); }
      if(kind==='follow'){ c.follow.push({d:dt?.value||'2026-07-20',t:v}); audit('Set follow-up reminder', crmWho(id), id); }
      if(kind==='meets'){ c.meets.push({d:dt?.value||'2026-07-17',t:v}); audit('Logged meeting', crmWho(id), id); }
    }
    return render();
  }
  if(t.dataset.untag){
    const c=state.crm[t.dataset.id];
    c.tags = c.tags.filter(g=>g!==t.dataset.untag);
    return render();
  }
  if(t.dataset.notif){
    const n = state.notifs.find(x=>x.id===t.dataset.notif);
    n.unread=false; panel.classList.remove('open');
    const [kind,id]=n.go;
    /* BUG 4: registered users open the SAME full tabbed profile as customers (via the
       'customer' route), so treat 'lead' like 'customer'. Any other target routes to its
       own screen, guarded so an unknown kind can never fall through to a dead view. */
    if((kind==='customer' || kind==='lead') && id) go('customer', id, state.route);
    else go(kind && VIEWS[kind] ? kind : 'dashboard', null, state.route);
    return renderBell();
  }
  if(t.dataset.readall){ state.notifs.forEach(n=>n.unread=false); renderBell(); return togglePanel(), togglePanel(); }
  /* §2 Save. The inputs already wrote to state via data-bind; Save re-derives what
     depends on them, records it and repaints. Initials and referral code are derived
     from the name, never stored independently, so a rename must re-derive both. */
  if(t.dataset.save){
    const a = state.advisor;
    if(!a.name.trim()) return toast('Your name cannot be empty');
    if(!EMAIL_RE.test(a.email)) return toast('That doesn’t look like an email address');
    if(a.phoneFmt && !validPhone(a.phoneFmt)) return toast('Enter a valid phone number');
    a.initials = initialsOf(a.name);
    a.code     = refCodeOf(a.name);
    a.phone    = (a.phoneFmt||'').replace(/[^\d+]/g,'');
    state.setup = state.setup || {}; state.setup.landing = true;   /* P0.1: customise ticks the landing step */
    audit('Updated profile', a.email);
    closeModal();
    render();
    return toast('Profile saved. Your landing page is republished.');
  }
  /* §15 the one action power of attorney governs. The negative case is the point:
     without POA the advisor is stopped here, and the attempt is still logged. */
  if(t.dataset.switch){
    const id = t.dataset.switch;
    const p = state.customers.find(x=>x.id===id);
    if(!(state.poa||{})[id]){
      audit('Blocked: portfolio change without power of attorney', p ? p.name : id, id);
      return stubModal('You cannot change this portfolio',
        esc(p.name.split(' ')[0]) + ' has not granted you power of attorney, so Vault22 will not let you '
        + 'change their model portfolio. Ask them to grant it from their Vault22 profile, under Power of attorney.',
        '§15: advisors cannot change customer portfolios without authorisation. The attempt has been written to the audit log.');
    }
    return openModal(switchDrawer(p));
  }
  if(t.dataset.sconfirm){
    const [id, type] = t.dataset.sconfirm.split('|');
    const p = state.customers.find(x=>x.id===id);
    if(!(state.poa||{})[id]) return toast('Power of attorney is not in place');
    if(type === p.type) return toast(p.name.split(' ')[0] + ' is already on ' + type);
    const was = p.type;
    p.type = type;
    p.score = {Conservative:30,Balanced:55,Growth:75,Aggressive:90}[type] ?? p.score;
    audit('Changed model portfolio under power of attorney', p.name + ': ' + was + ' → ' + type, id);
    closeModal(); render();
    return toast(p.name.split(' ')[0] + ' moved from ' + was + ' to ' + type);
  }
  /* §1 verification handlers. */
  /* Email and mobile both open the same code modal. Any 6-digit code verifies — there
     is no mail or SMS service, so the prototype never blocks on a value it cannot send.
     Mobile stays optional: it is only a gate for Continue if the user starts it. */
  if(t.dataset.vemail) return openCodeModal('email');
  if(t.dataset.votp === 'verify') return openCodeModal('mobile');
  /* §3 rename. Reuses onboarding's slugCheck verbatim — same rules, same messages —
     and everything downstream (QR, referral URL, share targets) derives from slug. */
  if(t.dataset.slug){
    const i = document.getElementById('lp_slug');
    if(!i) return;
    const c = slugCheck(i.value);
    const msg = document.getElementById('err_slug');
    if(msg){ msg.textContent = (c.ok?'✓ ':'') + c.msg; msg.className = 'onb-check ' + c.tone; }
    if(!c.ok){ i.focus(); return; }
    const next = i.value.trim().toLowerCase();
    if(next === state.advisor.slug) return toast('That is already your website name');
    const was = state.advisor.slug;
    state.advisor.slug = next;
    audit('Renamed landing page', was + ' → ' + advisorUrl(state.advisor));
    render();
    return toast('Your page is now ' + advisorUrl(state.advisor));
  }
  /* §1 status. Suspended had no code path that assigned it. */
  if(t.dataset.status){
    state.advisor.status = t.dataset.status;
    audit('Account status changed', t.dataset.status);
    render();
    /* The switcher lives in the demo drawer now; re-open it so the change is visible
       and you can flip between states without reopening the gear each time. */
    if(t.closest('#protoDrawer')) openProto();
    return toast('Account status is now ' + t.dataset.status);
  }
  if(t.dataset.stub){
    const [title, body, note] = t.dataset.stub.split('|');
    return stubModal(title, body, note);
  }
  if(t.dataset.toast) return toast(t.dataset.toast);
});

/* §6 drag-and-drop onto a document dropzone: same outcome as clicking to pick a file. */
document.addEventListener('dragover', e => {
  const dz = e.target.closest('[data-dropzone]');
  if(dz){ e.preventDefault(); dz.classList.add('drag'); }
});
document.addEventListener('dragleave', e => {
  const dz = e.target.closest('[data-dropzone]'); if(dz) dz.classList.remove('drag');
});
document.addEventListener('drop', e => {
  const dz = e.target.closest('[data-dropzone]');
  if(!dz) return;
  e.preventDefault(); dz.classList.remove('drag');
  const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if(!file) return;
  const [scope, id] = dz.dataset.dropzone.split(':');
  state.docDraft = {scope, id: id||'', name: file.name, type: ''};   /* P2.12: no default type */
  render();
});

document.getElementById('bell').addEventListener('click', e => { e.stopPropagation(); togglePanel(); });

/* Prototype settings drawer, available on every screen, onboarding included. */
function openProto(){
  document.getElementById('protoDrawer').innerHTML = protoDrawer();
  document.getElementById('protoDrawer').classList.add('open');
  document.getElementById('protoScrim').classList.add('open');
}
function closeProto(){
  document.getElementById('protoDrawer').classList.remove('open');
  document.getElementById('protoScrim').classList.remove('open');
}
const closeNav = () => document.body.classList.remove('nav-open');
document.getElementById('hamb').addEventListener('click', e => {
  e.stopPropagation();
  const open = document.body.classList.toggle('nav-open');
  e.currentTarget.setAttribute('aria-expanded', String(open));
});
document.getElementById('navScrim').addEventListener('click', closeNav);

document.getElementById('protoFab').addEventListener('click', e => { e.stopPropagation(); openProto(); });

/* Password reveal, the live app's eye toggle, nothing more. */
document.addEventListener('click', e => {
  const b = e.target.closest('[data-eye]');
  if(!b) return;
  const f = document.getElementById(b.dataset.eye);
  if(!f) return;
  const show = f.type === 'password';
  f.type = show ? 'text' : 'password';
  b.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  b.classList.toggle('on', show);
});
document.getElementById('protoScrim').addEventListener('click', closeProto);

document.addEventListener('input', e => {
  /* Defect 3: phone fields strip anything that is not a digit or phone punctuation, live,
     preserving the caret. If the field is also two-way bound, keep state in sync. */
  if(e.target.dataset && e.target.dataset.phone !== undefined){
    const el = e.target, pos = el.selectionStart, cleaned = cleanPhone(el.value);
    if(cleaned !== el.value){ el.value = cleaned;
      try{ el.setSelectionRange(Math.max(0,pos-1), Math.max(0,pos-1)); }catch(_){} }
    if(el.dataset.bind) setPath(state, el.dataset.bind, el.value);
    return;
  }
  /* Defect 1: search/typed fields update state and rebuild only their results region in
     place (liveRegion), never re-rendering the whole view, so the caret never jumps and
     what you type is exactly what you get. */
  if(e.target.id==='searchIn'){
    state.q = e.target.value;
    return liveRegion('searchResults', VIEWS[state.route] || vDashboard);
  }
  /* §10.2 services offered: a comma-separated field maps to the services array. */
  if(e.target.dataset && e.target.dataset.services !== undefined){
    state.advisor.services = e.target.value.split(',').map(s=>s.trim()).filter(Boolean);
    return;
  }
  if(e.target.id==='portSearch'){
    state.portQ = e.target.value;
    return liveRegion('portResults', vPortfolios);
  }
  /* §2.3: Tara total invested (recomputes every line's amount live) and the universe search. */
  if(e.target.id==='taraTotal' && state.tara){
    state.tara.total = Math.max(0, +(e.target.value||'').replace(/\D/g,'') || 0);
    return liveRegion('taraLines', taraScreen);
  }
  if(e.target.id==='taraSrch' && state.tara){
    state.tara.q = e.target.value;
    return liveRegion('taraUni', taraScreen);
  }
  /* P1.5: the advisor's note to the client is stored as typed, no re-render (caret stable). */
  if(e.target.dataset && e.target.dataset.tarabind && state.tara){
    state.tara[e.target.dataset.tarabind] = e.target.value;
    return;
  }
  /* P1.3: global client search in the top bar. Filters customers + registered users and
     renders a results dropdown in place, no full re-render (caret stays put). */
  if(e.target.id === 'globalSearch'){ return renderGlobalSearch(e.target.value); }
  /* P1.6: advisor-directory search, rebuilds only the results grid in place. */
  /* §14.2 add-portfolio fields are two-way bound so a factsheet pick (which re-opens
     the drawer) does not discard what was already typed. */
  if(e.target.dataset && e.target.dataset.portfield){
    state.portDraft = state.portDraft || {};
    state.portDraft[e.target.dataset.portfield] = e.target.value;
    return;
  }
  /* The mandatory advisor name: URL assembles live, Continue stays disabled
     until the name is valid and available. */
  if(e.target.id==='advQ'){
    state.advQ = e.target.value;
    return liveRegion('advResults', vClientProfile);
  }
  if(e.target.id==='slugIn'){
    /* Normalise case in the field itself rather than rejecting it, a subdomain is
       case-insensitive, so "Aishani" is a valid thing to type; it just resolves to
       "aishani". Keeps the field and the live preview showing the same string. */
    const pos = e.target.selectionStart;
    const low = e.target.value.toLowerCase();
    if(low !== e.target.value){ e.target.value = low; e.target.setSelectionRange(pos,pos); }
    const c   = slugCheck(low);
    const v   = low.trim();
    const prev = document.getElementById('slugPrev');
    const msg  = document.getElementById('slugMsg');
    const next = document.getElementById('slugNext');
    if(prev) prev.innerHTML = `<span class="${v?'s':'r'}">${esc(v || suggestSlug())}</span>` +
      `<span class="r">.advisor.vault22.com</span>`;
    if(msg){ msg.className = 'onb-check ' + c.tone; msg.textContent = (c.ok?'✓ ':'') + c.msg; }
    if(next) next.disabled = !c.ok;
  }
});
document.addEventListener('change', e => {
  if(e.target.dataset && e.target.dataset.vchk){
    state.verify[e.target.dataset.vchk] = e.target.checked;
    /* Toggle Continue directly: the button disables until email is verified and both
       policies are ticked. Done in place, not via render(), so ticking a box does not
       drop focus mid-form. */
    const cont = document.getElementById('verifyNext');
    if(cont) cont.disabled = !verifyReady();
    return;
  }
  /* R12: switching the advisor in the request-meeting compose re-addresses it. */
  if(e.target.id==='cmpAdv'){
    state.compose = clientMeetingCompose(e.target.value);
    return openModal(composeDrawer());
  }
  /* R41: the Custom date range drives the whole analytics page. */
  if(e.target.id==='anFrom' || e.target.id==='anTo'){
    if(e.target.id==='anFrom'){ state.customFrom = e.target.value; if(state.customTo && e.target.value>state.customTo) state.customTo=e.target.value; }
    else { state.customTo = e.target.value; if(state.customFrom && e.target.value<state.customFrom) state.customFrom=e.target.value; }
    return render();
  }
  if(e.target.id==='maskTog'){ document.body.classList.toggle('mask', e.target.checked);
    audit(e.target.checked?'Hid consent-pending data':'Revealed consent-pending data','View setting'); }
  /* §14.2 add-portfolio selects (change, not input). */
  if(e.target.dataset && e.target.dataset.portfield){
    state.portDraft = state.portDraft || {};
    state.portDraft[e.target.dataset.portfield] = e.target.value;
    return;
  }
  if(e.target.dataset && e.target.dataset.portfsheet && e.target.files && e.target.files[0]){
    state.portDraft = state.portDraft || {};
    state.portDraft.factsheet = e.target.files[0].name;
    toast(e.target.files[0].name + ' attached');
    return openModal(addPortDrawer());
  }
  /* §12.2 audit filters. */
  if(e.target.dataset && e.target.dataset.auditf && e.target.dataset.auditf !== '__clear'){
    state.auditFilter = state.auditFilter || {who:'',act:'',date:''};
    state.auditFilter[e.target.dataset.auditf] = e.target.value;
    return render();
  }
  if(e.target.dataset && e.target.dataset.task !== undefined){
    const c = state.crm[e.target.dataset.id];
    c.tasks[+e.target.dataset.task].done = e.target.checked;
    audit('Updated task', crmWho(e.target.dataset.id), e.target.dataset.id);
    render();
  }
});
document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModal(); closeProto();
  document.getElementById('panel').classList.remove('open'); } });

/* Boot into Scenario A. The advisor onboarding journey is the first thing the
   demo walks through, so it must be what you land on, booting into the
   established advisor hid it behind the demo switcher entirely. */
/* P3.20: resume a mid-demo session if one was saved for this exact build; otherwise boot
   fresh into the advisor onboarding journey. */
if(!restoreSession()) loadScenario('new');
render();

/* =====================================================================
   Auto-updater. GitHub Pages serves this HTML with Cache-Control: max-age=600,
   so a browser the link was already shared with can keep showing an old build
   from its own cache. This checks the live version on load and, if the running
   page is stale, reloads once to a cache-busted URL to pull the current build.
   Guards against loops via sessionStorage; the ?v marker is stripped from the
   address bar immediately so the shared link stays clean.
   ===================================================================== */
(function autoUpdate(){
  try {
    /* Clean any ?v= cache-buster out of the address bar (cosmetic; the fresh
       content is already loaded). */
    if(location.search.indexOf('v=') !== -1 && window.history && history.replaceState){
      history.replaceState(null, '', location.pathname + location.hash);
    }
    /* Only over http(s): file:// cannot fetch, and there is nothing to update there. */
    if(location.protocol !== 'http:' && location.protocol !== 'https:') return;
    var path = location.pathname;
    fetch(path + '?v=' + Date.now(), {cache: 'no-store'})
      .then(function(r){ return r.ok ? r.text() : ''; })
      .then(function(html){
        var m = html.match(/BUILD_VERSION = '([^']+)'/);
        var live = m && m[1];
        if(!live || live === BUILD_VERSION) return;         // already current
        var KEY = 'v22-autoupdate';
        if(sessionStorage.getItem(KEY) === live) return;    // already tried this version -> avoid a loop
        sessionStorage.setItem(KEY, live);
        location.replace(path + '?v=' + encodeURIComponent(live));
      })
      .catch(function(){ /* offline or file:// — nothing to do */ });
  } catch(e){ /* never let the updater break the app */ }
})();
