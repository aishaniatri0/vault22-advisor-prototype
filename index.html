<script>
/* =====================================================================
   QR encoder, byte mode, ECC level M, versions 1-10.
   Verified byte-identical to Apple's CIQRCodeGenerator reference and
   decoded end-to-end by CIDetector across v2-v8 (see qr.js + PROTOTYPE-NOTES).
   ===================================================================== */
const GF_EXP=new Uint8Array(512), GF_LOG=new Uint8Array(256);
(function(){let x=1;for(let i=0;i<255;i++){GF_EXP[i]=x;GF_LOG[x]=i;x<<=1;if(x&0x100)x^=0x11d;}
for(let i=255;i<512;i++)GF_EXP[i]=GF_EXP[i-255];})();
const gfMul=(a,b)=>(a&&b)?GF_EXP[GF_LOG[a]+GF_LOG[b]]:0;
function rsGen(n){let g=[1];for(let i=0;i<n;i++){const ng=new Array(g.length+1).fill(0);
  for(let j=0;j<g.length;j++){ng[j]^=g[j];ng[j+1]^=gfMul(g[j],GF_EXP[i]);}g=ng;}return g;}
function rsEncode(d,n){const g=rsGen(n),r=[...d,...new Array(n).fill(0)];
  for(let i=0;i<d.length;i++){const c=r[i];if(c)for(let j=0;j<g.length;j++)r[i+j]^=gfMul(g[j],c);}
  return r.slice(d.length);}
function bch(data,poly,len){const bit=n=>{let b=0;while(n){b++;n>>=1;}return b;};
  let v=data<<(len-1);const pl=bit(poly);
  while(bit(v)>=pl)v^=poly<<(bit(v)-pl);return (data<<(len-1))|v;}
const QCAP=[0,14,26,42,62,84,106,122,152,180,213];
const QECW=[0,10,16,26,18,24,16,18,22,22,26];
const QBLK=[null,[1,16],[1,28],[1,44],[2,32],[2,43],[4,27],[4,31],[2,38,2,39],[3,36,2,37],[4,43,1,44]];
const QALN=[null,[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,26,46],[6,28,50]];
function qrMatrix(text){
  const bytes=[...new TextEncoder().encode(text)];
  let ver=0; for(let v=1;v<=10;v++) if(bytes.length<=QCAP[v]){ver=v;break;}
  if(!ver) return null;
  const bits=[], push=(v,n)=>{for(let i=n-1;i>=0;i--)bits.push((v>>i)&1);};
  push(0b0100,4); push(bytes.length,8); bytes.forEach(b=>push(b,8));
  const spec=QBLK[ver]; let totalData=0;
  for(let i=0;i<spec.length;i+=2) totalData+=spec[i]*spec[i+1];
  const capBits=totalData*8;
  for(let i=0;i<4&&bits.length<capBits;i++) bits.push(0);
  while(bits.length%8) bits.push(0);
  const cw=[]; for(let i=0;i<bits.length;i+=8) cw.push(parseInt(bits.slice(i,i+8).join(''),2));
  const PADB=[0xEC,0x11]; for(let i=0;cw.length<totalData;i++) cw.push(PADB[i%2]);
  const dB=[],eB=[]; let p=0;
  for(let i=0;i<spec.length;i+=2) for(let b=0;b<spec[i];b++){
    const d=cw.slice(p,p+spec[i+1]); p+=spec[i+1]; dB.push(d); eB.push(rsEncode(d,QECW[ver]));
  }
  const out=[], maxD=Math.max(...dB.map(b=>b.length));
  for(let i=0;i<maxD;i++) dB.forEach(b=>{if(i<b.length) out.push(b[i]);});
  for(let i=0;i<QECW[ver];i++) eB.forEach(b=>out.push(b[i]));
  const N=17+4*ver, m=Array.from({length:N},()=>new Array(N).fill(null));
  const set=(r,c,v)=>{if(r>=0&&r<N&&c>=0&&c<N) m[r][c]=v;};
  const finder=(r,c)=>{for(let i=-1;i<=7;i++)for(let j=-1;j<=7;j++){
    const on=i>=0&&i<=6&&j>=0&&j<=6&&(i===0||i===6||j===0||j===6||(i>=2&&i<=4&&j>=2&&j<=4));
    set(r+i,c+j,on?1:0);}};
  finder(0,0); finder(0,N-7); finder(N-7,0);
  for(let i=8;i<N-8;i++){const v=i%2===0?1:0; set(6,i,v); set(i,6,v);}
  QALN[ver].forEach(r=>QALN[ver].forEach(c=>{
    if((r<9&&c<9)||(r<9&&c>N-10)||(r>N-10&&c<9)) return;
    for(let i=-2;i<=2;i++)for(let j=-2;j<=2;j++)
      set(r+i,c+j,(Math.abs(i)===2||Math.abs(j)===2||(i===0&&j===0))?1:0);
  }));
  set(N-8,8,1);
  for(let i=0;i<9;i++){ if(m[8][i]===null) set(8,i,0); if(m[i][8]===null) set(i,8,0); }
  for(let i=0;i<8;i++) set(8,N-1-i,0);
  for(let i=0;i<7;i++) set(N-1-i,8,0);
  if(ver>=7) for(let i=0;i<18;i++){const r=Math.floor(i/3),c=i%3; set(N-11+c,r,0); set(r,N-11+c,0);}
  const reserved=m.map(row=>row.map(v=>v!==null));
  const dataBits=[]; out.forEach(b=>{for(let i=7;i>=0;i--)dataBits.push((b>>i)&1);});
  let bi=0, up=true;
  for(let c=N-1;c>0;c-=2){ if(c===6) c--;
    for(let k=0;k<N;k++){ const r=up?N-1-k:k;
      for(const cc of [c,c-1]) if(!reserved[r][cc]) m[r][cc]=bi<dataBits.length?dataBits[bi++]:0; }
    up=!up; }
  const MASKS=[(r,c)=>(r+c)%2===0,(r,c)=>r%2===0,(r,c)=>c%3===0,(r,c)=>(r+c)%3===0,
    (r,c)=>(Math.floor(r/2)+Math.floor(c/3))%2===0,(r,c)=>((r*c)%2)+((r*c)%3)===0,
    (r,c)=>(((r*c)%2)+((r*c)%3))%2===0,(r,c)=>(((r+c)%2)+((r*c)%3))%2===0];
  const penalty=g=>{let s=0;
    for(let r=0;r<N-1;r++)for(let c=0;c<N-1;c++)
      if(g[r][c]===g[r][c+1]&&g[r][c]===g[r+1][c]&&g[r][c]===g[r+1][c+1]) s+=3;
    for(let r=0;r<N;r++){let run=1;for(let c=1;c<N;c++){if(g[r][c]===g[r][c-1])run++;else{if(run>=5)s+=3+(run-5);run=1;}}if(run>=5)s+=3+(run-5);}
    for(let c=0;c<N;c++){let run=1;for(let r=1;r<N;r++){if(g[r][c]===g[r-1][c])run++;else{if(run>=5)s+=3+(run-5);run=1;}}if(run>=5)s+=3+(run-5);}
    let dark=0; g.forEach(row=>row.forEach(v=>dark+=v));
    s+=Math.floor(Math.abs(dark*100/(N*N)-50)/5)*10; return s;};
  let best=null,bs=Infinity;
  for(let k=0;k<8;k++){
    const g=m.map((row,r)=>row.map((v,c)=>reserved[r][c]?v:(MASKS[k](r,c)?v^1:v)));
    const fmt=bch((0b00<<3)|k,0x537,11)^0x5412;
    for(let i=0;i<15;i++){ const b=(fmt>>i)&1;
      if(i<6) g[i][8]=b; else if(i===6) g[7][8]=b; else if(i===7) g[8][8]=b;
      else if(i===8) g[8][7]=b; else g[8][14-i]=b;
      if(i<8) g[8][N-1-i]=b; else g[N-15+i][8]=b; }
    g[N-8][8]=1;
    if(ver>=7){ const vi=bch(ver,0x1f25,13);
      for(let i=0;i<18;i++){const b=(vi>>i)&1,r=Math.floor(i/3),c=i%3; g[N-11+c][r]=b; g[r][N-11+c]=b;} }
    const sc=penalty(g); if(sc<bs){bs=sc;best=g;}
  }
  return best;
}
function drawQR(cv, text){
  if(!cv) return;
  const m = qrMatrix(text); if(!m) return;
  const N=m.length, Q=2, S=Math.max(2, Math.floor(cv.clientWidth/(N+2*Q)) || 4);
  cv.width=cv.height=(N+2*Q)*S;
  const x=cv.getContext('2d');
  x.fillStyle='#fff'; x.fillRect(0,0,cv.width,cv.height);
  x.fillStyle='#0a1929';
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(m[r][c]) x.fillRect((c+Q)*S,(r+Q)*S,S,S);
}

const localISO = (d) => {

  return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate())+
         'T'+z(d.getHours())+':'+z(d.getMinutes())+':'+z(d.getSeconds());
};

   and <input type="date"> values stay ISO via localISO(); this is the display layer only.
   Accepts 'yyyy-mm-dd' or a full ISO timestamp; passes anything else through untouched. */

  if(!v) return '';
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(String(v));
  return m ? m[3]+'-'+m[2]+'-'+m[1] : String(v);

const setPath = (obj, path, v) => {
  const ks = path.split('.'), last = ks.pop();
  ks.forEach(k => { obj = obj[k] = obj[k] || {}; });
  obj[last] = v;
};

  const el = e.target.closest('[data-bind]');
  if(!el) return;
  setPath(state, el.dataset.bind, el.value);

     property rather than re-rendering, so the picker keeps focus. */
  if(el.dataset.bind === 'advisor.theme'){

const kb = n => n < 1024*1024
  ? Math.max(1, Math.round(n/1024)) + ' KB'

document.addEventListener('change', e => {
  const img = e.target.closest('[data-img]');
  if(img && img.files && img.files[0]){
    const file = img.files[0];
    if(!/^image\/(png|jpeg)$/.test(file.type)) return toast('Choose a JPEG or PNG');
    const r = new FileReader();
    r.onload = () => {
      state.advisor[img.dataset.img] = r.result;
      audit('Updated ' + img.dataset.img, file.name);
      toast(file.name + ' added');
      /* When the picker sits in the Customise drawer, re-open the drawer so the new
         image shows there without losing the other fields; otherwise repaint the page. */
      if(document.getElementById('modal').classList.contains('open')) openModal(customiseDrawer());
      else render();
    };
    return r.readAsDataURL(file);
  }
  /* Part A.3: firm page images (logo/banner) write to the shared firm object. */
  const fi = e.target.closest('[data-firmimg]');
  if(fi && fi.files && fi.files[0]){
    const file = fi.files[0];
    if(!/^image\/(png|jpeg)$/.test(file.type)) return toast('Choose a JPEG or PNG');
    const r = new FileReader();
    r.onload = () => { state.firm[fi.dataset.firmimg] = r.result; toast(file.name + ' added');
      if(document.getElementById('modal').classList.contains('open')) openModal(firmDrawer()); else render(); };
    return r.readAsDataURL(file);
  }
  /* The client's own profile picture, the live app's last 5 completion points. */
  const cp = e.target.closest('[data-cphoto]');
  if(cp && cp.files && cp.files[0]){
    const file = cp.files[0];
    if(!/^image\/(png|jpeg)$/.test(file.type)) return toast('Choose a JPEG or PNG');
    const r = new FileReader();
    r.onload = () => { state.clientPhoto = r.result; toast('Profile picture added. Profile complete.'); render(); };
    return r.readAsDataURL(file);
  }
  /* Booking timezone selector (display-only). */
  const tz = e.target.closest('[data-btz]');
  if(tz){ state.bookTz = tz.value; return openModal(bookDrawer(state.bookFor||state.arg)); }
  /* P2.14: same-firm choice as a real radio group. */
  const fr = e.target.closest('[data-firm-radio]');
  if(fr){
    state.invForm = state.invForm || {};
    state.invForm.sameFirm = fr.value === 'yes';
    if(state.invForm.sameFirm && !state.invForm.role) state.invForm.role = 'Member';
    return render();
  }
  /* P2.12: choosing a document type updates the draft and re-enables Save. */
  const dt = e.target.closest('[data-doctype]');
  if(dt){
    if(dt.dataset.doctype==='draft' && state.docDraft) state.docDraft.type = dt.value;
    if(dt.dataset.doctype==='req' && state.docReqDraft) state.docReqDraft.type = dt.value;
    return render();
  }
  /* §6 document library — capture the picked file's name, then let the advisor/user
     name it and choose a type before it is added. */
  const df = e.target.closest('[data-docfile]');
  if(df && df.files && df.files[0]){
    const [scope, id] = df.dataset.docfile.split(':');
    /* P2.12: no default type; the uploader must choose one before Save enables. */
    state.docDraft = {scope, id: id||'', name: df.files[0].name, type: ''};
    return render();
  }
  /* Part A.2: the client uploads a file to FULFIL an advisor's request; the doc flips to
     received and the advisor sees it in the same store. */
  const dff = e.target.closest('[data-docfulfil]');
  if(dff && dff.files && dff.files[0]){
    const [key, did] = dff.dataset.docfulfil.split(':');
    const doc = ((state.docs||{})[key]||[]).find(d => d.did === did);
    if(doc){ doc.status='received'; doc.date = localISO(new Date()).slice(0,10); doc.name = dff.files[0].name;
      auditShared('Client uploaded requested document', doc.name + ' (' + doc.type + ')', key);
      toast(doc.type + ' uploaded. Your advisor can see it now.'); }
    return render();
  }
  /* §12 File uploads — a real file, named by the advisor's own filesystem. */
  const cf = e.target.closest('[data-cfile]');
  if(cf && cf.files && cf.files[0]){
    const id = cf.dataset.cfile, file = cf.files[0];
    state.crm[id].files.push({
      name: file.name, size: file.size, url: URL.createObjectURL(file),
      ts: localISO(new Date())
    });
    const who = (state.customers.concat(state.leads)).find(x=>x.id===id);
    audit('Uploaded file', (who ? who.name + ' · ' : '') + file.name, id);
    toast(file.name + ' uploaded');
    return render();
  }
});

/* Mock availability: a few reserved names so the taken-state is demonstrable. */
const SLUG_TAKEN = ['admin','www','test','advisor','api','support','help','app','vault22'];
function slugCheck(v){
  const s = (v||'').trim().toLowerCase();
  if(!s)                      return {ok:false, tone:'idle', msg:'Choose a name to continue, this is how clients find you'};
  if(!/^[a-z0-9-]+$/.test(s)) return {ok:false, tone:'bad',  msg:'Lowercase letters, numbers and hyphens only'};
  if(s.startsWith('-') || s.endsWith('-')) return {ok:false, tone:'bad', msg:'Cannot start or end with a hyphen'};
  if(s.length < 3)            return {ok:false, tone:'bad',  msg:'At least 3 characters'};
  if(s.length > 30)           return {ok:false, tone:'bad',  msg:'At most 30 characters'};
  if(SLUG_TAKEN.includes(s))  return {ok:false, tone:'bad',  msg:s + '.advisor.vault22.com is already taken'};
  return {ok:true, tone:'ok', msg:s + '.advisor.vault22.com is available'};
}

/* Split-screen shell: form left ~52%, brand panel right ~48%. */
function onbShell({body, segs, back, urlbar, wide}){
  const done = segs ? ONB_ORDER.indexOf(segs) : -1;
  const steps = ONB_ORDER.slice(1);
  /* Segmented progress + breadcrumbs: the segments show how far along, the
     crumbs name where you are. Completed crumbs are buttons, they double as
     back navigation to any earlier step. */
  const progress = segs ? `<div class="progress">
      ${steps.map(s => `<div class="seg ${ONB_ORDER.indexOf(s) <= done ? 'done':''}"></div>`).join('')}
      <span class="label">Step ${done} of ${steps.length}</span>
    </div>
    <nav class="crumbs" aria-label="Progress">
      ${steps.map((s,i) => {
        const at = ONB_ORDER.indexOf(s), sep = i ? '<span class="crumb-sep">›</span>' : '';
        const item = at < done  ? `<button class="crumb done" data-onb="${s}">${ONB_LABEL[s]}</button>`
                   : at === done ? `<span class="crumb on" aria-current="step">${ONB_LABEL[s]}</span>`
                   : `<span class="crumb">${ONB_LABEL[s]}</span>`;
        /* sep travels with its label so a "›" never dangles at a line break */
        return `<span class="crumb-i">${sep}${item}</span>`;
      }).join('')}
    </nav>` : '';
  return `<div class="onb">
    <div class="onb__form">
      <div class="onb__top">
        ${back ? `<button class="back-btn" data-onb="${back}" aria-label="Go back">←</button>` : ''}
        <div class="urlbar">🔒 <b>${urlbar || DASH_URL}</b></div>
      </div>
      <div class="onb__formwrap ${wide?'onb__formwrap--wide':''}">${progress}${body}</div>
    </div>
    <div class="onb__brand">
      <img src="assets/img/auth-branding.png"
           alt="Vault22 - Our Shareholders: SC Ventures by Standard Chartered, Old Mutual, Franklin Templeton">
    </div>
  </div>`;
}

        ${verifyReady() ? '' : 'disabled'}>Continue</button></div>`
  });
};
/* The Continue gate: email verified AND both policies accepted. Drives the button's
   disabled state directly (see the vchk change handler) so it flips the instant a box
   is ticked, without a re-render stealing focus. */
const verifyReady = () => state.verify.email === 'verified'
  && state.verify.terms && state.verify.privacy;

/* Verification modal: a centred pop-up with a 6-digit code entry and a Resend that
   unlocks after a 20-second countdown. Self-contained (its own timers, not driven by
   render()). Any 6-digit code verifies — the prototype has no mail or SMS service, so
   it accepts what the user types rather than blocking on a value it cannot deliver.
   Shared by email and mobile; `channel` picks the copy and which flag it sets. */
const CODE_CHANNELS = {
  email:  {badge:'✉️', title:'Check your email',  to:() => state.advisor.email   || 'your email',
           dest:'email', label:'Verify email',  flag:'email', done:'Email verified',  act:'Verified email address',  actTgt:() => state.advisor.email},
  mobile: {badge:'📱', title:'Check your phone',  to:() => state.advisor.phoneFmt || 'your mobile',
           dest:'SMS',  label:'Verify mobile', flag:'otp',   done:'Mobile verified', act:'Verified mobile number',  actTgt:() => state.advisor.phoneFmt}
};
function openCodeModal(channel){
  const cfg = CODE_CHANNELS[channel] || CODE_CHANNELS.email;
  document.querySelectorAll('.cmodal-scrim').forEach(x => x.remove());
  const wrap = document.createElement('div');
  wrap.className = 'cmodal-scrim';
  wrap.innerHTML = `
    <div class="cmodal" role="dialog" aria-modal="true" aria-label="${cfg.label}">
      <button class="cmodal-x" aria-label="Close">×</button>
      <div class="cmodal-badge">${cfg.badge}</div>
      <h2 class="cmodal-h">${cfg.title}</h2>
      <p class="cmodal-sub">Enter the 6-digit code we sent by ${cfg.dest} to <b>${esc(cfg.to())}</b>.</p>
      <input class="cmodal-code" id="cmCode" inputmode="numeric" maxlength="6"
             placeholder="••••••" autocomplete="one-time-code" aria-label="6-digit code">
      <div class="cmodal-err" id="cmErr"></div>
      <button class="obtn obtn-pri" id="cmVerify" style="width:100%">${cfg.label}</button>
      <div class="cmodal-resend">Didn't get it?
        <button class="link-a" id="cmResend" disabled>Resend code (20s)</button></div>
    </div>`;
  document.body.appendChild(wrap);
  const $ = s => wrap.querySelector(s);
  const code = $('#cmCode'), resend = $('#cmResend'), err = $('#cmErr');
  setTimeout(() => code.focus(), 50);

  let left, iv;
  const startTimer = () => {
    left = 20; resend.disabled = true;
    resend.textContent = `Resend code (${left}s)`;
    clearInterval(iv);
    iv = setInterval(() => {
      left--;
      if(left <= 0){ clearInterval(iv); resend.disabled = false; resend.textContent = 'Resend code'; }
      else resend.textContent = `Resend code (${left}s)`;
    }, 1000);
  };
  startTimer();

  const close = () => { clearInterval(iv); wrap.remove(); };
  const verify = () => {
    const v = (code.value || '').trim();
    if(!/^\d{6}$/.test(v)){ err.textContent = 'Enter the 6-digit code'; code.focus(); return; }
    state.verify[cfg.flag] = 'verified';
    audit(cfg.act, cfg.actTgt());
    close();
    toast(cfg.done);
    render();
  };
  code.addEventListener('input', () => { err.textContent = ''; });
  code.addEventListener('keydown', e => { if(e.key === 'Enter') verify(); });
  $('#cmVerify').addEventListener('click', verify);
  resend.addEventListener('click', () => { if(!resend.disabled){ startTimer(); toast('A new code is on its way'); } });
  $('.cmodal-x').addEventListener('click', close);
  wrap.addEventListener('click', e => { if(e.target === wrap) close(); });
  wrap.addEventListener('keydown', e => { if(e.key === 'Escape') close(); });
}

function goOnb(id){
  /* Sign in, mock: any credentials return the established advisor. */
  if(id === '__signin'){ loadScenario('est'); return render(); }

  /* Leaving register: capture what was typed and derive everything downstream
     from it. Empty fields block progress, never invent a value. */
  if(id === 'region'){
    const fn = document.getElementById('r_first'), ln = document.getElementById('r_last');
    const em = document.getElementById('r_email');
    if(fn && em){
      const val = id => (document.getElementById(id)||{}).value?.trim() || '';
      const nv = [fn.value.trim(), (ln ? ln.value.trim() : '')].filter(Boolean).join(' ');
      const ev = em.value.trim();
      const pw = val('r_pass');
      state.advisor.name = nv; state.advisor.email = ev;   // keep what they typed
      /* SPEC-V2 §1 names eight fields. Five of them — password, phone, company,
         licence, referral code — used to be collected and silently dropped: the
         last three had no id at all. Capture every one of them here. */
      state.advisor.phone      = val('r_phone').replace(/[^\d+]/g,'');
      state.advisor.phoneFmt   = val('r_phone');
      state.advisor.company    = val('r_company');
      state.advisor.licence    = val('r_licence');
      state.advisor.referredBy = val('r_ref');
      /* Inline validation updates only the error node, re-rendering the whole
         screen here flashed and dropped the user's focus mid-form. */
      const setErr = (which, msg) => {
        const el = document.getElementById('err_' + which);
        if(el) el.textContent = msg || '';
      };
      setErr('name',''); setErr('email',''); setErr('pass','');
      if(!nv){ state.regErr='name'; setErr('name','Enter your first name'); fn.focus(); return; }
      if(!EMAIL_RE.test(ev)){
        state.regErr='email';
        setErr('email', ev ? 'That doesn’t look like an email address' : 'Enter your email address');
        em.focus(); return;
      }
      /* An empty password used to advance. It is a required field in §1. */
      if(pw.length < 8){
        state.regErr='pass';
        setErr('pass', pw ? 'Use at least 8 characters' : 'Choose a password');
        (document.getElementById('r_pass')||{focus(){}}).focus(); return;
      }
      /* Phone is optional here, but if given it must be a real number (Defect 3). */
      if(val('r_phone') && !validPhone(val('r_phone'))){
        state.regErr='phone';
        return toast('Enter a valid phone number, or leave it blank');
      }
      state.advisor.hasPassword = true;   // never store the password itself
      state.regErr = null;
      state.advisor.initials = initialsOf(nv);
      state.advisor.code     = refCodeOf(nv);
      audit('Created advisor account', ev);
    }
  }
  if(id === 'verify' && !state.advisor.country){
    return toast('Choose a region to continue');     // never a silent no-op
  }
  /* Leaving verify: §1's verification is a gate, not a badge. */
  if(id === 'name'){
    const v = state.verify, err = document.getElementById('err_verify');
    const stop = m => { if(err) err.textContent = m; return true; };
    if(v.email !== 'verified' && stop('Verify your email address to continue')) return;
    if(!v.terms   && stop('Accept the Terms & Conditions to continue')) return;
    if(!v.privacy && stop('Accept the Privacy Policy to continue')) return;
    if(err) err.textContent = '';
    /* Verified email + both policies is exactly what moves an advisor off
       Pending Verification — the status now has a real trigger. */
    if(state.advisor.status === 'Pending Verification'){
      state.advisor.status = 'Active';
      audit('Account verified', state.advisor.email);
    }
  }

  if(id === '__done'){
    state.onboarded = true;
    state.advisor.status = 'Active';
    if(!state.advisor.joined) state.advisor.joined = localISO(new Date()).slice(0,10);
    audit('Completed advisor onboarding', advisorUrl(state.advisor));
    return go('dashboard');
  }
  if(id === 'link'){
    const i = document.getElementById('slugIn');
    if(i){
      const c = slugCheck(i.value);
      if(!c.ok) return;                       // mandatory: cannot advance without a valid name
      state.advisor.slug = i.value.trim().toLowerCase();
      audit('Chose advisor name', advisorUrl(state.advisor));
    }
    if(!state.advisor.slug) return;
  }
  state.onb = id;
  window.scrollTo(0,0);
  render();
}
/* copy=false omits the Copy link button, for layouts that place it beside the
   link field instead (the onboarding share screen). Default keeps it, so the
   signed-off dashboard share modal is unchanged. */
function shareBtns(a, copy){
  const url = 'https://' + advisorUrl(a);
  const txt = encodeURIComponent(`Start investing with me on Vault22: ${url}`);
  const copyBtn = copy === false ? '' : `<button class="btn" data-copy="${url}">Copy link</button>`;

function vDashboard(){
  const a = state.advisor, L = state.leads, C = state.customers;
  const aua = C.reduce((s,c)=>s+c.pv,0), inv = C.reduce((s,c)=>s+c.inv,0);
  /* KYC-pending = registered users still inside the onboarding stages. Enquiries (stage
     'Enquiry', not in STAGES) are leads but not yet in KYC, so they are excluded. */
  const inKyc = l => { const i = STAGES.indexOf(l.stage); return i >= 0 && i < 4; };
  const pkyc = L.filter(inKyc).length;
  const prisk = L.filter(l=>l.stage==='Risk Assessment Pending').length;
  const conv = (L.length+C.length) ? (C.length/(L.length+C.length)*100).toFixed(1) : '0.0';
  /* Derived, not invented: registered users whose signup falls in the current month. */
  const MONTH = NOW.toISOString().slice(0,7);          // '2026-07'
  const mnu = L.filter(l => (l.signup||'').startsWith(MONTH)).length;
  const qual = L.filter(isQual).length;
  /* Name the people, not just the count: "4 pending KYC" tells an advisor nothing they
     can act on; "Thandiwe, Kabelo and 2 others" does. */
  const nameList = arr => arr.length <= 2
    ? arr.map(x=>x.name.split(' ')[0]).join(' and ')
    : arr.slice(0,2).map(x=>x.name.split(' ')[0]).join(', ') + ' and ' + (arr.length-2) + ' others';
  const kycNames  = nameList(L.filter(inKyc));
  const riskNames = nameList(L.filter(l=>l.stage==='Risk Assessment Pending'));
  /* These three were hardcoded: cutting the book to one customer moved every other KPI
     and left these frozen. All three are derivable from the book. */
  const mnc = C.filter(c => (c.since||'').startsWith(MONTH)).length;
  /* Money invested this month = every customer's recurring contribution, plus any
     one-time purchase dated this month. Both are in the data. */
  const mia = C.reduce((s,c) => s + (c.sip||0), 0)
    + C.reduce((s,c) => s + (c.holdings||[])
        .filter(h => (h.d||'').startsWith(MONTH))
        .reduce((t,h) => t + h.mv, 0), 0);
  /* Commission reuses feesFor(), the same basis the Financial tab's "Total fees earned"
     already uses, so the dashboard and the client detail agree rather than each
     asserting its own number. */
  const rev = C.reduce((s,c) => s + feesFor(c, 'This month'), 0);
  /* §4.1: AUA month-on-month delta, from PREV_PERIOD's prior portfolio values. */
  const prevAua = C.reduce((s,c) => s + ((PREV_PERIOD[c.id]||{}).pv || 0), 0);
  const auaDelta = prevAua ? ((aua - prevAua) / prevAua * 100) : 0;
  const kpi=(k,v,d,hero)=>`<div class="kpi ${hero?'hero':''}"><div class="k">${k}</div>

     are done, then it collapses and the normal dashboard shows. Ticks persist in state.setup. */

    {k:'qr',      t:'Share your QR code',          d:'Download your QR for print or WhatsApp',  done: !!setup.qr,      act:'share'}

      <div class="setup-list">${steps.map((s,i)=>`
        <div class="setup-row ${s.done?'done':''}" ${s.go?`data-go="${s.go}" data-backto="1"`:`data-${s.act}="1"`} data-setupstep="${s.k}">
          <span class="setup-ck">${s.done?'✓':i+1}</span>
          <span style="flex:1;min-width:0"><span class="setup-t">${s.t}</span><span class="setup-d">${s.d}</span></span>

  {k:'ready', t:'Ready to Invest', f:l=>l.stage==='Ready to Invest'},
  {k:'active', t:'Active this week', f:l=>(NOW-new Date(l.act))/86400000<=7}
];
function applyLeads(){
  const q = state.q.trim().toLowerCase();

    !q || [l.name,l.email,l.phone].some(v=>String(v).toLowerCase().includes(q)));
  LEAD_FILTERS.forEach(f => { if(state.filters.has(f.k)) r = r.filter(f.f); });
  const {k,d} = state.sort;
  return r.sort((a,b) => {
    const x=a[k], y=b[k];
    if(x==null) return 1; if(y==null) return -1;
    return (typeof x==='number' ? x-y : String(x).localeCompare(String(y))) * d;

/* "Has recurring" and "Active this week" both matched all five customers, so they
   rendered 5 → 5 and were indistinguishable from broken. The predicates were right;
   the seed data gave them nothing to exclude. C4's SIP has failed (see notification
   N6) and C4 last logged in over a week ago, so both now discriminate honestly. */
const CUST_FILTERS = [
  {k:'hnw', t:'High Net Worth', f:c=>c.nw>=1000000},
  {k:'ffs', t:'Fitness ≥ 700', f:c=>c.ffs>=700},
  {k:'pv', t:'Portfolio ≥ R500k', f:c=>c.pv>=500000},
  {k:'sip', t:'Has recurring', f:c=>c.sip>0 && c.sipActive!==false},
  {k:'active', t:'Active this week', f:c=>(NOW-new Date(c.lastLogin))/86400000<=7}
];
function applyCust(){
  const q = state.q.trim().toLowerCase();
  let r = state.customers.filter(c =>
    !q || [c.name,c.email,c.phone].some(v=>String(v).toLowerCase().includes(q)));
  CUST_FILTERS.forEach(f=>{ if(state.filters.has(f.k)) r = r.filter(f.f); });
  const {k,d} = state.sort;
  /* P2.12: 'fee' is a computed column (advisory fees YTD), so sort it via feesFor. */
  const keyOf = c => k==='fee' ? feesFor(c,'Year to date') : c[k];
  return r.sort((a,b)=>{
    const x=keyOf(a), y=keyOf(b);
    if(x==null) return 1; if(y==null) return -1;
    return (typeof x==='number' ? x-y : String(x).localeCompare(String(y))) * d;
  });
}
function vCustomers(){
  const C = state.customers, rows = applyCust();
  const aua = C.reduce((s,c)=>s+c.pv,0), inv = C.reduce((s,c)=>s+c.inv,0);
  if(!C.length) return `
    <div class="page-head"><h1>Customers</h1>
      <p class="lede">Registered users who have bought at least one product.</p></div>
    <div class="card"><div class="empty"><div class="em">◍</div><h3>No customers yet</h3>

  /* §13: name, risk profile, net worth, portfolio value, profit/loss, % change. KYC and
     last-activity (all customers are KYC Approved anyway) move to the detail view so the
     two new columns fit without overflow. % change is period over period from PREV_PERIOD. */
  const pchg = c => { const w = (PREV_PERIOD[c.id]||{}).pv; return w ? ((c.pv - w)/w*100) : 0; };
  /* §(2nd email): a date by each customer for their last risk assessment, so the advisor
     can scan the list for who is approaching or past their annual review (not buried in a tab). */
  const riskCell = c => {
    const d = lastRiskDate(c); if(!d) return '<span class="sub">Not done</span>';

              : days > 305 ? '<span class="pill p-amber" style="margin-left:6px">Due soon</span>' : '';
    return `<span class="sub num">${fmtDate(d)}</span>${tag}`;
  };
  const body = rows.map(c=>{
    const gl = c.pv - c.inv, ch = pchg(c);
    return `<tr class="row-go" data-cust="${c.id}">
    <td><div class="nm">${esc(c.name)}</div><div class="sub">${esc(c.email)}</div></td>
    <td><span class="pill p-teal">${c.type}</span></td>
    <td><span class="sub">${esc(acqSource(c))}</span></td>

      ${gl>=0?'+':''}${money(gl)}</td>
    <td class="num" style="color:${ch>=0?'var(--v4-success-dark)':'var(--v4-danger-dark)'}">
      ${ch>=0?'+':''}${ch.toFixed(1)}%</td>
    <td class="num">${money(feesFor(c,'Year to date'))}</td>
    <td class="num sub">${fmtDate(lastContacted(c.id)) || rel(c.lastLogin)}</td>
    <td>${riskCell(c)}</td>
    <td><button class="btn btn-sm" data-cust="${c.id}">Profile ›</button></td>
  </tr>`;}).join('');
  return `
    <div class="page-head"><h1>Customers</h1>
      <p class="lede">Registered users who have bought at least one product.</p></div>
    <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi"><div class="k">Assets Under Advice</div><div class="v">${short(aua)}</div></div>

        <input class="inp inp-sm search-in" id="searchIn" placeholder="Search name, email or phone" value="${esc(state.q)}">
      </div>
      <div id="searchResults">
      <div class="card-p" style="padding-top:0;padding-bottom:var(--v4-space-4)">
        <div class="chips">
          <span class="pill p-gray" style="align-self:center">${rows.length} of ${C.length}</span>
          ${CUST_FILTERS.map(f=>`<button class="fchip ${state.filters.has(f.k)?'on':''}" data-filter="${f.k}">${f.t}</button>`).join('')}
          ${state.filters.size?`<button class="fchip" data-filter="__clear">Clear all ✕</button>`:''}
        </div>
      </div>
      ${rows.length?`<div class="tbl-scroll"><table>

          ${th('pv','Portfolio Value')}<th>Profit/Loss</th><th>% change</th>
          ${th('fee','Fees (YTD)')}<th>Last contacted</th>
          <th>Last risk review</th><th></th></tr></thead>
        <tbody>${body}</tbody></table></div>`
      :`<div class="empty"><div class="em">◍</div><h3>No customers match</h3>
         <p>Nothing matches your search and filters.</p>
         <button class="btn" data-filter="__clear">Clear filters</button></div>`}

/* =====================================================================
   §8 Registered User / Customer Management — ONE tabbed surface.
   SPEC-V2 merges the old §8/§9/§10 into this, and it must exist for both
   Registered Users and Customers. Financial, Investment and Risk are gated
   by the consent object; Personal, Documents and Activity are not.
   ===================================================================== */
const TABS8 = [
  {k:'overview',   t:'Overview'},
  {k:'personal',   t:'Personal'},
  {k:'financial',  t:'Financial',  gated:true},
  {k:'investment', t:'Investment', gated:true},
  {k:'risk',       t:'Risk',       gated:true},
  {k:'documents',  t:'Documents'},
  {k:'activity',   t:'Activity'},
  {k:'crm',        t:'CRM'},
  {k:'audit',      t:'Audit'}
];
/* P1.4 / P2.12: last contact = the most recent CRM meeting, note, task or follow-up for
   this client; falls back to last login. Drives the Overview and the Customers table. */
function lastContacted(id){
  const c = state.crm[id] || {};
  const ts = [];
  (c.meets||[]).forEach(m => ts.push(m.day || m.d));
  (c.notes||[]).forEach(n => ts.push((n.ts||'').slice(0,10)));
  (c.tasks||[]).forEach(k => ts.push((k.ts||'').slice(0,10)));
  (c.follow||[]).forEach(f => ts.push(f.on || (f.ts||'').slice(0,10)));
  const valid = ts.filter(Boolean).sort();
  return valid.length ? valid[valid.length-1] : null;
}
/* P1.4: the Overview tab, the at-a-glance strip so the advisor does not hunt across tabs. */
function tab8Overview(p){
  const isCust = !!p.pv;
  const lc = lastContacted(p.id);
  const fees = isCust ? feesFor(p, 'Year to date') : 0;
  const cards = [
    ['Stage', isCust ? '<span class="pill p-teal">Customer</span>' : `<span class="pill ${stagePill(p.stage)}">${esc(p.stage)}</span>`],
    ['Risk profile', p.type ? `<span class="pill p-teal">${esc(p.type)}</span>${p.score!=null?' <span class="sub num">'+p.score+'/100</span>':''}` : (p.port && p.port!=='n/a' ? esc(p.port) : '<span class="sub">Not assessed</span>')],
    ['Net worth', p.nw!=null ? money(p.nw) : dash],
    ['Portfolio value', isCust ? money(p.pv) : dash],
    ['Fees earned (YTD)', isCust ? money(fees) : dash],
    ['Last contact', lc ? fmtDate(lc) : (p.lastLogin ? rel(p.lastLogin) : dash)],
    ['Last risk assessment', fmtDate(lastRiskDate(p)) || 'Not completed'],
    ['Acquisition source', esc(acqSource(p))]
  ];
  return `<div class="card card-p">
    <div class="sec-t">Overview</div>
    <p class="lede" style="margin-bottom:var(--v4-space-4)">${esc(p.name)} at a glance.</p>
    <div class="ov-grid">${cards.map(([k,v])=>`<div class="ov-c">
      <span class="ov-k">${k}</span><span class="ov-v">${v}</span></div>`).join('')}</div>
  </div>`;
}
/* A Detail | Value table. The advisor's §8 tabs used to render this same label/value
   data as a stacked two-column grid while the client side got a real table, so the same
   information wore two different treatments. One helper, one treatment, everywhere. */
const dl = rows => `<div class="ptbl-wrap"><table class="ptbl">
  <thead><tr><th>Detail</th><th>Value</th></tr></thead>
  <tbody>${rows.map(([t,v]) =>
    `<tr><td>${t}</td><td class="num">${v}</td></tr>`).join('')}</tbody></table></div>`;

/* Locked state: name exactly what it would reveal, and offer the request. */
function lockedTab(p, sec){
  const st = consentOf(p.id, sec.k);
  return `
    <div class="locked">
      <div class="locked-h">
        <span class="lock">🔒</span>
        <div>
          <h3>${sec.t} is ${st==='pending'?'awaiting the client’s approval':'not shared with you'}</h3>
          <p class="lede">${esc(p.name.split(' ')[0])} controls this from their Vault22 profile.
            ${st==='pending'
              ? 'They have been asked and have not answered yet.'
              : 'Request access and they will be asked to grant it.'}</p>
        </div>
        ${st==='pending'
          ? `<span class="pill p-amber">Requested</span>`
          : `<button class="btn btn-pri" data-req="${p.id}|${sec.k}">Request access</button>`}
      </div>
      <div class="sec-t" style="margin-top:var(--v4-space-5)">What this would show you</div>
      <div class="locked-fields">${sec.fields.map(f=>`<span class="pill p-gray">${f}</span>`).join('')}</div>
    </div>`;
}

  return `<div class="card card-p">

    ${dl([
      ['First name', esc(p.name.split(' ')[0])],

function tab8Financial(p){
  const sec = CONSENT_SECTIONS[0];
  if(consentOf(p.id,'financial') !== 'granted') return lockedTab(p, sec);
  /* R4 2.1: the flat label/value list read as raw data, not a report. This is the designed
     financial report: headline position, net worth composition, cash flow and resilience,
     each figure derived from the same client record. */
  const nw = p.nw||0, liab = p.liabilities||0, assets = nw + liab;
  const inc = p.income||0, sav = p.sav||0, ef = p.ef||0;
  const savRate = inc ? Math.round(sav/inc*100) : 0;
  const spend = Math.max(inc - sav, 0);
  const efMonths = spend ? (ef/spend) : 0;
  const debtRatio = assets ? Math.round(liab/assets*100) : 0;
  const ffs = p.ffs||0, ffsPct = Math.round(ffs/1000*100);
  const ffsBand = ffs>=750 ? 'Excellent' : ffs>=650 ? 'Strong' : ffs>=550 ? 'Building' : 'Needs work';
  const pv = p.pv||0, inv = p.inv||0, growth = pv - inv;
  const bar = (label, val, pct, tone) => `<div class="arow">
    <span class="lb">${label}</span>
    <span class="bar"><i style="width:${Math.max(0,Math.min(100,pct))}%${tone?';background:'+tone:''}"></i></span>
    <span class="pc num pc-wide">${val}</span></div>`;
  return `<div class="card card-p">
    <div class="between" style="margin-bottom:var(--v4-space-2)">
      <div class="sec-t" style="margin:0">Financial report</div>
      <span class="sub">${esc(p.name)} · as at ${fmtDate(TODAY_STR)}</span></div>
    <p class="lede" style="margin-bottom:var(--v4-space-5)">Their position, how it is funded, and how
      resilient it is. Shared with you by ${esc(p.name.split(' ')[0])}.</p>

    <div class="kpis">
      <div class="kpi"><div class="k">Net worth</div><div class="v">${nw?money(nw):dash}</div>
        <div class="d">${money(assets)} assets less ${money(liab)} debt</div></div>
      <div class="kpi"><div class="k">Total investments</div><div class="v">${pv?money(pv):dash}</div>
        <div class="d">${money(inv)} contributed${growth?', '+(growth>=0?'+':'')+money(growth)+' growth':''}</div></div>
      <div class="kpi"><div class="k">Monthly savings</div><div class="v">${sav?money(sav):dash}</div>
        <div class="d">${savRate}% of ${money(inc)} income</div></div>
      <div class="kpi"><div class="k">Financial fitness</div><div class="v">${ffs||dash}<span class="sub" style="font-size:13px"> / 1000</span></div>
        <div class="d">${ffsBand}</div></div>
    </div>

    <div class="sec-t" style="margin-top:var(--v4-space-6)">Financial fitness</div>
    <div class="bar" style="height:10px"><i style="width:${ffsPct}%"></i></div>
    <div class="between sub" style="margin-top:6px"><span>0</span><span><b>${ffs}</b> · ${ffsBand}</span><span>1000</span></div>

    <div class="sec-t" style="margin-top:var(--v4-space-6)">Net worth composition</div>
    <p class="lede" style="margin-bottom:var(--v4-space-3)">What they own against what they owe.</p>
    ${bar('Investments', money(pv), assets?pv/assets*100:0)}
    ${bar('Savings', money(p.totalSav||0), assets?(p.totalSav||0)/assets*100:0)}
    ${bar('Other assets', money(Math.max(assets-pv-(p.totalSav||0),0)), assets?Math.max(assets-pv-(p.totalSav||0),0)/assets*100:0)}
    ${bar('Liabilities', money(liab), assets?liab/assets*100:0, 'var(--v4-navy-400)')}
    <div class="sub" style="margin-top:var(--v4-space-2)">Debt is ${debtRatio}% of total assets.</div>

    <div class="sec-t" style="margin-top:var(--v4-space-6)">Cash flow and resilience</div>
    <div class="ov-grid">
      <div class="ov-c"><span class="ov-k">Monthly income</span><span class="ov-v">${inc?money(inc):dash}</span></div>
      <div class="ov-c"><span class="ov-k">Savings rate</span><span class="ov-v">${savRate}%</span></div>
      <div class="ov-c"><span class="ov-k">Emergency fund</span><span class="ov-v">${ef?money(ef):dash}</span></div>
      <div class="ov-c"><span class="ov-k">Cover</span><span class="ov-v">${efMonths?efMonths.toFixed(1)+' months':dash}</span></div>
      <div class="ov-c"><span class="ov-k">Insurance coverage</span><span class="ov-v">${p.insurance!=null?money(p.insurance):dash}</span></div>
      <div class="ov-c"><span class="ov-k">Total liabilities</span><span class="ov-v">${liab?money(liab):dash}</span></div>
    </div>
    <div class="consent" style="margin-top:var(--v4-space-4)">${
      efMonths>=6 ? 'Emergency fund covers ' + efMonths.toFixed(1) + ' months of spending, a comfortable buffer.'
      : efMonths>=3 ? 'Emergency fund covers ' + efMonths.toFixed(1) + ' months. Three to six months is the usual target.'
      : 'Emergency fund covers under three months of spending. Worth a conversation.'}</div>

    <div class="row" style="margin-top:var(--v4-space-6)">
      <button class="btn btn-sm" data-reportdl="${p.id}">Download PDF</button></div>

    <div class="sec-t" style="margin-top:var(--v4-space-6)">Total fees earned</div>
    <p class="lede" style="margin-bottom:var(--v4-space-3)">Your fees from this client. Advisor view only.</p>
    <div class="row" style="margin-bottom:var(--v4-space-3)">
      ${['Year to date','This quarter','This month','All time'].map(o=>
        `<button class="fchip ${(state.feePeriod||'Year to date')===o?'on':''}" data-fee="${esc(o)}">${o}</button>`).join('')}
    </div>
    <div class="subtile" style="max-width:260px">
      <div class="k" style="font-size:13px;color:var(--live-label)">${esc(state.feePeriod||'Year to date')}</div>
      <div style="font-size:24px;font-weight:600" class="num">${money(feesFor(p, state.feePeriod||'Year to date'))}</div>
    </div>
  </div>`;
}
/* Fees are derived from the customer's own invested amount, not invented. */
const FEE_FRACTION = {'Year to date':0.0075, 'This quarter':0.0019, 'This month':0.000625, 'All time':0.011};
const feesFor = (p, period) => Math.round((p.inv||0) * (FEE_FRACTION[period]||0));

/* =====================================================================
   Membership plan (§1): the advisor's Vault22 subscription, billed monthly.
   The subscription tier is priced in USD (Stephen: $10 / $25 / $40) and is the
   advisor's amount due. A separate 25 bps p.a. AUM fee on non-Vault22 assets is
   paid by the CUSTOMER, shown on the invoice but never part of the advisor total.
   Final pricing and the AUM fee are to be confirmed with Greg.
   ===================================================================== */
/* Customers whose first investment (since) is on or before that month end. */
const custCountAsOf = monthEnd => state.customers.filter(c => (c.since||'') <= monthEnd).length;
/* USD subscription tier: 1 to 10 -> $10, 11 to 50 -> $25, 51+ -> $40. */
const subFee = n => n <= 0 ? 0 : n <= 10 ? 10 : n <= 50 ? 25 : 40;
const subTier = n => n <= 0 ? 'no customers yet' : n <= 10 ? '1 to 10 tier' : n <= 50 ? '11 to 50 tier' : '51+ tier';
const nonV22Aum = () => state.customers.reduce((s,c) => s + (c.extAum||0), 0);
const totalAum  = () => state.customers.reduce((s,c) => s + (c.pv||0), 0) + nonV22Aum();
/* 25 bps per annum on non-Vault22 assets, charged monthly. */
const aumFeeMonthly = nonV22 => Math.round((nonV22||0) * 0.0025 / 12);

/* The last N billing months, newest first, derived from the book. Older months scale
   AUM down a little per month back, a seeded monotonic curve.
   // TODO: replace with real historic AUM. */
/* R4 4.2: South African VAT. Kept as one constant so a rate change is a one-line edit,
   same treatment as the subscription tiers pending Greg. */
const VAT_RATE = 0.15;
const lastDayOf = (y, m) => String(new Date(y, m, 0).getDate()).padStart(2,'0');
function membershipInvoices(n){
  const [y, m] = state.advisor.joined ? state.advisor.joined.slice(0,7).split('-').map(Number) : [2025,9];
  const nowY = NOW.getFullYear(), nowM = NOW.getMonth()+1;
  const out = [];
  const MON = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  for(let i=0; i<n; i++){
    const dm = nowM - i, yy = nowY + Math.floor((dm-1)/12), mm = ((dm-1)%12+12)%12 + 1;
    if(yy < y || (yy===y && mm < m)) break;      /* not billed before the advisor joined */
    const monthEnd = yy + '-' + String(mm).padStart(2,'0') + '-28';
    const count = custCountAsOf(monthEnd);
    const scale = 1 - i*0.035;                    /* AUM slightly lower each month back */
    const aum   = Math.round(totalAum() * scale);
    const nonV22= Math.round(nonV22Aum() * scale);
    out.push({
      no: 'V22-ADV-' + yy + '-' + String(mm).padStart(2,'0'),
      key: yy + '-' + String(mm).padStart(2,'0'),
      label: MON[mm-1] + ' ' + yy,
      count, aum, nonV22,
      sub: subFee(count), tier: subTier(count),
      aumFee: aumFeeMonthly(nonV22),
      /* R4 4.2: invoices are dated the last day of the billing month, and the
         subscription carries SA VAT at 15% shown as its own line. */
      date: yy + '-' + String(mm).padStart(2,'0') + '-' + lastDayOf(yy, mm),
      vat: +(subFee(count) * VAT_RATE).toFixed(2),
      total: +(subFee(count) * (1 + VAT_RATE)).toFixed(2)
    });
  }
  return out;
}
/* A minimal, valid single-page PDF built by hand (no external libraries: CSP blocks
   them). Reuses the buildICS/downloadICS Blob-download pattern. */
/* A minimal, valid single-page PDF built by hand from a list of text lines (no external
   libraries: CSP blocks them). Shared by the membership invoice and the financial report. */
/* P1.8/P2.15: a generic client-side text/CSV/blob download, same pattern as downloadICS. */
function downloadText(text, filename, mime){
  const blob = new Blob([text], {type: (mime||'text/plain') + ';charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const el = document.createElement('a');
  el.href = url; el.download = filename;
  document.body.appendChild(el); el.click(); el.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
/* Build a CSV from a header array + row arrays, escaping quotes/commas. */
function toCSV(header, rows){
  const cell = v => { const s = String(v==null?'':v); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; };
  return [header.map(cell).join(','), ...rows.map(r=>r.map(cell).join(','))].join('\r\n');
}

const b64ToBytes = b64 => { const bin = atob(b64), out = new Uint8Array(bin.length);

/* PDF strings are single-byte. Encoding as Latin-1 (with WinAnsiEncoding on the font) keeps
   byte length equal to character count, which is what the xref offsets below depend on, and
   renders characters like the middle dot correctly instead of as mojibake. */
const latin1 = s => { const o = new Uint8Array(s.length);
  for(let i=0;i<s.length;i++){ const c = s.charCodeAt(i); o[i] = c < 256 ? c : 63; } return o; };

function downloadPdf(lines, filename, opts){
  opts = opts || {};
  const esc = s => String(s).replace(/[\\()]/g, c => '\\' + c);
  const logo = !!opts.logo;
  const lw = 118, lh = Math.round(lw * PDF_LOGO.h / PDF_LOGO.w * 10) / 10;
  const top = logo ? 744 : 780;
  let sc = '';
  if(logo) sc += 'q ' + lw + ' 0 0 ' + lh + ' 56 ' + (top + 26) + ' cm /Im1 Do Q\n';
  /* R5 1.3: entries may be plain strings (sequential 14pt flow, unchanged) OR positioned
     objects, so a document like the invoice can be laid out rather than left-aligned in one
     column. {t,x,y,size,bold,right} draws a run; {rule:[x1,x2,y]} draws a hairline.
     Helvetica digits are exactly 0.556 em, which is what right-aligned amounts use. */
  const flow = lines.filter(l => typeof l === 'string');
  const placed = lines.filter(l => l && typeof l === 'object');
  if(flow.length){
    sc += 'BT /F1 11 Tf 14 TL 56 ' + top + ' Td\n';
    flow.forEach((line,i) => { sc += (i ? 'T* ' : '') + '(' + esc(line) + ') Tj\n'; });
    sc += 'ET\n';
  }
  const wOf = (txt, size) => String(txt).length * 0.556 * size;
  placed.forEach(o => {
    if(o.rule){ const [x1,x2,y] = o.rule;
      sc += '0.85 0.85 0.85 rg ' + x1 + ' ' + y + ' ' + (x2-x1) + ' 0.7 re f 0 0 0 rg\n'; return; }
    const size = o.size || 11;
    const x = o.right ? (o.x - wOf(o.t, size)) : o.x;
    sc += 'BT /' + (o.bold ? 'F2' : 'F1') + ' ' + size + ' Tf ' + x.toFixed(1) + ' ' + o.y + ' Td ('
        + esc(o.t) + ') Tj ET\n';
  });
  const streamBytes = latin1(sc);
  const imgBytes = logo ? b64ToBytes(PDF_LOGO.b64) : null;

  const objs = [
    {s:'<< /Type /Catalog /Pages 2 0 R >>'},
    {s:'<< /Type /Pages /Kids [3 0 R] /Count 1 >>'},
    {s:'<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 5 0 R /F2 6 0 R >>'
       + (logo ? ' /XObject << /Im1 7 0 R >>' : '') + ' >> /Contents 4 0 R >>'},
    {head:'<< /Length ' + streamBytes.length + ' >>', bin:streamBytes},
    {s:'<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>'},
    {s:'<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>'}
  ];
  if(logo) objs.push({head:'<< /Type /XObject /Subtype /Image /Width ' + PDF_LOGO.w
    + ' /Height ' + PDF_LOGO.h + ' /ColorSpace /DeviceRGB /BitsPerComponent 8'
    + ' /Filter /DCTDecode /Length ' + imgBytes.length + ' >>', bin:imgBytes});

  /* Byte offsets, not string lengths: the image stream is binary and the text can carry
     characters above 0x7F, so counting characters would put the xref table out by the
     difference and leave the reader to repair the file. */
  const parts = []; let len = 0;
  const put = u8 => { parts.push(u8); len += u8.length; };
  const putS = s => put(latin1(s));

  putS('%PDF-1.4\n');
  const offsets = [];
  objs.forEach((o,i) => {
    offsets.push(len);
    putS((i+1) + ' 0 obj\n');
    if(o.bin){ putS(o.head + '\nstream\n'); put(o.bin); putS('\nendstream'); }
    else putS(o.s);
    putS('\nendobj\n');
  });
  const xref = len;
  let tail = 'xref\n0 ' + (objs.length+1) + '\n0000000000 65535 f \n';
  offsets.forEach(o => { tail += String(o).padStart(10,'0') + ' 00000 n \n'; });
  tail += 'trailer\n<< /Size ' + (objs.length+1) + ' /Root 1 0 R >>\nstartxref\n' + xref + '\n%%EOF';
  putS(tail);

  const blob = new Blob(parts, {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const el = document.createElement('a');
  el.href = url; el.download = filename;
  document.body.appendChild(el); el.click(); el.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function invoicePDF(inv){
  /* R5 1.3: laid out as a document, not a text column. Header band, two-column bill-to /
     meta, a charges table with right-aligned amounts, a rule above a dominant total. */
  const a = state.advisor;
  const R = n => 'R' + Math.round(n).toLocaleString('en-US');
  const L = 56, RIGHT = 539;          /* page margins, A4 is 595 wide */
  const o = [];
  const txt = (t,x,y,size,bold,right) => o.push({t,x,y,size,bold,right});
  txt('TAX INVOICE', RIGHT, 790, 20, true, true);
  txt(inv.no, RIGHT, 772, 11, false, true);
  o.push({rule:[L, RIGHT, 752]});
  let y = 730;
  txt('BILL TO', L, y, 9, true);
  txt('INVOICE DETAILS', RIGHT, y, 9, true, true);
  y -= 16;
  const billTo = [a.name, a.licence, a.company, a.address].filter(Boolean);
  const meta = [['Invoice date', fmtDate(inv.date)], ['Billing month', inv.label],
                ['Invoice no.', inv.no], ['Customers', String(inv.count)]];
  const rows = Math.max(billTo.length, meta.length);
  for(let i=0;i<rows;i++){
    if(billTo[i]) txt(billTo[i], L, y, 11);
    if(meta[i]){ txt(meta[i][0], 380, y, 9); txt(meta[i][1], RIGHT, y, 11, false, true); }
    y -= 15;
  }
  y -= 12;
  o.push({rule:[L, RIGHT, y+8]});
  txt('YOUR BOOK THIS MONTH', L, y - 8, 9, true);
  y -= 26;
  [['Total AUM', R(inv.aum)], ['Total non-Vault22 AUM', R(inv.nonV22)]].forEach(function(kv){
    txt(kv[0], L, y, 11); txt(kv[1], RIGHT, y, 11, false, true); y -= 15;
  });
  y -= 12;
  o.push({rule:[L, RIGHT, y+8]});
  txt('CHARGES', L, y - 8, 9, true);
  y -= 26;
  [['Subscription fee (' + inv.tier + ')', '$' + inv.sub.toFixed(2)],
   ['Subtotal', '$' + inv.sub.toFixed(2)],
   ['VAT at 15%', '$' + inv.vat.toFixed(2)]].forEach(function(kv){
    txt(kv[0], L, y, 11); txt(kv[1], RIGHT, y, 11, false, true); y -= 15;
  });
  o.push({rule:[L, RIGHT, y + 6]});
  y -= 12;
  txt('TOTAL DUE', L, y, 14, true);
  txt('$' + inv.total.toFixed(2), RIGHT, y, 14, true, true);
  y -= 30;
  txt('AUM fee (25 bps p.a. on non-Vault22 assets): ' + R(inv.aumFee), L, y, 10);
  y -= 13;
  txt('Charged to the customer. Not part of your amount due.', L, y, 10);
  txt('Vault22 (Pty) Ltd · vault22.com', L, 70, 9);
  txt('Subscription in USD. VAT at the South African rate of 15%.', L, 58, 9);
  downloadPdf(o, 'vault22-invoice-' + inv.key + '.pdf', {logo:true});
}

/* Part A.2: documents are a request-to-fulfil loop, not upload-only. The advisor and the
   client share ONE store for a given client (state.docs[id]); the client scenario reads
   the same list for CLIENT_ID, so an advisor request appears in the client's app and the
   client's upload appears back for the advisor. Each doc has a status:
   'requested' (advisor asked, no file yet) or 'received' (uploaded). */
let _did = 300; const newDid = () => 'D' + (++_did);
const docStoreId = (scope, id) => scope === 'client' ? CLIENT_ID : id;
const docsFor = (scope, id) => { const k = docStoreId(scope, id); return (state.docs||{})[k] || []; };

    ${received.length ? `<div class="ptbl-wrap" style="margin-bottom:var(--v4-space-4)"><table class="ptbl">

        <td><button class="btn btn-sm" data-docview="${esc(d.name)}|${esc(d.type)}|${d.date||''}|${d.expiry||''}">Open</button></td></tr>`).join('')}</tbody></table></div>`
      : (requested.length ? '' : '<p class="lede" style="margin-bottom:var(--v4-space-4)">No documents yet.</p>')}

    : reqDraft ? `

   Analytics (§14)
   ===================================================================== */
/* =====================================================================
   Monthly series, derived from the book (§14).

   Walks the last six months and, at each month end, counts who had registered,
   who had become a customer, and what the book was worth. NOW is a fixed clock
   (the 17 Jul demo date) so the prototype reads identically on any machine.
   ===================================================================== */
/* NOW is the file's existing fixed demo clock (line ~922), reused here so the
   prototype reads identically on any machine and on any day. */
const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_NAME = ['January','February','March','April','May','June','July',
  'August','September','October','November','December'];
const MONTH_LABEL = MONTH_NAME[NOW.getMonth()] + ' ' + NOW.getFullYear();
function monthlySeries(L, C, n = 6){
  const ends = [];
  for(let i = n-1; i >= 0; i--){
    const d = new Date(NOW.getFullYear(), NOW.getMonth() - i + 1, 0);  // last day of that month
    ends.push(d);
  }
  const on = (dateStr, end) => dateStr && new Date(dateStr) <= end;

  const months = ends.map(d => MONTH_ABBR[d.getMonth()]);
  /* Registered users = everyone who has registered, customers included: a customer
     is a registered user who invested, not a separate population. */
  const users = ends.map(e =>
    L.filter(l => on(l.signup, e)).length + C.filter(c => on(c.signup || c.since, e)).length);
  const custs = ends.map(e => C.filter(c => on(c.since, e)).length);
  /* Book value at each month end: a customer's portfolio counts once they invested.
     The final point is today's book, so the chart ends exactly on the AUA KPI. */
  const aum = ends.map(e =>
    C.filter(c => on(c.since, e)).reduce((s,c) => s + c.pv, 0));
  /* Money invested in each month, from the holdings' own purchase dates. */
  const inv = ends.map(e => C.reduce((s,c) => s + (c.holdings||[])
    .filter(h => h.d && new Date(h.d).getMonth() === e.getMonth()
              && new Date(h.d).getFullYear() === e.getFullYear())
    .reduce((t,h) => t + h.mv, 0), 0));
  return {months, users, custs, aum, inv};
}
/* Defect 2: the charts must follow the period selector. Buckets span the selected window
   (monthly for long windows, weekly for a month or less) so every chart redraws to match
   the period, consistent with the KPIs. Each bucket end carries the cumulative counts/book
   value; inv is the amount invested within that bucket. */
function periodSeries(L, C, win){
  const s = new Date(win.s), e = new Date(win.e);
  const spanDays = (e - s) / 86400000;
  const starts = [], ends = [], labels = [];
  if(spanDays <= 70){                                   /* weekly buckets */
    let cur = new Date(s);
    while(cur <= e){
      const bEnd = new Date(cur); bEnd.setDate(bEnd.getDate() + 6);
      if(bEnd > e) bEnd.setTime(e.getTime());
      starts.push(new Date(cur)); ends.push(bEnd);
      labels.push(bEnd.getDate() + ' ' + MONTH_ABBR[bEnd.getMonth()]);
      cur = new Date(cur); cur.setDate(cur.getDate() + 7);
    }
  } else {                                              /* monthly buckets */
    let y = s.getFullYear(), m = s.getMonth();
    while(y < e.getFullYear() || (y === e.getFullYear() && m <= e.getMonth())){
      const mStart = new Date(y, m, 1);
      let mEnd = new Date(y, m+1, 0, 23,59,59);
      if(mEnd > e) mEnd = new Date(e);
      starts.push(mStart); ends.push(mEnd);
      labels.push(MONTH_ABBR[m]);
      m++; if(m > 11){ m = 0; y++; }
    }
  }
  const on = (d, end) => d && new Date(d) <= end;
  const users = ends.map(end => L.filter(l=>on(l.signup,end)).length + C.filter(c=>on(c.signup||c.since,end)).length);
  const custs = ends.map(end => C.filter(c=>on(c.since,end)).length);
  const aum   = ends.map(end => C.filter(c=>on(c.since,end)).reduce((t,c)=>t+c.pv,0));
  const inv   = ends.map((end,i) => { const bs = starts[i];
    return C.reduce((t,c)=>t + (c.holdings||[]).filter(h=>h.d && new Date(h.d)>=bs && new Date(h.d)<=end)
      .reduce((u,h)=>u+h.mv,0), 0); });
  return {months: labels, users, custs, aum, inv};
}

/* R4 1.1: one chart card in the 2 x 2 grid, with a full-screen control. state.chartFull
   holds the key of the expanded chart; the takeover re-renders the same body at a taller
   spark height so the line genuinely gains resolution. */
function chartCard(key, title, meta, body){
  return `<div class="card card-p chart-card">
    <div class="between" style="margin-bottom:var(--v4-space-2)">
      <div class="sec-t" style="margin:0">${title}</div>
      <span class="row" style="gap:var(--v4-space-2);align-items:center">
        <span class="sub num">${meta}</span>
        <button class="icon-btn chart-fs" data-chartfull="${key}" title="Full screen"
          aria-label="Full screen: ${title}">⛶</button>
      </span>
    </div>
    ${body}
  </div>`;
}
function spark(vals,w=280,h=54){
  if(state.chartFull) h = 260;   /* R4 1.1: re-render larger in the takeover */
  vals = (vals && vals.length) ? vals : [0,0];
  const mx=Math.max(...vals), mn=Math.min(...vals), rg=(mx-mn)||1;
  const denom = vals.length>1 ? (vals.length-1) : 1;
  const pts=vals.map((v,i)=>[i*(w/denom), h-((v-mn)/rg)*(h-8)-4]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L ${w} ${h} L 0 ${h} Z`;
  /* Defect 1: preserveAspectRatio="none" stretches the viewBox to the element's full
     width (with height fixed), so the line spans the whole x-axis instead of rendering
     at its intrinsic 280px width, centred, leaving blank left/right. */
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block">
    <path d="${area}" fill="var(--v4-teal-50)"/>
    <path d="${d}" fill="none" stroke="var(--v4-teal-400)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
      vector-effect="non-scaling-stroke"/>
  </svg>`;
}
/* §15: the analytics period selector. Each option resolves to a date window; every KPI,
   funnel and acquisition figure recomputes against it, so switching visibly changes the
   numbers. Default: This month. */
const AN_PERIODS = ['This month','Last month','Last 90 days','YTD','Custom'];
/* R41: the Custom range comes from two date inputs the advisor sets.
   R4QA 0.4: labels go through fmtDate like every other rendered date, no second format. */
const customFrom = () => state.customFrom || localISO(new Date(NOW.getFullYear(), NOW.getMonth()-3, 1)).slice(0,10);
const customTo   = () => state.customTo   || localISO(NOW).slice(0,10);
function periodWindow(period){
  const y = NOW.getFullYear(), m = NOW.getMonth();
  if(period==='Last month'){ const e=new Date(y,m,0,23,59,59); return {s:new Date(y,m-1,1), e, label:MONTH_NAME[e.getMonth()]+' '+e.getFullYear()}; }
  if(period==='Last 90 days'){ const s=new Date(NOW); s.setDate(s.getDate()-90); return {s, e:NOW, label:'Last 90 days'}; }
  if(period==='YTD'){ return {s:new Date(y,0,1), e:NOW, label:y+' to date'}; }
  if(period==='Custom'){ const f=customFrom(), t=customTo();
    return {s:new Date(f+'T00:00:00'), e:new Date(t+'T23:59:59'), label:fmtDate(f)+' to '+fmtDate(t)}; }
  return {s:new Date(y,m,1), e:NOW, label:MONTH_LABEL};   /* This month */
}
/* R4QA2 A1: ONE definition of every advertised analytics figure. The screen and the export
   both call this, so the two cannot drift apart again. Each metric keeps its correct basis:
   headline population / AUA / invested / conversion are cumulative as-of the window end,
   while acquisition-by-source and new-customers-this-period are signed-up-within-window. */
function analyticsFor(period){
  const C = state.customers, L = state.leads;
  const win = periodWindow(period);
  const inWin = d => d && new Date(d) >= win.s && new Date(d) <= win.e;
  const asOf  = (d,end) => d && new Date(d) <= end;
  const Lend = L.filter(l=>asOf(l.signup, win.e));
  const custByEnd = C.filter(c=>asOf(c.since, win.e));
  const signedByEnd = Lend.length + C.filter(c=>asOf(c.signup||c.since, win.e)).length;
  const custEnd = custByEnd.length;
  const invTotalEnd = custByEnd.reduce((s,c)=>s+(c.inv||0),0);
  const aua = custByEnd.reduce((s,c)=>s+(c.pv||0),0);
  const conv = signedByEnd ? (custEnd/signedByEnd*100).toFixed(1) : '0.0';
  const newCust = C.filter(c=>inWin(c.since)).length;
  /* Acquisition by source counts signups inside the window, matching the on-screen card. */
  const winPeople = [...L.filter(l=>inWin(l.signup)), ...C.filter(c=>inWin(c.signup||c.since))];
  const srcCount = {};
  winPeople.forEach(x => { const k = acqSource(x); srcCount[k] = (srcCount[k]||0)+1; });
  return {win, inWin, asOf, C, L, Lend, custByEnd, signedByEnd, custEnd,
          invTotalEnd, aua, conv, newCust, winPeople, srcCount};
}
function vAnalytics(){
  const L=state.leads, C=state.customers, a=state.advisor;
  if(!L.length && !C.length) return `
    <div class="page-head"><h1>Analytics</h1><p class="lede">Your funnel and growth.</p></div>
    <div class="card"><div class="empty"><div class="em">◪</div><h3>Nothing to chart yet</h3>
      <p>Analytics appear once you have registered users coming through your link.</p>
      <button class="btn" data-share="1">Share my link</button></div></div>`;

  const period = state.anPeriod || 'This month';
  const M = analyticsFor(period);
  const {win, inWin, asOf, Lend, custByEnd, signedByEnd, custEnd, invTotalEnd, aua, conv, srcCount, newCust} = M;
  const notYetCust = signedByEnd - custEnd;

  /* §14 User Registration > Customer Funnel — cumulative across the 10 stages, as-of end. */
  const reached = STAGES.map((s,i)=> Lend.filter(l=>STAGES.indexOf(l.stage)>=i).length
    + C.filter(c=>asOf(c.signup||c.since, win.e)).length);
  const top = reached[0] || 1;
  const funnel = STAGES.map((s,i)=>`

  /* Period-scoped headline metrics: all computed against the window, so the selector
     visibly changes them. */
  const avg = custEnd ? invTotalEnd/custEnd : 0;
  const bookStart = C.filter(c=>asOf(c.since, win.s)).reduce((s,c)=>s+c.pv,0);
  /* AUM growth = new assets (new customers in the window) plus market appreciation on the
     existing book, ~0.9% a month, so a quiet month still reads as growth rather than R0. */
  const winMonths = Math.max(1, Math.round((win.e - win.s)/(30*86400000)));
  const aumGrowth = (aua - bookStart) + Math.round(bookStart * 0.009 * winMonths);
  const newUsers = Lend.filter(l=>inWin(l.signup)).length + C.filter(c=>inWin(c.signup)).length;
  /* R4QA3: newCust now comes from analyticsFor() with every other advertised figure.
     Recomputing it here was a second definition of the same number, which is how the
     export drifted from the screen in the first place. */
  const investedWin = C.reduce((s,c)=>s+(c.holdings||[]).filter(h=>inWin(h.d)).reduce((t,h)=>t+h.mv,0),0);
  const prod={}; custByEnd.forEach(c=>c.holdings.forEach(x=>prod[x.p]=(prod[x.p]||0)+x.mv));
  const prodTop=Object.entries(prod).sort((a,b)=>b[1]-a[1]); const prodMax=prodTop[0]?prodTop[0][1]:1;

  /* §14 Customer Retention = (Total customers − lost customers) / Total customers.
     Lost customers within the window; more of the year lost, so YTD retention is lower. */
  const lostInWin = LOST_CUSTOMERS.filter(x=>inWin(x.left));
  const lost = lostInWin.length;
  const totalEver = custEnd + lost;
  const retention = totalEver ? ((totalEver - lost) / totalEver * 100).toFixed(1) : '100.0';

  /* §14 Customer Trends. The spec names four; each is period-over-period across the
     book, computed from PREV_PERIOD. Nothing here is invented — a metric the mock
     data cannot compute is not shown. */
  const sum = (f) => C.reduce((s,c)=>s+f(c),0);
  const prevSum = (k) => C.reduce((s,c)=>s+((PREV_PERIOD[c.id]||{})[k]||0),0);
  const pct = (now,was) => was ? ((now-was)/was*100) : 0;
  const TRENDS = [
    {t:'Change in portfolios', now:sum(c=>c.pv),         was:prevSum('pv'),   note:'Total portfolio value across the book'},
    {t:'Change in savings',    now:sum(c=>c.sav),        was:prevSum('sav'),  note:'Monthly savings across the book'},
    /* P3.21: invert is intended. For liabilities, a DECREASE is good news for the book, so
       the colour is inverted (down = green, up = red), unlike the other growth metrics. */
    {t:'Change in liabilities',now:sum(c=>c.liabilities),was:prevSum('liab'), note:'Total liabilities across the book', invert:true},
    {t:'Change in net worth',  now:sum(c=>c.nw),         was:prevSum('nw'),   note:'Total net worth across the book'}
  ];
  /* Two more the data genuinely supports. */
  const EXTRA = [
    {t:'Change in assets under advice', now:aua, was:prevSum('pv'), note:'AUA is the same base as portfolios, tracked as your book value'},
    {t:'Change in average portfolio',   now:custEnd?aua/custEnd:0, was:C.length?prevSum('pv')/C.length:0, note:'Per customer'}
  ];
  const trendRow = r => {
    const d = pct(r.now, r.was);

      </span></div>`;
  };

  /* Defect 2: the charts follow the period selector, buckets spanning the chosen window,
     so switching period redraws them consistently with the KPIs. */
  const SERIES = periodSeries(L, C, win);
  const MONTHS = SERIES.months;
  const usersSeries = SERIES.users, custSeries = SERIES.custs;
  const aumSeries = SERIES.aum, invSeries = SERIES.inv;

  /* P2.9: acquisition by source comes from analyticsFor(), the same object the export uses. */
  const srcTot = Object.values(srcCount).reduce((s,n)=>s+n,0) || 1;
  const anSourceRows = Object.entries(srcCount).map(([src,n])=>({src, n, pct: Math.round(n/srcTot*100)}))
    .sort((a,b)=>b.n-a.n);
  /* P2.15: product breakdown from every customer's holdings. */
  const prodMv = {};
  C.forEach(c => (c.holdings||[]).forEach(h => { prodMv[h.p] = (prodMv[h.p]||0) + h.mv; }));
  const prodTot = Object.values(prodMv).reduce((s,n)=>s+n,0) || 1;

    .sort((a,b)=>b.mv-a.mv).slice(0,8);
  /* P2.15: portfolio-type breakdown across the book. */
  const portAgg = {};
  C.forEach(c => { const k = c.type || 'Unassigned'; (portAgg[k] = portAgg[k] || {n:0,pv:0}); portAgg[k].n++; portAgg[k].pv += c.pv; });
  const portTot = Object.values(portAgg).reduce((s,x)=>s+x.pv,0) || 1;
  const anPortRows = Object.entries(portAgg).map(([name,x])=>({name, n:x.n, pv:x.pv, pct: Math.round(x.pv/portTot*100)}))
    .sort((a,b)=>b.pv-a.pv);

  /* R4 1.1: chart definitions built once, rendered both in the 2 x 2 grid and, when one is
     expanded, in the full-screen takeover. Bodies are thunks so spark() picks up the taller
     height only while state.chartFull is set. */

      ${spark(usersSeries)}

    {key:'trends', title:'Customer trends', meta:'Period over period', body:()=>`
      <p class="lede" style="margin-bottom:var(--v4-space-3)">Change across your book since the
        previous period. Every figure is computed from the book.</p>

  ];
  /* The expanded chart takes over the view entirely. */
  const full = CHARTS.find(c=>c.key===state.chartFull);
  if(full) return `<div class="chart-full"><div class="chart-full-in">

      ${period==='Custom' ? `<div class="row" style="justify-content:flex-end;margin-top:var(--v4-space-3)">

      </div>` : ''}
    </div>

    <div class="kpis">

const assetOf = tk => ASSETS.find(a=>a.ticker===tk);
/* Target asset-class weights per risk type, nudged by the client's profile. */
const TARA_TARGETS = {
  'Very Conservative':{Cash:45,Bonds:40,Equity:10,Property:5},
  'Conservative':     {Cash:25,Bonds:45,Equity:22,Property:8},
  'Balanced':         {Equity:48,Bonds:30,Cash:14,Property:8},
  'Growth':           {Equity:70,Bonds:14,Cash:6,Property:10},
  'Aggressive':       {Equity:85,Bonds:5,Cash:5,Property:5}
};
/* P3.19: SA tax-free savings account allowance, and each client's stated goals so Tara can
   frame a suggestion against the goals timeline, not just the risk profile. */
const TFSA_ANNUAL = 36000, TFSA_LIFETIME = 500000;
const GOALS = {
  C1:{goal:'Retirement at 60', horizon:22, tfsaUsed:180000},
  C2:{goal:'Buy a second property', horizon:8,  tfsaUsed:96000},
  C3:{goal:'Financial independence', horizon:18, tfsaUsed:54000},
  C4:{goal:'Children\'s education', horizon:12, tfsaUsed:120000},
  C5:{goal:'Grow long-term wealth', horizon:20, tfsaUsed:72000}
};
const goalOf = c => GOALS[c.id] || {goal:'Long-term growth', horizon:15, tfsaUsed:0};
const ageOf = dob => { const d=new Date(dob); let a=NOW.getFullYear()-d.getFullYear();
  if(NOW.getMonth()<d.getMonth() || (NOW.getMonth()===d.getMonth()&&NOW.getDate()<d.getDate())) a--; return a; };
function taraTargets(c){
  const w = {...(TARA_TARGETS[c.type] || TARA_TARGETS['Balanced'])};
  const shift = (from, to, n) => { const m=Math.min(n, w[from]||0); w[from]-=m; w[to]=(w[to]||0)+m; };
  const age = ageOf(c.dob);
  if(age < 35) shift('Cash','Equity',5);
  else if(age > 55) shift('Equity','Cash',5);
  if((c.dependents||0) >= 3 || (c.ef||0) < (c.income||0)*3) shift('Equity','Bonds',5);
  if((c.ffs||0) >= 750) shift('Bonds','Equity',5);
  /* Renormalise to 100 in case clamping shaved a point. */
  const tot = Object.values(w).reduce((s,v)=>s+v,0);
  if(tot !== 100 && tot > 0){ const k = Object.keys(w).sort((a,b)=>w[b]-w[a])[0]; w[k]+=100-tot; }
  return w;
}
/* Deterministic (no Math.random) suggested lines in the chosen currency. */
function taraBuild(c, ccy){
  const targets = taraTargets(c);
  const order = ['Equity','Bonds','Property','Cash'];
  const avail = cls => ASSETS.filter(a=>a.ccy===ccy && a.cls===cls);
  const lines = [];
  order.forEach(cls=>{
    let w = targets[cls] || 0; if(w<=0) return;
    let pool = avail(cls);
    if(!pool.length){ pool = avail('Equity').length ? avail('Equity') : avail('Cash'); }
    if(!pool.length) return;
    if(w >= 20 && pool.length >= 2){
      const w1 = Math.round(w*0.6), w2 = w - w1;
      lines.push({ticker:pool[0].ticker, weight:w1});
      lines.push({ticker:pool[1].ticker, weight:w2});
    } else {
      lines.push({ticker:pool[0].ticker, weight:w});
    }
  });
  /* Merge any duplicate tickers (e.g. Property fell back into Equity's first asset). */
  const merged = [];
  lines.forEach(l=>{ const e = merged.find(m=>m.ticker===l.ticker);
    if(e) e.weight += l.weight; else merged.push({...l}); });
  /* Fix rounding so the weights total exactly 100. */
  const sum = merged.reduce((s,l)=>s+l.weight,0);
  if(sum !== 100 && merged.length){ merged.sort((a,b)=>b.weight-a.weight); merged[0].weight += 100-sum; }
  return merged;
}
const taraTotalWeight = () => (state.tara ? state.tara.lines.reduce((s,l)=>s+l.weight,0) : 0);
/* P1.5: illustrative long-run return / volatility / annual fee per asset class, so Tara can
   show the suggested portfolio's expected return and risk and check it against the client's
   profile. Clearly illustrative, not advice. */
const CLASS_RV  = {Equity:[12.5,15.5], Property:[9.0,12.0], Bonds:[7.5,6.0], Cash:[5.0,1.0]};
const CLASS_FEE = {Equity:0.35, Property:0.45, Bonds:0.25, Cash:0.15};
/* Sum line weights by asset class. */
function taraClassWeights(lines){
  const w = {Equity:0, Bonds:0, Property:0, Cash:0};
  (lines||[]).forEach(l => { const a = ASSETS.find(x=>x.ticker===l.ticker); if(a && w[a.cls]!=null) w[a.cls] += l.weight; });
  return w;
}
/* The suggested portfolio's expected return, volatility, growth weight, blended fee, and how
   it sits against the client's risk band. */
function taraStrategy(c, lines){
  const cw = taraClassWeights(lines);
  const ret = Object.keys(cw).reduce((s,k)=> s + (cw[k]/100) * CLASS_RV[k][0], 0);
  const vol = Object.keys(cw).reduce((s,k)=> s + (cw[k]/100) * CLASS_RV[k][1], 0);
  const fee = Object.keys(cw).reduce((s,k)=> s + (cw[k]/100) * CLASS_FEE[k], 0);
  const growth = cw.Equity + cw.Property;
  const band = RISK_RV[c.type] || [9,9];
  /* within profile if the portfolio's volatility does not run meaningfully above the band */
  const fit = vol <= band[1] * 1.12 ? 'within' : 'above';
  return {cw, ret, vol, fee, growth, band, fit};
}
/* R49: the reason explains the asset's ROLE for THIS client, from its class and its weight
   relative to the client's risk profile, so it never contradicts (no "suited to your
   Conservative profile" on an equity growth sleeve). The asset's own `reason` (unique per
   asset) leads, so two bonds never read identically. */
function taraReason(c, a, l){
  const w = l ? l.weight : 0;
  const defensive = c.type==='Very Conservative' || c.type==='Conservative';
  const aggressive = c.type==='Growth' || c.type==='Aggressive';
  let role = '';
  if(a.cls==='Equity'){
    role = defensive ? (w < 25 ? 'A small growth sleeve for long-term upside.'
                               : 'The growth portion of an otherwise defensive book.')
         : aggressive ? 'Core growth, in line with your ' + c.type.toLowerCase() + ' profile.'
         : 'The growth engine of a balanced mix.';
  } else if(a.cls==='Bonds'){
    role = defensive ? 'Anchors the portfolio with income and lower volatility.'
                     : 'A ballast sleeve to steady the ride.';
  } else if(a.cls==='Cash'){
    role = (c.ef||0) < (c.income||0)*3
      ? 'Liquidity and a buffer while your emergency fund builds.'
      : 'Liquidity and a buffer for near-term needs.';
  } else if(a.cls==='Property'){
    role = 'Diversifies beyond shares and bonds.';

}

/* R4 6.3: what the client holds in this asset today. Seeded holdings carry a fund name

function currentHoldingOf(c, ticker){
  const a = assetOf(ticker); if(!a) return 0;
  const h = (c.holdings||[]).find(x =>
    (x.tk && x.tk === ticker) || (x.p && x.p.toLowerCase() === a.name.toLowerCase()));
  return h ? (h.mv || 0) : 0;
}

function taraDisposals(c, lines){
  const kept = new Set((lines||[]).map(l => (assetOf(l.ticker)||{}).name));
  return (c.holdings||[]).filter(h => !kept.has(h.p));
}

/* Part A.5: a plain-language rationale that visibly follows from the client's real

function taraRationale(c, ccy, lines){
  const clsW = k => lines.filter(l => { const a = ASSETS.find(x=>x.ticker===l.ticker); return a && a.cls===k; })
    .reduce((s,l)=>s+l.weight,0);
  const eq = clsW('Equity'), cash = clsW('Cash');
  const age = ageOf(c.dob);
  const fitness = c.ffs>=700 ? 'a strong fitness score' : c.ffs>=600 ? 'a solid fitness score' : 'a building fitness score';
  const deps = c.dependents===0 ? 'no dependents' : plural(c.dependents,'dependent');
  const tilt = eq>=75 ? 'tilted heavily to equity for long-term growth'
    : eq>=45 ? 'balanced growth and income' : 'kept it defensive and income-led';
  const buffer = cash>0
    ? ('kept about ' + cash + '% in cash as a buffer' + (c.ef ? ' alongside their ' + money(c.ef) + ' emergency fund' : ''))
    : 'stayed close to fully invested';
  const ccyNote = ccy==='USD'
    ? 'I have used USD, offshore assets for hard-currency diversification.'
    : 'These are ZAR assets available on the Vault22 platform.';
  return `${esc(c.name.split(' ')[0])} is ${age}, ${esc(c.type.toLowerCase())} risk (${c.score}/100), with ${fitness} and ${deps}, `

/* §12.2: the Audit Log keeps only Recent activity, filterable by user, action and date. */
const auditWho = a => a.who ? crmWho(a.who) : (a.tgt || '');
/* R5 0.4: a FIXED action taxonomy, independent of what happens to be in the log. The old
   filter built its options from log contents, so its vocabulary changed as the demo was used.
   Each category owns a matcher over the raw action text, which stays free-form for display. */
const AUDIT_CATEGORIES = [
  ['Signed in',          /signed in|account verified|created advisor account|completed advisor onboarding/i],
  ['Viewed profile',     /viewed|opened document|opened fund fact sheet|opened tara/i],
  ['Requested access',   /requested (all )?data access|requested (financial|investment|risk)/i],
  ['Consent',            /granted|withdrew|revoked|consent/i],
  ['Document',           /document|uploaded file|removed file/i],
  ['KYC',                /kyc/i],
  ['Risk assessment',    /risk assessment/i],
  ['Meeting',            /meeting|calendar invite/i],
  ['Portfolio change',   /portfolio|power of attorney|fact sheet/i],
  ['Invested',           /invested|sold/i],
  ['Advisor appointed',  /appointed advisor|removed advisor|invited an advisor/i],
  ['Exported',           /exported|downloaded/i],
  ['Settings',           /updated|renamed|chose advisor name|removed (company|firm) logo|account status/i],
  ['CRM',                /note|tag|task|follow-up/i]
];
const auditCategory = a => (AUDIT_CATEGORIES.find(([,re])=>re.test(a.act||'')) || ['Other'])[0];
function vAudit(){
  const af = state.auditFilter || {who:'', act:'', date:''};
  /* R5 0.4: user is a free-text search over ALL clients, not a dropdown of those who happen to
     have activity, so a client with no events is findable and returns an honest empty state. */
  const q = (af.who||'').trim().toLowerCase();
  const rows = state.audit.filter(a =>
    (!q      || auditWho(a).toLowerCase().includes(q)) &&
    (!af.act || auditCategory(a) === af.act) &&
    (!af.date || (a.ts||'').slice(0,10) === af.date));
  return `
    <div class="page-head"><h1>Audit Log</h1>
      <p class="lede">Every advisor action is logged. Actions you take in this prototype are appended

          </select>

          ${(af.who||af.act||af.date) ? `<button class="btn btn-sm" data-auditf="__clear">Clear filters</button>` : ''}
        </div>
      </div>

        <thead><tr><th>When</th><th>Action</th><th>Target</th></tr></thead>
